meta:
  version: '1.0'
  created: '2026-03-19'
  description: Migrated from CRITICAL_RULES.md + learnings/
learnings:
- id: motion_mode_restart
  category: MOTION
  times_hit: 15
  discovered: '2026-01-01'
  promoted: true
  status: active
  summary: 'Motion-triggered lights must use mode: restart'
  detail: 'Always mode: restart for motion-triggered lights.

    Combined sensors need delay_off 60s minimum to prevent double-fires.

    Use combined binary_sensor, not OR-ing individual sensors (race condition).

    Dual trigger pattern: motion ON starts, motion OFF with wait turns off.

    Timeouts by room: transition 5-10min, active 8-20min, relaxation 15-45min.

    Double-fire fix: check for orphan automations with same unique_id.

    '
  affects:
  - packages/
  tags:
  - motion
  - mode
  - double-fire
  - delay_off
- id: motion_parallel_exception
  category: MOTION
  times_hit: 2
  discovered: '2026-03-10'
  promoted: false
  status: active
  summary: 'mode: parallel for event-based notifications, not motion'
  detail: 'mode: restart = motion-triggered lights (always).

    mode: parallel with max: 2 = doorbell/package notifications

    (need simultaneous firing from multiple cameras).

    Do NOT apply restart rule to doorbell/package automations.

    '
  affects:
  - packages/notifications_system.yaml
  tags:
  - motion
  - mode
  - doorbell
  - parallel
- id: inovelli_smart_bulb_mode
  category: INOVELLI
  times_hit: 15
  discovered: '2026-01-01'
  promoted: true
  status: active
  summary: Inovelli Smart Bulb Mode param 52=1, requires toggle+air gap to write
  detail: 'Smart Bulb Mode: Param 52=1 + LED bar params 95-98 for Hue bulbs.

    Config button cycling: use input_number + modulo, not input_select.

    Parameters require toggle OFF->ON in ZHA UI then air gap to write.

    fxlt blueprint fires ALL zha_events — filter by device_id or use unified blueprint.

    VZM35-SN fans: Param 12 (auto-off) = 2700s for hardware safety backup.

    '
  affects:
  - packages/
  tags:
  - inovelli
  - zha
  - params
  - hue
  - sbm
- id: inovelli_aux_switch_quirk
  category: INOVELLI
  times_hit: 3
  discovered: '2026-02-23'
  promoted: true
  status: active
  summary: AUX DOWN sends direct off command instead of button_4_press scene event
  detail: 'AUX DOWN button sends direct Zigbee off command instead of button_4_press,

    even with Aux switch scenes enabled on main VZM31-SN.

    Fix: separate automation catching event_type: zha_event command: off.

    AUX UP (button_5_press) works correctly after toggling Aux switch scenes off/on.

    Button mapping: button_4=AUX DOWN, button_5=AUX UP, button_6=AUX CONFIG.

    '
  affects:
  - packages/
  tags:
  - inovelli
  - aux
  - zha_event
  - 3way
- id: adaptive_lighting_hue_triple
  category: AL
  times_hit: 10
  discovered: '2026-01-01'
  promoted: true
  status: active
  summary: Hue bulbs in AL require three specific settings or AL silently fails
  detail: "ALL THREE required for Hue bulbs:\n  separate_turn_on_commands: true\n  take_over_control: true\n  detect_non_ha_changes:\
    \ false\nCreate/delete AL instances via UI ONLY — no API exists.\nSame make/model bulbs per AL instance.\nSleep mode:\
    \ 1-5%, 2200K, 10pm-6am for bedrooms.\n"
  affects:
  - packages/
  tags:
  - adaptive_lighting
  - hue
  - configuration
- id: yaml_template_duplicate_keys
  category: YAML
  times_hit: 4
  discovered: '2026-03-14'
  promoted: true
  status: active
  summary: 'Duplicate top-level template: keys silently drop the second block'
  detail: 'YAML silently drops duplicate top-level keys — second block becomes unavailable/restored.

    Audit: grep -c ''^template:'' file.yaml must return 1.

    delay_off invalid on state-based template sensors — silently kills sensor definition.

    Unindented comments inside template: lists break YAML list parsing.

    Entity registry orphans squat on canonical IDs -> new sensors get _2 suffix.

    '
  affects:
  - packages/
  tags:
  - yaml
  - template
  - duplicate
  - gotcha
- id: yaml_python_transform_sandbox
  category: YAML
  times_hit: 6
  discovered: '2026-02-01'
  promoted: true
  status: active
  summary: python_transform sandbox has critical restrictions — no import, str(), enumerate() etc
  detail: 'Sandbox restrictions (silent failures if violated):

    No: import, isinstance, str(), enumerate(), next(), any(), all(), try/except, slice syntax.

    Use .pop(index) for list deletion (higher indices first).

    Use direct index access only.

    NEVER list comprehension on root cards[] — silently wipes sections.

    ALWAYS force_reload:True before transform to get current hash.

    ONE comprehensive transform per section — never piecemeal.

    '
  affects:
  - dashboards/
  tags:
  - yaml
  - python_transform
  - dashboard
  - sandbox
- id: matter_aqara_recommission
  category: MATTER
  times_hit: 5
  discovered: '2026-01-01'
  promoted: true
  status: active
  summary: Matter recommission requires removing stale fabric from BOTH HA and Aqara app
  detail: 'Recommission fix: remove stale fabric from BOTH HA Matter AND Aqara app.

    Use BOTH Matter + HomeKit integrations — different devices exposed by each.

    M3 IR blaster does NOT expose to HA.

    Locks: Matter only. Some sensors: HomeKit only.

    Aqara Hub M3 MUST be on UDM Pro Port 4 — Port 2 causes unavailable cycles.

    '
  affects:
  - packages/
  tags:
  - matter
  - aqara
  - recommission
  - unifi
- id: dashboard_storage_backup
  category: DASHBOARD
  times_hit: 8
  discovered: '2026-02-01'
  promoted: true
  status: active
  summary: Storage-mode dashboard backup requires cp command — hac backup silently fails
  detail: "hac backup does NOT work for storage-mode dashboards — always fails silently.\nCorrect backup:\n  cp /homeassistant/.storage/lovelace.kitchen_wall_v2\
    \ \\\n     /homeassistant/hac/backups/kitchen-wall-v2-$(date +%Y%m%d-%H%M).json\nha_config_set_dashboard requires config_hash\
    \ matching current state.\nAlways ha_config_get_dashboard force_reload:True before any transform.\n"
  affects:
  - .storage/lovelace.kitchen_wall_v2
  tags:
  - dashboard
  - backup
  - storage
  - kitchen-wall
- id: hue_color_temp_kelvin
  category: DASHBOARD
  times_hit: 3
  discovered: '2026-02-01'
  promoted: true
  status: active
  summary: Hue groups require color_temp_kelvin not kelvin (400 error otherwise)
  detail: 'Use color_temp_kelvin parameter, not kelvin — kelvin causes 400 error.

    Hue room scenes control ALL lights in room including lamps.

    For ceiling-only control: target specific Hue zone entity not room-wide scenes.

    SBM switches must NEVER appear in light.turn_off actions — they power Hue bulbs.

    '
  affects:
  - packages/
  tags:
  - hue
  - color_temp
  - kelvin
  - sbm
- id: busybox_grep_sed_limits
  category: TERMINAL
  times_hit: 8
  discovered: '2026-01-01'
  promoted: true
  status: active
  summary: BusyBox grep/sed on HA Green have critical missing features
  detail: 'BusyBox grep: NO --include, NO long options.

    Use: grep -rEl ''pattern'' /path/ (not --include=*.yaml).

    BusyBox sed: NO multi-line, NO complex scripts.

    Use python3 heredoc for non-trivial file edits.

    Never chain after python3 -c on same line.

    Git errors (confused by unstable object): git gc --prune=now twice.

    '
  affects:
  - all
  tags:
  - terminal
  - busybox
  - grep
  - sed
  - zsh
- id: presence_template_sensor_gotchas
  category: PRESENCE
  times_hit: 3
  discovered: '2026-03-14'
  promoted: true
  status: active
  summary: Template binary_sensor presence gotchas — delay_off invalid, orphan IDs
  detail: 'delay_off is invalid on state-based template sensors — silently kills sensor.

    Entity registry orphans squat on canonical IDs — new sensors get _2 suffix.

    Fix orphans via two-step rename using ha_rename_entity.

    Michelle tracked via binary_sensor.michelle_actually_home ONLY — no companion app.

    Ella presence unreliable — tracks iPad not iPhone 17, tabled.

    '
  affects:
  - packages/presence_system.yaml
  tags:
  - presence
  - template
  - binary_sensor
  - entity_registry
- id: mcp_tool_constraints
  category: HAC
  times_hit: 6
  discovered: '2026-02-01'
  promoted: true
  status: active
  summary: HA MCP tools have non-obvious constraints that cause silent failures
  detail: 'ha_config_get_dashboard: requires force_reload:True for current state.

    ha_config_set_dashboard: requires matching config_hash — stale hash = write failure.

    ha_config_get_automation: returns config:null for ALL UI-created automations.

    ha_config_set_script: NEVER use on YAML-defined scripts — creates conflicting UI duplicate.

    ha_deep_search: may return stale cached results after restarts — verify with terminal grep.

    ha_rename_entity: only viable path for entity registry changes.

    '
  affects:
  - all
  tags:
  - mcp
  - ha_config
  - automation
  - dashboard
- id: music_assistant_spotify
  category: AUDIO
  times_hit: 2
  discovered: '2026-02-01'
  promoted: false
  status: active
  summary: Music Assistant requires bare Spotify playlist IDs not spotify:// URIs
  detail: 'music_assistant.play_media requires bare Spotify playlist IDs (e.g. 37i9dQZF1DWZd79rJ6a7lp).

    spotify://playlist/ID URI format causes 500 error.

    radio_mode: true extends playlists infinitely with similar tracks.

    Route through media_player.kitchen_2 (Music Assistant entity).

    '
  affects:
  - packages/
  tags:
  - music_assistant
  - spotify
  - media_player

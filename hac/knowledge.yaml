decisions:
- id: package_yaml_architecture
  date: '2026-01-01'
  summary: Package-based YAML under /homeassistant/packages/ with git version control
  rationale: Local control, auditable history, AI-friendly structure
  status: active
- id: presence_template_sensors
  date: '2026-03-14'
  summary: Replaced 10 input_boolean helpers + 11 automations with template binary_sensors
  rationale: Cleaner architecture, fewer moving parts, no automation race conditions
  status: active
- id: govee_matter_only
  date: '2026-02-01'
  summary: Govee H6076 via Matter on IoT VLAN — govee2mqtt approach abandoned
  rationale: govee2mqtt cross-VLAN confirmed dead end, Matter works reliably
  status: active
- id: fkb_service_control
  date: '2026-03-14'
  summary: FKB configured via fully_kiosk.set_config HA service, not port 2323
  rationale: Port 2323 unreachable cross-VLAN — HA service works without firewall changes
  status: active

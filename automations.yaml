            value_template: '{{ nxt == 1 }}'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.living_room_table_lamps_dimmed
        - conditions:
          - condition: template
            value_template: '{{ nxt == 2 }}'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.living_room_table_lamps_read
        - conditions:
          - condition: template
            value_template: '{{ nxt == 3 }}'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.living_room_table_lamps_nightlight
        - conditions:
          - condition: template
            value_template: '{{ nxt == 4 }}'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.living_room_table_lamps_bright
        - conditions:
          - condition: template
            value_template: '{{ nxt == 5 }}'
          sequence:
          - action: light.turn_off
            target:
              entity_id: light.living_room_table_lamps
    - conditions:
      - condition: trigger
        id: b2_long
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.living_room_table_lamps
      - action: input_number.set_value
        target:
          entity_id: input_number.lr_hue_table_lamps_scene_index
        data:
          value: 5
    - conditions:
      - condition: trigger
        id: b3_short
      sequence:
      - variables:
          nxt: '{{ ((states(''input_number.lr_hue_floor_lamps_scene_index'') | int)
            + 1) % 5 }}'
      - action: input_number.set_value
        target:
          entity_id: input_number.lr_hue_floor_lamps_scene_index
        data:
          value: '{{ nxt }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ nxt == 0 }}'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.living_room_floor_lamps_rest
        - conditions:
          - condition: template
            value_template: '{{ nxt == 1 }}'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.living_room_floor_lamps_read
        - conditions:
          - condition: template
            value_template: '{{ nxt == 2 }}'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.living_room_floor_lamps_nightlight
        - conditions:
          - condition: template

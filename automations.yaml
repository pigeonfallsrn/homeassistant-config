- id: '1776295734409'
  alias: Calendar → Refresh School Tomorrow
  description: Checks master calendar for no-school events tomorrow, sets school_tomorrow
    boolean. Runs at 17:00 daily and on HA start.
  triggers:
  - at: '17:00:00'
    platform: time
  - event: start
    platform: homeassistant
  actions:
  - action: calendar.get_events
    data:
      start_date_time: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d 00:00:00'')
        }}'
      end_date_time: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d 23:59:59'')
        }}'
    response_variable: tomorrow_events
    target:
      entity_id: calendar.master_calendar
  - variables:
      has_no_school: '{{ tomorrow_events[''calendar.master_calendar''].events | selectattr(''summary'',
        ''search'', ''(?i)(no school|school closed|holiday|inservice|break)'') | list
        | length > 0 }}'
      is_weekend: '{{ (now() + timedelta(days=1)).weekday() >= 5 }}'
  - if:
    - condition: template
      value_template: '{{ has_no_school or is_weekend }}'
    then:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.school_tomorrow
    else:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.school_tomorrow
  max_exceeded: silent
  mode: single
- id: '1776295744179'
  alias: Calendar → Refresh School In Session Now
  description: Checks master calendar for no-school events today, sets school_in_session_now
    boolean. Runs hourly.
  triggers:
  - hours: /1
    platform: time_pattern
  actions:
  - action: calendar.get_events
    data:
      end_date_time: '{{ now().strftime(''%Y-%m-%d 23:59:59'') }}'
      start_date_time: '{{ now().strftime(''%Y-%m-%d 00:00:00'') }}'
    response_variable: today_events
    target:
      entity_id: calendar.master_calendar
  - variables:
      has_no_school: '{{ today_events[''calendar.master_calendar''].events | selectattr(''summary'',
        ''search'', ''(?i)(no school|school closed|holiday|inservice|break)'') | list
        | length > 0 }}'
      is_weekend: '{{ now().weekday() >= 5 }}'
  - else:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.school_in_session_now
    if:
    - condition: template
      value_template: '{{ has_no_school or is_weekend }}'
    then:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.school_in_session_now
  max_exceeded: silent
  mode: single

      - condition: trigger
        id: south_opened
      sequence:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          title: "\U0001F513 South Garage Open"
          message: Arrived home — South door is open
          data:
            tag: arrival_john
            group: garage
            channel: Garage
            importance: high
            ttl: 0
            priority: high
            sticky: true
            timeout: 300
            notification_icon: mdi:garage-open-variant
            clickAction: /lovelace/garage
            actions:
            - action: CLOSE_SOUTH
              title: "\U0001F512 Close South"
            - action: OPEN_NORTH
              title: "\U0001F6AA Open North"
            - action: DISMISS_SOUTH
              title: ✔️ All Good

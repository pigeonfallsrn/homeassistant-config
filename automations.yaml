        state: 'off'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.basement_hallway_smart_switch
  mode: restart
- id: '1774577899551'
  alias: Midnight — All Lights Off
  description: Hard off for all interior lights at midnight. Motion automations pick
    back up normally after this (late night tiers). Excludes outdoor lights and nightlights
    (those have their own schedules). Kids bedrooms excluded — they have their own

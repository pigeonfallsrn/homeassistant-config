      - light.1st_floor_bathroom
      - light.1st_floor_bathroom_vanity_lights_tp_link_smart_dimmer_switch
      - light.2nd_floor_bathroom
      - light.master_bedroom
      - light.master_bedroom_led_light_strip
      - light.master_bedroom_wall_light
      - light.master_bedroom_behind_tv_aqara_t1_led_strip
      - light.living_room_lounge_ceiling_light
  - action: switch.turn_off
    target:
      entity_id: switch.basement_hallway_smart_switch
  mode: single
- id: kitchen_manual_override_inovelli_trigger
  alias: Kitchen Manual Override — Inovelli 2x Tap Set
  description: Double-tap UP on kitchen chandelier or above-sink Inovelli switch sets
    BOTH kitchen_manual_override and kitchen_lounge_manual_override ON and starts
    the 30-min override timer. Motion automation is suppressed until timer expires
    or 2x-tap DOWN clears it.
  triggers:
  - event_data:
      command: button_2_double
      device_id: 17a59d3c437c3475f22c29dd2b76777a
    event_type: zha_event
    id: chandelier_2x_up
    platform: event
  - event_data:
      command: button_2_double
      device_id: 89ca030d64760ad87512e97d13a2737d
    event_type: zha_event
    id: sink_2x_up
    platform: event
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id:
      - input_boolean.kitchen_manual_override
      - input_boolean.kitchen_lounge_manual_override
  - action: timer.start
    target:
      entity_id: timer.kitchen_override_timer
    data:
      duration: 0:30:00
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      title: Kitchen Override ON
      message: Motion auto-off suppressed for 30 min. 2x-tap DOWN to cancel early.
      data:
        priority: high
        tag: kitchen_override
        ttl: 0
  mode: single
- id: '1775623389364'
  alias: Hot Tub Mode — Pause/Resume Kitchen Motion Automations
  description: When hot tub mode activates, disable all kitchen motion automations.
    Re-enable when hot tub mode turns off.
  triggers:
  - platform: state
    entity_id: input_boolean.hot_tub_mode
    to: 'on'
    id: hot_tub_on
  - platform: state
    entity_id: input_boolean.hot_tub_mode
    to: 'off'
    id: hot_tub_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: hot_tub_on
      sequence:
      - action: automation.turn_off
        target:
          entity_id:
          - automation.kitchen_lounge_motion_lighting
          - automation.kitchen_tier_2_dimmers_on_with_motion
          - automation.kitchen_tier_2_dimmers_off_no_motion
    - conditions:
      - condition: trigger
        id: hot_tub_off
      sequence:
      - action: automation.turn_on
        target:
          entity_id:
          - automation.kitchen_lounge_motion_lighting
          - automation.kitchen_tier_2_dimmers_on_with_motion
          - automation.kitchen_tier_2_dimmers_off_no_motion
  mode: single
- id: '1775698609244'
  alias: Kitchen Manual Override — Clear (Timer or 2x Tap DOWN)
  description: Clears kitchen_manual_override and kitchen_lounge_manual_override when
    the 30-min override timer expires OR the user double-taps DOWN on the chandelier
    or above-sink switch. Also cancels the timer if still running (so 2x DOWN cleans
    up immediately).
  triggers:
  - event_data:
      entity_id: timer.kitchen_override_timer
    event_type: timer.finished
    id: timer_done
    platform: event
  - event_data:
      command: button_1_double
      device_id: 17a59d3c437c3475f22c29dd2b76777a
    event_type: zha_event
    id: chandelier_2x_down
    platform: event
  - event_data:
      command: button_1_double
      device_id: 89ca030d64760ad87512e97d13a2737d
    event_type: zha_event
    id: sink_2x_down
    platform: event
  actions:
  - action: timer.cancel
    target:
      entity_id: timer.kitchen_override_timer
  - action: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.kitchen_manual_override
      - input_boolean.kitchen_lounge_manual_override
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      data:
        priority: high
        tag: kitchen_override
        ttl: 0
      message: Motion auto-off restored.
      title: Kitchen Override OFF
  mode: single

  alias: Master Bedroom — Tap Dial Switch
  description: B1=Relax B2=Energize B3=Nightlight B4=Fan Toggle B4-Hold=All Off Rotary=Brightness
  triggers:
  - entity_id: event.master_bedroom_tap_dial_switch_button_1
    id: b1

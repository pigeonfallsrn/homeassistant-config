      else ''Driveway Door'' }}'
    package_camera: '{{ ''camera.very_front_door_package_camera'' if trigger.entity_id
      == ''binary_sensor.very_front_door_package_detected'' else ''camera.front_driveway_door_package_camera''
      }}'
    snapshot_path: '{{ ''/config/www/doorbell/package_front.jpg'' if trigger.entity_id
      == ''binary_sensor.very_front_door_package_detected'' else ''/config/www/doorbell/package_driveway.jpg''
      }}'
- actions:
  - action: script.ella_gentle_wake
  alias: Ella - Wake With Echo Alarm
  conditions:
  - condition: template
    value_template: '{{ state_attr(''sensor.ella_s_bedroom_echo_show_next_alarm_2'',
      ''status'') == ''ON'' or (as_timestamp(now()) - as_timestamp(state_attr(''sensor.ella_s_bedroom_echo_show_next_alarm_2'',
      ''dismissed'') | default(''2000-01-01'', true))) | float(9999) < 120 }}'
  - condition: state
    entity_id: input_boolean.ella_home
    state: 'on'
  - condition: state
    entity_id: input_boolean.ella_bedroom_override
    state: 'off'
  description: Mirrors alaina_wake_echo_alarm. Fires every minute, checks if Ella's
    Echo alarm is in the active/ringing window (within last 2 min). Runs ella_gentle_wake
    script to brighten lights at actual alarm time. Complements ella_gentle_wake_before_alarm
    which fires 15 min prior.
  id: '1773360880637'
  mode: single
  triggers:
  - minutes: /1
    platform: time_pattern
- actions:
  - choose:
    - conditions:
      - condition: trigger
        id: ella_charging
      - condition: state
        entity_id: binary_sensor.ella_home
        state: 'on'
      - condition: state
        entity_id: input_boolean.ella_bedroom_override
        state: 'off'
      - condition: state
        entity_id: light.ella_s_bedroom
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 15
          color_temp_kelvin: 2200
          transition: 30
        target:
          entity_id: light.ella_s_bedroom
      - delay:
          minutes: 45
      - condition: state
        entity_id: input_boolean.ella_bedroom_override
        state: 'off'
      - action: light.turn_off
        data:
          transition: 60
        target:
          entity_id: light.ella_s_bedroom
    - conditions:
      - condition: trigger
        id: alaina_charging
      - condition: state
        entity_id: binary_sensor.alaina_home
        state: 'on'
      - condition: state
        entity_id: input_boolean.alaina_bedroom_override
        state: 'off'
      - condition: state
        entity_id: light.alaina_s_bedroom
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 15
          color_temp_kelvin: 2200
          transition: 30
        target:
          entity_id: light.alaina_s_bedroom
      - delay:
          minutes: 45
      - condition: state
        entity_id: input_boolean.alaina_bedroom_override
        state: 'off'
      - action: light.turn_off
        data:
          transition: 60
        target:
          entity_id: light.alaina_s_bedroom
  alias: Girls → Bedtime Winddown Lighting

        target:
          entity_id:
          - light.living_room_floor_lamps
          - light.living_room_table_lamps
      - action: input_number.set_value
        target:
          entity_id: input_number.lr_hue_all_lamps_scene_index
        data:
          value: 4
      - action: input_number.set_value
        target:
          entity_id: input_number.lr_hue_table_lamps_scene_index

- id: '1773152820854'
  alias: Doorbell Ring → Notification with Snapshot
  description: Sends a push notification with camera snapshot to John when either
    doorbell is pressed. Uses event entity trigger (not binary_sensor) for reliability.
    Snapshots saved to www/doorbell/ and included in notification.
  triggers:
  - alias: Very Front Door ring
    entity_id: event.very_front_door_doorbell
    platform: state
  - alias: Front Driveway Door ring
    entity_id: event.front_driveway_door_doorbell
    platform: state
  actions:
  - delay:
      seconds: 2
  - action: camera.snapshot
    data:
      filename: '{{ snapshot_path }}'
    target:
      entity_id: '{{ camera_entity }}'
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      data:
        channel: Doorbell
        image: '{{ snapshot_path | replace(''/config/www'', ''/local'') }}'
        importance: high
        priority: high
        tag: doorbell_{{ doorbell_label | lower | replace(' ', '_') }}
        ttl: 0
        clickAction: entityId:{{ click_entity }}
      message: Someone is at the {{ doorbell_label }}
      title: "\U0001F514 Doorbell — {{ doorbell_label }}"
  max: 2
  mode: parallel
  variables:
    camera_entity: '{{ ''camera.very_front_door_high_resolution_channel'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''camera.front_driveway_door_high_resolution_channel''
      }}'
    doorbell_label: '{{ ''Front Door'' if trigger.entity_id == ''event.very_front_door_doorbell''
      else ''Driveway Door'' }}'
    snapshot_path: '{{ ''/config/www/doorbell/snapshot_front.jpg'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''/config/www/doorbell/snapshot_driveway.jpg''
      }}'
    click_entity: '{{ ''camera.very_front_door_high_resolution_channel'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''camera.front_driveway_door_high_resolution_channel''
      }}'
- id: '1773153864754'
  alias: Doorbell Package Detected → Notification
  description: Sends a push notification with package camera snapshot to John when
    a package is detected at either doorbell. Daytime only (7am–10pm). Uses dedicated
    package camera on G4 Doorbell Pro for reliable close-up snapshot.
  triggers:
  - alias: Very Front Door package detected
    entity_id: binary_sensor.very_front_door_package_detected
    platform: state
    to: 'on'
  - alias: Front Driveway Door package detected
    entity_id: binary_sensor.front_driveway_door_package_detected
    platform: state
    to: 'on'
  conditions:
  - after: 07:00:00
    before: '22:00:00'
    condition: time
  actions:
  - delay:
      seconds: 3
  - action: camera.snapshot
    data:
      filename: '{{ snapshot_path }}'
    target:
      entity_id: '{{ package_camera }}'
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      data:
        channel: Doorbell
        image: '{{ snapshot_path | replace(''/config/www'', ''/local'') }}'
        importance: default
        tag: package_{{ doorbell_label | lower | replace(' ', '_') }}
      message: A package was detected at the {{ doorbell_label }}
      title: "\U0001F4E6 Package Delivered — {{ doorbell_label }}"
  max: 2
  mode: parallel
  variables:
    doorbell_label: '{{ ''Front Door'' if trigger.entity_id == ''binary_sensor.very_front_door_package_detected''
      else ''Driveway Door'' }}'
    package_camera: '{{ ''camera.very_front_door_package_camera'' if trigger.entity_id
      == ''binary_sensor.very_front_door_package_detected'' else ''camera.front_driveway_door_package_camera''
      }}'
    snapshot_path: '{{ ''/config/www/doorbell/package_front.jpg'' if trigger.entity_id
      == ''binary_sensor.very_front_door_package_detected'' else ''/config/www/doorbell/package_driveway.jpg''
      }}'
- id: '1773361493420'
  alias: Girls → Bedtime Winddown Lighting
  description: When either girl's phone goes on the charger after 8:30pm while home,
    dims their bedroom lights to a warm sleepy scene and schedules auto-off at 45min.
    Uses binary_sensor.ella_home / binary_sensor.alaina_home (Phase 9.1 template sensors,
    not legacy input_booleans).
  triggers:
  - entity_id: sensor.iphone_40_battery_state
    id: ella_charging
    platform: state
    to: Charging
  - entity_id: sensor.alaina_s_iphone_17_iphone_battery_state
    id: alaina_charging
    platform: state
    to: Charging
  conditions:
  - after: '20:30:00'
    before: '23:59:59'
    condition: time
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: ella_charging
      - condition: state
        entity_id: binary_sensor.ella_home
        state: 'on'
      - condition: state
        entity_id: input_boolean.ella_bedroom_override
        state: 'off'
      - condition: state
        entity_id: light.ella_s_bedroom
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 15
          color_temp_kelvin: 2200
          transition: 30
        target:
          entity_id: light.ella_s_bedroom
      - delay:
          minutes: 45
      - condition: state
        entity_id: input_boolean.ella_bedroom_override
        state: 'off'
      - action: light.turn_off
        data:
          transition: 60
        target:
          entity_id: light.ella_s_bedroom
    - conditions:
      - condition: trigger
        id: alaina_charging
      - condition: state
        entity_id: binary_sensor.alaina_home
        state: 'on'
      - condition: state
        entity_id: input_boolean.alaina_bedroom_override
        state: 'off'
      - condition: state
        entity_id: light.alaina_s_bedroom
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 15
          color_temp_kelvin: 2200
          transition: 30
        target:
          entity_id: light.alaina_s_bedroom
      - delay:
          minutes: 45
      - condition: state
        entity_id: input_boolean.alaina_bedroom_override
        state: 'off'
      - action: light.turn_off
        data:
          transition: 60
        target:
          entity_id: light.alaina_s_bedroom
  max: 2
  mode: parallel
- id: garage_auto_close_departure
  alias: Garage — Auto Close North on Departure
  description: When John leaves home and North garage door is open, notify and auto-close
    after 60s. Tap KEEP OPEN to cancel.
  triggers:
  - platform: state
    entity_id: person.john_spencer
    from: home
    to: not_home
  conditions:
  - condition: state
    entity_id: cover.garage_north_garage_door_ratgdo32disco_door
    state: open
  actions:
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      title: "\U0001F6AA Garage Still Open"
      message: North door closing in 60s
      data:
        actions:
        - action: CANCEL_AUTO_CLOSE
          title: KEEP OPEN
        priority: high
        tag: garage_auto_close
        ttl: 0
  - wait_for_trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: CANCEL_AUTO_CLOSE
    timeout:
      seconds: 60
    continue_on_timeout: true
  - if:
    - condition: template
      value_template: '{{ wait.trigger is not none }}'
    then:
    - action: notify.mobile_app_galaxy_s26_ultra
      data:
        title: "\U0001F6AA Garage"
        message: Auto-close cancelled
        data:
          tag: garage_auto_close
          timeout: 30
    else:
    - condition: state
      entity_id: cover.garage_north_garage_door_ratgdo32disco_door
      state: open
    - action: cover.close_cover
      target:
        entity_id: cover.garage_north_garage_door_ratgdo32disco_door
    - action: notify.mobile_app_galaxy_s26_ultra
      data:
        title: "\U0001F512 Garage"
        message: North door closed
        data:
          tag: garage_auto_close
          timeout: 30
  mode: single

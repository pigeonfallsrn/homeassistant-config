- id: '1776365074522'
  alias: Upstairs Hallway → Motion Lighting v2
  description: 'Time-aware motion lighting. Triggers: hallway Aqara P1 + bathroom
    motion. 06:00-21:30=Energize, 21:30-23:00=70%/3000K, 23:00-06:00=10%/2200K. 2026-03-24:
    fixed stale P1 entity in motion_aggregation.yaml (was _2 orphan).'
  triggers:
  - platform: state
    entity_id:
    - binary_sensor.upstairs_hallway_motion
    - binary_sensor.upstairs_bathroom_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id:
    - binary_sensor.upstairs_hallway_motion
    - binary_sensor.upstairs_bathroom_motion
    to: 'off'
    for:
      minutes: 3
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: '23:00:00'
            before: 06:00:00
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.upstairs_hallway
            data:
              brightness_pct: 10
              color_temp_kelvin: 2200
              transition: 2
        - conditions:
          - condition: time
            after: '21:30:00'
            before: '23:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.upstairs_hallway
            data:
              brightness_pct: 70
              color_temp_kelvin: 3000
              transition: 2
        default:
        - action: scene.turn_on
          target:
            entity_id: scene.upstairs_hallway_energize
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.upstairs_hallway
        data:
          transition: 5
  mode: restart
- id: '1776366035204'
  alias: 2nd Floor Bathroom — Humidity Fan Control v4
  description: 'Smart humidity control: Auto-on >70% or motion+60%, auto-off <55%+no
    motion 5min. Config button pause 24hr.'
  triggers:
  - platform: numeric_state
    entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
    above: 70
    id: high_humidity
  - platform: state
    entity_id: binary_sensor.upstairs_bathroom_motion
    to: 'on'
    id: motion_detected
  - platform: numeric_state
    entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
    below: 55
    for:
      minutes: 2
    id: low_humidity
  - platform: state
    entity_id: binary_sensor.upstairs_bathroom_motion
    to: 'off'
    for:
      minutes: 5
    id: no_motion
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.humidity_fan_paused
        state: 'off'
      - condition: trigger
        id:
        - high_humidity
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan_inovelli_fan
        data:
          percentage: 100
    - conditions:
      - condition: state
        entity_id: input_boolean.humidity_fan_paused
        state: 'off'
      - condition: trigger
        id:
        - motion_detected
      - condition: numeric_state
        entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
        above: 60
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan_inovelli_fan
        data:
          percentage: 75
    - conditions:
      - condition: state
        entity_id: input_boolean.humidity_fan_paused
        state: 'off'
      - condition: or
        conditions:
        - condition: trigger
          id:
          - low_humidity
        - condition: trigger
          id:
          - no_motion
      - condition: numeric_state
        entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
        below: 55
      - condition: state
        entity_id: binary_sensor.upstairs_bathroom_motion
        state: 'off'
        for:
          minutes: 5
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan_inovelli_fan
  mode: restart
- id: '1776366136920'
  alias: 2nd Floor Bathroom — Config Button Fan Pause
  description: Config button press → pause humidity fan 24hr + notification
  triggers:
  - event_data:
      device_ieee: b0:c7:de:ff:fe:61:6c:5e
    event_type: zha_event
    platform: event
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.command == ''config_1x'' }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.humidity_fan_paused
      - action: notify.mobile_app_galaxy_s26_ultra
        data:
          data:
            actions:
            - action: HUMIDITY_UNPAUSE
              title: Resume Now
            - action: HUMIDITY_EXTEND
              title: Extend 12hr
            priority: high
            tag: humidity_pause
            timeout: 300
          message: 'Bathroom humidity fan paused for 24 hours. Current humidity: {{
            states(''sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity'')
            }}%'
          title: "\U0001F4A8 Fan Paused"
      - action: timer.start
        data:
          duration: '24:00:00'
        target:
          entity_id: timer.humidity_fan_pause_timer
  mode: restart
- id: '1776366148290'
  alias: 2nd Floor Bathroom — Humidity Notification Actions
  description: Handle pause/resume notification button actions
  triggers:
  - event_type: mobile_app_notification_action
    platform: event
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''HUMIDITY_UNPAUSE'' }}'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.humidity_fan_paused
      - action: timer.cancel
        target:
          entity_id: timer.humidity_fan_pause_timer
      - action: notify.mobile_app_galaxy_s26_ultra
        data:
          data:
            tag: humidity_pause
          message: clear_notification
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''HUMIDITY_EXTEND'' }}'
      sequence:
      - action: timer.start
        data:
          duration: '12:00:00'
        target:
          entity_id: timer.humidity_fan_pause_timer
      - action: notify.mobile_app_galaxy_s26_ultra
        data:
          data:
            tag: humidity_pause
          message: Humidity fan pause extended 12 hours
          title: "\U0001F4A8 Extended"
  mode: restart
- id: '1776366154798'
  alias: 2nd Floor Bathroom — Humidity Pause Timer Expiry
  description: Auto-resume fan when 24hr timer expires
  triggers:
  - entity_id: timer.humidity_fan_pause_timer
    platform: state
    to: idle
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.humidity_fan_paused
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      message: Humidity fan pause expired - automatic control resumed
      title: "\U0001F4A8 Resumed"
  mode: restart
- id: '1776535781702'
  alias: Entry Room — Lamp Motion Control
  description: 'Consolidated motion-based lamp control. Motion on: turn on lamp with
    AL at context-aware brightness (lux gated). Motion off 3min: dim to 20%. Motion
    off 10min: full off. Respects manual override, hot tub mode, and bedtime mode.'
  triggers:
  - platform: state
    entity_id: binary_sensor.entry_room_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id: binary_sensor.entry_room_motion
    to: 'off'
    for:
      minutes: 3
    id: motion_dim
  - platform: state
    entity_id: binary_sensor.entry_room_motion
    to: 'off'
    for:
      minutes: 10
    id: motion_off
  conditions:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.dad_bedtime_mode
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - condition: numeric_state
        entity_id: sensor.entry_room_average_lux
        below: input_number.entry_room_lux_threshold
      - action: switch.turn_on
        target:
          entity_id: switch.living_spaces_adaptive_lighting_living_spaces
      - action: light.turn_on
        target:
          entity_id: light.entry_room_desk_lamp
        data:
          brightness_pct: '{{ states(''sensor.evening_lamp_max_brightness'') | int
            }}'
      - action: adaptive_lighting.apply
        data:
          entity_id: switch.entry_room_lamp_adaptive_adaptive_lighting_entry_room_lamp_adaptive
          lights:
          - light.entry_room_desk_lamp
          transition: 2
    - conditions:
      - condition: trigger
        id: motion_dim
      - condition: state
        entity_id: light.entry_room_desk_lamp
        state: 'on'
      - condition: numeric_state
        entity_id: light.entry_room_desk_lamp
        attribute: brightness
        above: 50
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.entry_room_desk_lamp
        data:
          brightness_pct: 20
          transition: 60
    - conditions:
      - condition: trigger
        id: motion_off
      - condition: state
        entity_id: light.entry_room_desk_lamp
        state: 'on'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.entry_room_desk_lamp
        data:
          transition: 60
  mode: restart
- id: '1776535795628'
  alias: Entry Room — Lamp Mode Overrides
  description: 'Handles hot tub mode and bedtime mode lamp behavior. Hot tub on: deep
    red 5%, disable AL. Hot tub off: restore AL and normal operation. Bedtime on:
    dim warm fade then off after 15min.'
  triggers:
  - entity_id: input_boolean.hot_tub_mode
    id: hot_tub_on
    platform: state
    to: 'on'
  - entity_id: input_boolean.hot_tub_mode
    id: hot_tub_off
    platform: state
    to: 'off'
  - entity_id: input_boolean.dad_bedtime_mode
    id: bedtime_on
    platform: state
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: hot_tub_on
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 5
          rgb_color:
          - 255
          - 30
          - 0
          transition: 2
        target:
          entity_id: light.entry_room_desk_lamp
      - action: switch.turn_off
        target:
          entity_id:
          - switch.entry_room_lamp_adaptive_adaptive_lighting_entry_room_lamp_adaptive
          - switch.entry_room_ceiling_adaptive_lighting_entry_room_ceiling
          - switch.living_spaces_adaptive_lighting_living_spaces
    - conditions:
      - condition: trigger
        id: hot_tub_off
      sequence:
      - action: switch.turn_on
        target:
          entity_id:
          - switch.living_spaces_adaptive_lighting_living_spaces
          - switch.entry_room_lamp_adaptive_adaptive_lighting_entry_room_lamp_adaptive
          - switch.entry_room_ceiling_adaptive_lighting_entry_room_ceiling
      - action: adaptive_lighting.apply
        data:
          entity_id: switch.living_spaces_adaptive_lighting_living_spaces
          lights:
          - light.entry_room_desk_lamp
          transition: 5
    - conditions:
      - condition: trigger
        id: bedtime_on
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 10
          color_temp_kelvin: 2200
          transition: 60
        target:
          entity_id: light.entry_room_desk_lamp
      - delay:
          minutes: 15
      - action: light.turn_off
        data:
          transition: 60
        target:
          entity_id: light.entry_room_desk_lamp
  mode: restart
- id: '1776535826103'
  alias: Entry Room — AUX Switch Control
  description: AUX switch mirrors main Inovelli. UP=Energize ceiling, DOWN=Off ceiling
    (instant), Config=scene cycle (Energize→Relax→Nightlight) using shared scene index
    helper. Targets ceiling zone only.
  triggers:
  - event_data:
      command: button_5_press
      device_ieee: 8c:8b:48:ff:fe:4d:18:9f
    event_type: zha_event
    id: aux_up
    platform: event
  - event_data:
      command: button_4_press
      device_ieee: 8c:8b:48:ff:fe:4d:18:9f
    event_type: zha_event
    id: aux_down
    platform: event
  - event_data:
      command: 'off'
      device_ieee: 8c:8b:48:ff:fe:4d:18:9f
    event_type: zha_event
    id: aux_off_cmd
    platform: event
  - event_data:
      command: button_6_press
      device_ieee: 8c:8b:48:ff:fe:4d:18:9f
    event_type: zha_event
    id: aux_config
    platform: event
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: aux_up
      sequence:
      - action: light.turn_on
        data:
          brightness: 255
          color_temp_kelvin: 6500
        target:
          entity_id: light.entry_room_ceiling_light
    - conditions:
      - condition: trigger
        id:
        - aux_down
        - aux_off_cmd
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.entry_room_ceiling_light
    - conditions:
      - condition: trigger
        id: aux_config
      sequence:
      - action: input_number.set_value
        data:
          value: '{{ ((states(''input_number.entry_room_scene_index'') | int + 1)
            % 3) }}'
        target:
          entity_id: input_number.entry_room_scene_index
      - choose:
        - conditions:
          - condition: state
            entity_id: input_number.entry_room_scene_index
            state: '0.0'
          sequence:
          - action: light.turn_on
            data:
              brightness: 255
              color_temp_kelvin: 6500
            target:
              entity_id: light.entry_room_ceiling_light
        - conditions:
          - condition: state
            entity_id: input_number.entry_room_scene_index
            state: '1.0'
          sequence:
          - action: light.turn_on
            data:
              brightness: 144
              color_temp_kelvin: 2200
            target:
              entity_id: light.entry_room_ceiling_light
        - conditions:
          - condition: state
            entity_id: input_number.entry_room_scene_index
            state: '2.0'
          sequence:
          - action: light.turn_on
            data:
              brightness: 26
              color_temp_kelvin: 2000
            target:
              entity_id: light.entry_room_ceiling_light
  mode: restart
- id: '1776568827007'
  alias: 1st Floor Bathroom — Reset Light Override (30 min)
  description: Auto-clear manual override after 30 minutes so motion automation resumes
  triggers:
  - platform: state
    entity_id: input_boolean.bathroom_manual_override
    to: 'on'
    for:
      minutes: 30
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.bathroom_manual_override
  mode: restart
- id: '1776568837462'
  alias: 2nd Floor Bathroom — Reset Fan Override (30 min)
  description: Auto-clear fan manual override after 30 minutes
  triggers:
  - entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
    for:
      minutes: 30
    platform: state
    to: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
  mode: restart
- id: '1776568867766'
  alias: Front Driveway — Motion Lighting
  description: Hue motion sensor + UniFi person/vehicle detection. Energize scene
    on motion after dark, auto-off 5min no motion or 15min hard cap.
  triggers:
  - platform: state
    entity_id: binary_sensor.front_driveway_hue_motion
    to: 'on'
    id: hue_motion
  - platform: state
    entity_id: binary_sensor.front_driveway_door_person_detected
    to: 'on'
    id: unifi_person
  - platform: state
    entity_id: binary_sensor.front_driveway_door_vehicle_detected
    to: 'on'
    id: unifi_vehicle
  conditions:
  - condition: sun
    after: sunset
    after_offset: -00:15:00
  actions:
  - action: scene.turn_on
    target:
      entity_id: scene.front_driveway_energize_2
  - wait_for_trigger:
    - platform: template
      value_template: '{{ is_state(''binary_sensor.front_driveway_hue_motion'', ''off'')
        and is_state(''binary_sensor.front_driveway_door_person_detected'', ''off'')
        }}'
      for:
        minutes: 5
    timeout:
      minutes: 15
    continue_on_timeout: true
  - action: light.turn_off
    target:
      entity_id: light.front_driveway_2
    data:
      transition: 5
  mode: restart
- id: '1776568947349'
  alias: Living Room TV OFF → Full AV System OFF
  description: When living room TV turns off, shut down Yamaha AVR, its plug, Echo
    Show plug, and TV backlight strip
  triggers:
  - entity_id: media_player.living_room_tv
    platform: state
    to: 'off'
  actions:
  - target:
      entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    action: media_player.turn_off
  - delay: 00:00:05
  - target:
      entity_id: switch.basement_yamaha_av_receiver_plug
    action: switch.turn_off
  - target:
      entity_id: switch.kitchen_echo_show_plug
    action: switch.turn_off
  - data:
      transition: 3
    target:
      entity_id: light.living_room_tv_smart_light_strip
    action: light.turn_off
  mode: restart
- id: '1776687372437'
  alias: Garage — Motion Lights OFF
  description: Turn off all garage lights after no motion for the configured timeout
    period, only when both doors are closed.
  triggers:
  - entity_id: binary_sensor.garage_motion_combined
    for:
      minutes: '{{ states(''input_number.garage_light_timeout'') | int(10) }}'
    platform: state
    to: 'off'
  conditions:
  - condition: state
    entity_id: cover.garage_north_garage_door_ratgdo32disco_door
    state: closed
  - condition: state
    entity_id: cover.garage_south_garage_door_ratgdo32disco_door
    state: closed
  actions:
  - action: light.turn_off
    data:
      transition: 5
    target:
      entity_id:
      - light.garage
      - light.garage_north_wall_nightlight
      - light.garage_north_of_east_wall_motion_light_sensor
      - light.garage_south_wall_motion_light_sensor
      - light.garage_south_of_east_wall_motion_light_sensor
  mode: restart
- id: '1776804713901'
  alias: 2nd Floor Bathroom — Fan Override Auto-Reset (30 min)
  description: Resets manual override flag 30 minutes after paddle press, allowing
    humidity auto-fan to resume. Mode:restart means repeated paddle presses reset
    the 30-min window.
  triggers:
  - entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
    platform: state
    to: 'on'
  actions:
  - delay:
      minutes: 30
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
  mode: restart
- id: '1776914781061'
  alias: Back Patio — Motion Lighting
  description: Hue outdoor motion sensor. Energize scene on motion after dark, auto-off
    5min no motion or 15min hard cap.
  triggers:
  - entity_id: binary_sensor.back_patio_hue_motion
    platform: state
    to: 'on'
  conditions:
  - after: sunset
    after_offset: -00:15:00
    condition: sun
  actions:
  - action: scene.turn_on
    target:
      entity_id: scene.back_patio_energize
  - continue_on_timeout: true
    timeout:
      minutes: 15
    wait_for_trigger:
    - entity_id: binary_sensor.back_patio_hue_motion
      for:
        minutes: 5
      platform: state
      to: 'off'
  - action: light.turn_off
    data:
      transition: 5
    target:
      entity_id: light.back_patio
  mode: restart
- id: '1776914800390'
  alias: Outdoor Lights — Sunset Schedule
  description: 'Sunset: Relax on all outdoor areas. 11pm: switch to Nightlight. Sunrise:
    off. Covers Front Driveway, Very Front Door, Back Patio.'
  triggers:
  - id: sunset
    platform: sun
    event: sunset
    offset: -00:15:00
  - id: late_night
    platform: time
    at: '23:00:00'
  - id: sunrise
    platform: sun
    event: sunrise
    offset: 00:15:00
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sunset
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.front_driveway_relax
      - action: scene.turn_on
        target:
          entity_id: scene.very_front_door_relax
      - action: scene.turn_on
        target:
          entity_id: scene.back_patio_relax
    - conditions:
      - condition: trigger
        id: late_night
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.front_driveway_nightlight
      - action: scene.turn_on
        target:
          entity_id: scene.very_front_door_nightlight
      - action: scene.turn_on
        target:
          entity_id: scene.back_patio_nightlight
    - conditions:
      - condition: trigger
        id: sunrise
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.front_driveway_2
          - light.very_front_door
          - light.back_patio
  mode: single
- id: '1776917609878'
  alias: Master Bedroom — FOH Fan + Light Control
  description: MB FOH switch. Left=fan (up=cycle low/med/high, long=high, down=off).
    Right side=bridge-direct (Energize/off on MB Ceiling zone). B4 long press=whole
    home off (all Hue + fans + ceiling lights).
  triggers:
  - entity_id: event.mb_foh_button_1
    id: b1
    platform: state
  - entity_id: event.mb_foh_button_2
    id: b2
    platform: state
  - entity_id: event.mb_foh_button_4
    id: b4_long
    platform: state
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.attributes.event_type in [''short_release'',
      ''long_release''] }}'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: b1
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: fan.set_percentage
        data:
          percentage: '{% set pct = state_attr(''fan.master_bedroom_fan'', ''percentage'')
            | int(0) %}

            {% if pct == 0 %}33

            {% elif pct <= 33 %}66

            {% elif pct <= 66 %}100

            {% else %}33{% endif %}'
        target:
          entity_id: fan.master_bedroom_fan
    - conditions:
      - condition: trigger
        id: b1
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''long_release''
          }}'
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 100
        target:
          entity_id: fan.master_bedroom_fan
    - conditions:
      - condition: trigger
        id: b2
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.master_bedroom_fan
    - conditions:
      - condition: trigger
        id: b4_long
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''long_release''
          }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.whole
      - action: light.turn_off
        target:
          entity_id: light.living_room_ceiling
      - action: fan.turn_off
        target:
          entity_id:
          - fan.master_bedroom_fan
          - fan.living_room_fan
  max: 5
  mode: queued
- id: '1776918377212'
  alias: Living Room — Tap Dial (TV + Rotary)
  description: Companion to bridge tap dial. Bridge handles button scenes. HA handles
    TV backlight + rotary dimming.
  triggers:
  - entity_id: event.living_room_tap_dial_button_1
    id: b1
    platform: state
  - entity_id: event.living_room_tap_dial_button_2
    id: b2
    platform: state
  - entity_id: event.living_room_tap_dial_button_3
    id: b3
    platform: state
  - entity_id: event.living_room_tap_dial_button_4
    id: b4
    platform: state
  - entity_id: event.living_room_tap_dial_rotary
    id: rotary
    platform: state
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.attributes.event_type in [''short_release'',
      ''clock_wise'', ''counter_clock_wise''] }}'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: b1
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 10
          color_temp_kelvin: 2700
        target:
          entity_id: light.living_room_behind_tv_tp_link_smart_light_strip
    - conditions:
      - condition: trigger
        id: b2
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 12
          color_temp_kelvin: 2700
        target:
          entity_id: light.living_room_behind_tv_tp_link_smart_light_strip
    - conditions:
      - condition: trigger
        id: b3
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 6
          color_temp_kelvin: 2700
        target:
          entity_id: light.living_room_behind_tv_tp_link_smart_light_strip
    - conditions:
      - condition: trigger
        id: b4
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.living_room_behind_tv_tp_link_smart_light_strip
    - conditions:
      - condition: trigger
        id: rotary
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''clock_wise''
          }}'
      sequence:
      - action: light.turn_on
        data:
          brightness_step_pct: 5
        target:
          entity_id: light.living_room
    - conditions:
      - condition: trigger
        id: rotary
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''counter_clock_wise''
          }}'
      sequence:
      - action: light.turn_on
        data:
          brightness_step_pct: -5
        target:
          entity_id: light.living_room
  max: 5
  mode: queued

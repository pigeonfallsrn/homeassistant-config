      - action: media_player.select_sound_mode
        data:
          sound_mode: Surround Decoder
        target:
          entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    - action: switch.turn_on
      target:
        entity_id: switch.living_room_subwoofer_plug
  alias: Living Room - AVR On When Fire TV Active
  conditions:
  - condition: state
    entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    state: 'off'
  description: 'Turn on AVR (AV1, Surround Decoder, 50% vol) and subwoofer when Fire
    TV wakes from a cold off/standby/unavailable state. Guards: AVR must be off; Fire
    TV must sustain the wake state for 10s to suppress transient ADB flashes. Does
    NOT re-initialize if AVR is already on — prevents mid-session YNCA connection
    interruption.'
  id: '1771858450789'
  mode: single
  triggers:
  - entity_id: media_player.living_room_fire_tv_192_168_1_17
    for:
      seconds: 10
    from:
    - 'off'
    - standby
    - unavailable
    id: fire_tv_playing
    platform: state
    to: playing
  - entity_id: media_player.living_room_fire_tv_192_168_1_17
    for:
      seconds: 10
    from:
    - 'off'
    - standby
    - unavailable
    id: fire_tv_woke_up
    platform: state
    to: idle
- actions:
  - parallel:
    - action: media_player.turn_off
      target:
        entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    - sequence:
      - delay:
          seconds: 5
      - action: switch.turn_off
        target:
          entity_id: switch.living_room_subwoofer_plug
  alias: Living Room - AVR Off When Fire TV Idle
  conditions:
  - condition: state
    entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_fire_tv_192_168_1_17
      state: unavailable
  description: 'Turn off AVR and subwoofer when Fire TV has been idle/standby/off
    for 20 continuous minutes. Ignores ''unavailable'' (ADB reconnect events) to prevent
    false triggers during active Hulu sessions. Mode: restart so a new idle period
    resets the timer if playback resumes and stops again.'
  id: '1771858469033'
  mode: restart
  triggers:
  - entity_id: media_player.living_room_fire_tv_192_168_1_17
    for:
      minutes: 20
    platform: state
    to:
    - idle
    - standby
    - 'off'
- actions:
  - choose:
    - conditions:
      - condition: trigger
        id: avr_on
      sequence:
      - condition: state
        entity_id: switch.living_room_subwoofer_plug
        state: 'off'
      - action: switch.turn_on
        target:
          entity_id: switch.living_room_subwoofer_plug
    - conditions:
      - condition: trigger
        id: avr_off
      sequence:
      - condition: state
        entity_id: switch.living_room_subwoofer_plug
        state: 'on'
      - action: switch.turn_off
        target:
          entity_id: switch.living_room_subwoofer_plug
  alias: Living Room - Subwoofer Sync with AVR
  conditions: []
  description: Keep subwoofer power synced with AVR state as backup
  id: '1771858527176'
  mode: restart
  triggers:
  - entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    id: avr_on
    platform: state
    to: 'on'
  - entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    for:
      seconds: 5
    id: avr_off
    platform: state
    to: 'off'
- id: 2nd_floor_bathroom_vanity_inovelli
  alias: 2nd Floor Bathroom — Inovelli Switch Control (Both Lights)
  description: 'Both bathroom Inovelli switches (vanity + ceiling) jointly control
    both Hue light groups with scene cycling. UP=apply current scene, DOWN=off, Config=cycle
    scene, Hold=brightness step, 2xUP=Energize (index 0), 2xDOWN=Nightlight (index
    3). Scene index: 0=Energize 1=Relax 2=Dimmed 3=Nightlight.'
  triggers:
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 18:0d:f9:ff:fe:34:58:66
    id: vanity_switch
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 20:a7:16:ff:fe:01:8c:b8
    id: ceiling_switch
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ command == ''button_2_press'' }}'
      sequence:
      - choose:
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            below: 0.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_energize
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_energize
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            above: 0.5
            below: 1.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_relax
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_relax
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            above: 1.5
            below: 2.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_dimmed
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_read
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            above: 2.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_nightlight
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_nightlight
    - conditions:
      - condition: template
        value_template: '{{ command == ''button_1_press'' }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.2nd_floor_bathroom
          - light.2nd_floor_bathroom_vanity_lights
    - conditions:
      - condition: template
        value_template: '{{ command == ''button_3_press'' }}'
      sequence:
      - action: input_number.set_value
        data:
          value: '{{ ((states(''input_number.bathroom_scene_index'') | int + 1) %
            4) }}'
        target:
          entity_id: input_number.bathroom_scene_index
      - choose:
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            below: 0.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_energize
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_energize
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            above: 0.5
            below: 1.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_relax
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_relax
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            above: 1.5
            below: 2.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_dimmed
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_read
        - conditions:
          - condition: numeric_state
            entity_id: input_number.bathroom_scene_index
            above: 2.5
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_bathroom_nightlight
          - action: scene.turn_on
            target:
              entity_id: scene.2nd_floor_vanity_lights_nightlight
    - conditions:
      - condition: template
        value_template: '{{ command == ''button_2_hold'' }}'
      sequence:
      - action: light.turn_on
        data:
          brightness_step_pct: 10
          transition: 3
        target:
          entity_id:
          - light.2nd_floor_bathroom
          - light.2nd_floor_bathroom_vanity_lights
    - conditions:
      - condition: template
        value_template: '{{ command == ''button_1_hold'' }}'
      sequence:
      - action: light.turn_on
        data:
          brightness_step_pct: -10
          transition: 3
        target:
          entity_id:
          - light.2nd_floor_bathroom
          - light.2nd_floor_bathroom_vanity_lights
    - conditions:
      - condition: template
        value_template: '{{ command == ''button_2_double'' }}'
      sequence:
      - action: input_number.set_value
        data:
          value: 0
        target:
          entity_id: input_number.bathroom_scene_index
      - action: scene.turn_on
        target:
          entity_id: scene.2nd_floor_bathroom_energize
      - action: scene.turn_on
        target:
          entity_id: scene.2nd_floor_vanity_lights_energize
    - conditions:
      - condition: template
        value_template: '{{ command == ''button_1_double'' }}'
      sequence:
      - action: input_number.set_value
        data:
          value: 3
        target:
          entity_id: input_number.bathroom_scene_index
      - action: scene.turn_on
        target:
          entity_id: scene.2nd_floor_bathroom_nightlight
      - action: scene.turn_on
        target:
          entity_id: scene.2nd_floor_vanity_lights_nightlight
  mode: restart
  variables:
    command: '{%- if trigger.id == ''vanity_switch'' -%}{{ trigger.event.data.command
      }}{%- else -%}{{ trigger.event.data.button }}_{{ {''press'':''press'',''held_down'':''hold'',''release'':''release'',''double'':''double''}.get(trigger.event.data.press_type,
      trigger.event.data.press_type) }}{%- endif -%}'

- id: '1771557081733'
  alias: Kitchen Lounge - Aux Switch Controls Hue + Fan
  description: 'Aux paddle=Hue lights, Config buttons CYCLE fan: press cycles low→med→high→off,
    hold=off'
  triggers:
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 04:e3:e5:ff:fe:5f:55:c6
      cluster_id: 64561
      command: button_5_press
    id: aux_up
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 04:e3:e5:ff:fe:5f:55:c6
      cluster_id: 64561
      command: button_4_press
    id: aux_down
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 04:e3:e5:ff:fe:5f:55:c6
      cluster_id: 64561
      command: button_3_press
    id: config_press
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 04:e3:e5:ff:fe:5f:55:c6
      cluster_id: 64561
      command: button_3_hold
    id: config_hold
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 04:e3:e5:ff:fe:5f:55:c6
      cluster_id: 64561
      command: button_6_press
    id: aux_config_press
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: 04:e3:e5:ff:fe:5f:55:c6
      cluster_id: 64561
      command: button_6_hold
    id: aux_config_hold
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: aux_up
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.kitchen_lounge
    - conditions:
      - condition: trigger
        id: aux_down
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.kitchen_lounge
    - conditions:
      - condition: trigger
        id:
        - config_press
        - aux_config_press
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
            state: 'off'
          sequence:
          - action: fan.set_percentage
            target:
              entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
            data:
              percentage: 33
        - conditions:
          - condition: numeric_state
            entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
            attribute: percentage
            below: 50
          sequence:
          - action: fan.set_percentage
            target:
              entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
            data:
              percentage: 66
        - conditions:
          - condition: numeric_state
            entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
            attribute: percentage
            below: 80
          sequence:
          - action: fan.set_percentage
            target:
              entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
            data:
              percentage: 100
        default:
        - action: fan.turn_off
          target:
            entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
    - conditions:
      - condition: trigger
        id:
        - config_hold
        - aux_config_hold
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.kitchen_lounge_light_fan_inovelli_vzm36_fan
  mode: single
- id: '1771854304476'
  alias: 2nd Floor Bathroom - Humidity Fan Control v2
  description: Timer-based fan control. Turns on with hot water or high humidity.
    Auto-off after 15min if humidity normalized, 30min max.
  triggers:
  - platform: numeric_state
    entity_id: sensor.navien_water_flow
    above: 0.5
    for:
      minutes: 2
    id: hot_water
  - platform: numeric_state
    entity_id: sensor.2nd_floor_bathroom_ceiling_humidity
    above: 65
    id: high_humidity
  conditions:
  - condition: state
    entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
    state: 'off'
  actions:
  - action: fan.turn_on
    target:
      entity_id: fan.inovelli_vzm35_sn_fan
  - delay:
      minutes: 15
  - if:
    - condition: numeric_state
      entity_id: sensor.2nd_floor_bathroom_ceiling_humidity
      below: 60
    then:
    - action: fan.turn_off
      target:
        entity_id: fan.inovelli_vzm35_sn_fan
    else:
    - delay:
        minutes: 15
    - action: fan.turn_off
      target:
        entity_id: fan.inovelli_vzm35_sn_fan
  mode: restart
- id: '1771854392376'
  alias: 2nd Floor Bathroom - Fan Inovelli Paddle Control v2
  description: Inovelli VZM35-SN paddle controls fan directly. Up=On, Down=Off. Sets
    manual override to prevent humidity auto from interfering (resets after 30 min
    via YAML automation).
  triggers:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: 3eed85f7ca546a7ed7e24b0cfc6c818b
      command: button_2_press
    id: up_press
  - platform: event
    event_type: zha_event
    event_data:
      device_id: 3eed85f7ca546a7ed7e24b0cfc6c818b
      command: button_1_press
    id: down_press
  - platform: event
    event_type: zha_event
    event_data:
      device_id: 3eed85f7ca546a7ed7e24b0cfc6c818b
      command: button_2_hold
    id: up_hold
  - platform: event
    event_type: zha_event
    event_data:
      device_id: 3eed85f7ca546a7ed7e24b0cfc6c818b
      command: button_1_hold
    id: down_hold
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - up_press
        - up_hold
      sequence:
      - target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan
        action: fan.turn_on
      - target:
          entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
        action: input_boolean.turn_on
    - conditions:
      - condition: trigger
        id:
        - down_press
        - down_hold
      sequence:
      - target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan
        action: fan.turn_off
      - target:
          entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
        action: input_boolean.turn_on
  mode: single
- id: '1771858450789'
  alias: Living Room - AVR On When Fire TV Active
  description: 'Turn on AVR (AV1, Surround Decoder, 50% vol) and subwoofer when Fire
    TV wakes from a cold off/standby/unavailable state. Guards: AVR must be off; Fire
    TV must sustain the wake state for 10s to suppress transient ADB flashes. Does
    NOT re-initialize if AVR is already on — prevents mid-session YNCA connection
    interruption.'
  triggers:
  - id: fire_tv_playing
    platform: state
    entity_id: media_player.living_room_fire_tv_192_168_1_17
    to: playing
    from:
    - 'off'
    - standby
    - unavailable
    for:
      seconds: 10
  - id: fire_tv_woke_up
    platform: state
    entity_id: media_player.living_room_fire_tv_192_168_1_17
    to: idle
    from:
    - 'off'
    - standby
    - unavailable
    for:
      seconds: 10
  conditions:
  - condition: state
    entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    state: 'off'
  actions:
  - parallel:
    - sequence:
      - action: media_player.turn_on
        target:
          entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
      - delay:
          seconds: 3
      - action: media_player.select_source
        target:
          entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
        data:
          source: AV1
      - action: media_player.volume_set
        target:
          entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
        data:
          volume_level: 0.5
      - action: media_player.select_sound_mode
        target:
          entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
        data:
          sound_mode: Surround Decoder
    - action: switch.turn_on
      target:
        entity_id: switch.living_room_subwoofer_plug
  mode: single
- id: '1771858469033'
  alias: Living Room - AVR Off When Fire TV Idle
  description: 'Turn off AVR and subwoofer when Fire TV has been idle/standby/off
    for 20 continuous minutes. Ignores ''unavailable'' (ADB reconnect events) to prevent
    false triggers during active Hulu sessions. Mode: restart so a new idle period
    resets the timer if playback resumes and stops again.'
  triggers:
  - platform: state
    entity_id: media_player.living_room_fire_tv_192_168_1_17
    to:
    - idle
    - standby
    - 'off'
    for:
      minutes: 20
  conditions:
  - condition: state
    entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_fire_tv_192_168_1_17
      state: unavailable
  actions:
  - parallel:
    - target:
        entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
      action: media_player.turn_off
    - sequence:
      - delay:
          seconds: 5
      - target:
          entity_id: switch.living_room_subwoofer_plug
        action: switch.turn_off
  mode: restart
- id: '1771858527176'
  alias: Living Room - Subwoofer Sync with AVR
  description: Keep subwoofer power synced with AVR state as backup
  triggers:
  - platform: state
    entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    to: 'on'
    id: avr_on
  - platform: state
    entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    to: 'off'
    for:
      seconds: 5
    id: avr_off
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: avr_on
      sequence:
      - condition: state
        entity_id: switch.living_room_subwoofer_plug
        state: 'off'
      - target:
          entity_id: switch.living_room_subwoofer_plug
        action: switch.turn_on
    - conditions:
      - condition: trigger
        id: avr_off
      sequence:
      - condition: state
        entity_id: switch.living_room_subwoofer_plug
        state: 'on'
      - target:
          entity_id: switch.living_room_subwoofer_plug
        action: switch.turn_off
  mode: restart

  alias: Kitchen + Lounge — Motion Lighting
  description: '3-tier time-based motion lighting for open-concept kitchen/lounge.
    Day (06-21): full task lighting. Evening (21-23): warm ambient. Late night (23-06):
    under-cabinet only. Suppresses off when TV playing. Respects manual override.
    Triggers on EITHER kitchen_motion OR kitchen_lounge_motion.'
  id: '1774539842937'
  mode: restart
  triggers:
  - entity_id:
    - binary_sensor.kitchen_motion
    - binary_sensor.kitchen_lounge_motion
    id: motion_on
    platform: state
    to: 'on'
  - entity_id:
    - binary_sensor.kitchen_motion
    - binary_sensor.kitchen_lounge_motion
    for:
      minutes: 8
    id: motion_off
    platform: state
    to: 'off'
- id: '1774543958639'
  alias: Living Room — Motion Lighting
  description: '3-tier motion lighting for living room. Day (06-22): all 4 Hue lamps
    + ceiling. Evening (22-23): floor+table lamps warm/dim, no ceiling. Late night
    (23-06): table lamps only at low/warm (daughter sleeping). Suppresses off when
    TV playing. Respects manual override. Both nightlight sensors trigger on; both
    must clear before off.'
  triggers:
  - platform: state
    entity_id:
    - binary_sensor.living_room_north_wall_west_nightlight_motion
    - binary_sensor.living_room_north_wall_east_nightlight_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id:
    - binary_sensor.living_room_north_wall_west_nightlight_motion
    - binary_sensor.living_room_north_wall_east_nightlight_motion
    to: 'off'
    for:
      minutes: 20
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      - condition: state
        entity_id: input_boolean.living_room_manual_override
        state: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: 06:00:00
            before: '22:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.living_room_floor_lamps
            data:
              brightness_pct: 80
              color_temp_kelvin: 3500
              transition: 1
          - action: light.turn_on
            target:
              entity_id: light.living_room_table_lamps
            data:
              brightness_pct: 80
              color_temp_kelvin: 3500
              transition: 1
          - action: light.turn_on
            target:
              entity_id: light.inovelli_vzm36_light_3
            data:
              brightness_pct: 100
              transition: 1
        - conditions:
          - condition: time
            after: '22:00:00'
            before: '23:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.living_room_floor_lamps
            data:
              brightness_pct: 35
              color_temp_kelvin: 2700
              transition: 2
          - action: light.turn_on
            target:
              entity_id: light.living_room_table_lamps
            data:
              brightness_pct: 35
              color_temp_kelvin: 2700
              transition: 2
        default:
        - action: light.turn_on
          target:
            entity_id: light.living_room_table_lamps
          data:
            brightness_pct: 8
            color_temp_kelvin: 2100
            transition: 3
    - conditions:
      - condition: trigger
        id: motion_off
      - condition: state
        entity_id: binary_sensor.living_room_north_wall_west_nightlight_motion
        state: 'off'
      - condition: state
        entity_id: binary_sensor.living_room_north_wall_east_nightlight_motion
        state: 'off'
      - condition: state
        entity_id: input_boolean.living_room_manual_override
        state: 'off'
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.living_room_tv
          state: playing
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.living_room_floor_lamps
          - light.living_room_table_lamps
          - light.inovelli_vzm36_light_3
        data:
          transition: 0
  mode: restart

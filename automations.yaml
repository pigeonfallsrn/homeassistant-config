- id: '1776295699407'
  alias: Occupancy → Update Mode
  description: Syncs input_select.occupancy_mode to sensor.occupancy_mode_auto when
    any presence binary sensor changes. 30s debounce prevents flapping.
  triggers:
  - platform: state

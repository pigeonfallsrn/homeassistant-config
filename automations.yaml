- id: garage_auto_close_departure
  alias: Garage — Auto Close North on Departure
  description: When John leaves home and North garage door is open, notify and auto-close
    after 60s. Tap KEEP OPEN to cancel.
  triggers:
  - platform: state
    entity_id: person.john_spencer
    from: home
    to: not_home
  conditions:
  - condition: state
    entity_id: cover.ratgdo32disco_fd8d8c_door
    state: open
  actions:
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      title: "\U0001F6AA Garage Still Open"
      message: North door closing in 60s
      data:
        actions:
        - action: CANCEL_AUTO_CLOSE
          title: KEEP OPEN
        priority: high
        tag: garage_auto_close
        ttl: 0
  - wait_for_trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: CANCEL_AUTO_CLOSE
    timeout:
      seconds: 60
    continue_on_timeout: true
  - if:
    - condition: template
      value_template: '{{ wait.trigger is not none }}'
    then:
    - action: notify.mobile_app_galaxy_s26_ultra
      data:
        title: "\U0001F6AA Garage"
        message: Auto-close cancelled
        data:
          tag: garage_auto_close
          timeout: 30
    else:
    - condition: state
      entity_id: cover.ratgdo32disco_fd8d8c_door
      state: open
    - action: cover.close_cover
      target:
        entity_id: cover.ratgdo32disco_fd8d8c_door
    - action: notify.mobile_app_galaxy_s26_ultra
      data:
        title: "\U0001F512 Garage"
        message: North door closed
        data:
          tag: garage_auto_close
          timeout: 30
  mode: single

- id: 1st_floor_hallway_bathroom_ceiling_motion
  alias: 1st Floor Hallway → Bathroom Ceiling Motion
  description: 'P1 outside bathroom: Hue ceiling on after sunset+30min when override
    off and light off. motion_on turns on. motion_off starts 8min delay then turns
    off. mode: single prevents restart race - if delay is running, re-triggers are
    ignored, so light stays on through shower entry sensor clear. Set input_boolean.bathroom_1st_floor_manual_override
    for long stays.'
  mode: single
  max_exceeded: silent
  trigger:
  - platform: state
    entity_id: binary_sensor.1st_floor_bathroom_hallway_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id: binary_sensor.1st_floor_bathroom_hallway_motion
    to: 'off'
    id: motion_off
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - if:
        - condition: sun
          after: sunset
          after_offset: 0:30:00
        - condition: state
          entity_id: input_boolean.bathroom_1st_floor_manual_override
          state: 'off'
        - condition: state
          entity_id: light.1st_floor_bathroom
          state: 'off'
        then:
        - action: light.turn_on
          target:
            entity_id: light.1st_floor_bathroom
          data:
            brightness_pct: 60
            transition: 2
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - condition: state
        entity_id: input_boolean.bathroom_1st_floor_manual_override
        state: 'off'
      - delay:
          minutes: 8
      - action: light.turn_off
        target:
          entity_id: light.1st_floor_bathroom
        data:
          transition: 3

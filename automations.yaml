  description: 'Turn on AVR (AV1, Surround Decoder, 50% vol) and subwoofer when Fire
    TV wakes from a cold off/standby/unavailable state. Guards: AVR must be off; Fire
    TV must sustain the wake state for 10s to suppress transient ADB flashes. Does
    NOT re-initialize if AVR is already on — prevents mid-session YNCA connection
    interruption.'
  id: '1771858450789'
  mode: single
  triggers:
  - entity_id: media_player.living_room_fire_tv_192_168_1_17
    for:
      seconds: 10
    from:
    - 'off'
    - standby
    - unavailable
    id: fire_tv_playing
    platform: state
    to: playing
  - entity_id: media_player.living_room_fire_tv_192_168_1_17
    for:
      seconds: 10
    from:
    - 'off'
    - standby
    - unavailable
    id: fire_tv_woke_up
    platform: state
    to: idle
- actions:
  - parallel:
    - action: media_player.turn_off
      target:
        entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    - sequence:
      - delay:
          seconds: 5
      - action: switch.turn_off
        target:
          entity_id: switch.living_room_subwoofer_plug
  alias: Living Room - AVR Off When Fire TV Idle
  conditions:
  - condition: state
    entity_id: media_player.basement_yamaha_av_receiver_rx_v671_main
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_fire_tv_192_168_1_17
      state: unavailable
  description: 'Turn off AVR and subwoofer when Fire TV has been idle/standby/off
    for 20 continuous minutes. Ignores ''unavailable'' (ADB reconnect events) to prevent
    false triggers during active Hulu sessions. Mode: restart so a new idle period
    resets the timer if playback resumes and stops again.'
  id: '1771858469033'

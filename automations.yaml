  - entity_id: event.master_bedroom_tap_dial_switch_button_2
    id: b2
    platform: state
  - entity_id: event.master_bedroom_tap_dial_switch_button_3
    id: b3
    platform: state
  - entity_id: event.master_bedroom_tap_dial_switch_button_4
    id: b4
    platform: state
  - entity_id: event.master_bedroom_tap_dial_switch_rotary
    id: rotary
    platform: state
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: b1
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.master_bedroom_relax
    - conditions:
      - condition: trigger
        id: b2
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.master_bedroom_energize
    - conditions:
      - condition: trigger
        id: b3
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.master_bedroom_nightlight
    - conditions:
      - condition: trigger
        id: b4
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: fan.toggle
        target:
          entity_id: fan.master_bedroom_fan
    - conditions:
      - condition: trigger
        id: rotary
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''clock_wise''
          }}'
      sequence:
      - action: light.turn_on
        data:
          brightness_step_pct: 10
        target:
          entity_id: light.master_bedroom
    - conditions:
      - condition: trigger
        id: rotary
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''counter_clock_wise''
          }}'
      sequence:
      - action: light.turn_on
        data:
          brightness_step_pct: -10
        target:
          entity_id: light.master_bedroom
    - conditions:
      - condition: trigger
        id: b4
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''long_release''
          }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.master_bedroom
      - action: fan.turn_off
        target:
          entity_id: fan.master_bedroom_fan
  mode: restart

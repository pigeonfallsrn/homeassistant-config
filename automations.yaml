- id: '1772045640891'
  alias: Back Patio - Inovelli Controls Hue Lights
  description: Back Patio Inovelli VZM30-SN controls Hue lights. Config press cycles
    scenes (Energize→Relax→Nightlight), Config hold toggles Hot Tub Mode.
  triggers:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: 70c1c990c1792ade4fc2eb2fd0d8487a
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.command == ''button_2_press'' }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: scene.back_patio_energize
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.command == ''button_1_press'' }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.back_patio
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.command == ''button_3_press'' }}'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.back_patio_scene_index
        data:
          value: '{{ ((states(''input_number.back_patio_scene_index'') | int + 1)
            % 3) }}'
      - choose:
        - conditions:
          - condition: state
            entity_id: input_number.back_patio_scene_index
            state: '0.0'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.back_patio_energize
        - conditions:
          - condition: state
            entity_id: input_number.back_patio_scene_index
            state: '1.0'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.back_patio_relax
        - conditions:
          - condition: state
            entity_id: input_number.back_patio_scene_index
            state: '2.0'
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.back_patio_nightlight
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.command == ''button_3_hold'' }}'
      sequence:
      - action: input_boolean.toggle
        target:
          entity_id: input_boolean.hot_tub_mode
  mode: single
  max_exceeded: silent

- id: '1773152820854'
  alias: Doorbell Ring → Notification with Snapshot
  description: Sends a push notification with camera snapshot to John when either
    doorbell is pressed. Uses event entity trigger (not binary_sensor) for reliability.
    Snapshots saved to www/doorbell/ and included in notification.
  triggers:
  - alias: Very Front Door ring
    entity_id: event.very_front_door_doorbell
    platform: state
  - alias: Front Driveway Door ring
    entity_id: event.front_driveway_door_doorbell
    platform: state
  actions:
  - delay:
      seconds: 2
  - action: camera.snapshot
    data:
      filename: '{{ snapshot_path }}'
    target:
      entity_id: '{{ camera_entity }}'
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      data:
        channel: Doorbell
        image: '{{ snapshot_path | replace(''/config/www'', ''/local'') }}'
        importance: high
        priority: high
        tag: doorbell_{{ doorbell_label | lower | replace(' ', '_') }}
        ttl: 0
        clickAction: entityId:{{ click_entity }}
      message: Someone is at the {{ doorbell_label }}
      title: "\U0001F514 Doorbell — {{ doorbell_label }}"
  max: 2
  mode: parallel
  variables:
    camera_entity: '{{ ''camera.very_front_door_high_resolution_channel'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''camera.front_driveway_door_high_resolution_channel''
      }}'
    doorbell_label: '{{ ''Front Door'' if trigger.entity_id == ''event.very_front_door_doorbell''
      else ''Driveway Door'' }}'
    snapshot_path: '{{ ''/config/www/doorbell/snapshot_front.jpg'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''/config/www/doorbell/snapshot_driveway.jpg''
      }}'
    click_entity: '{{ ''camera.very_front_door_high_resolution_channel'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''camera.front_driveway_door_high_resolution_channel''
      }}'
- id: '1773153864754'
  alias: Doorbell Package Detected → Notification
  description: Sends a push notification with package camera snapshot to John when
    a package is detected at either doorbell. Daytime only (7am–10pm). Uses dedicated
    package camera on G4 Doorbell Pro for reliable close-up snapshot.
  triggers:
  - alias: Very Front Door package detected
    entity_id: binary_sensor.very_front_door_package_detected

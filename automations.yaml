  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.dad_bedtime_mode
    state: 'off'
  description: Turns on entry room lamp when motion detected and applies AL for correct
    color/brightness. No lux gate - hard off at 23:30 handles late night. Full bypass
    when hot_tub_mode or manual override active.
  id: '1774537453732'
  mode: restart
  triggers:
  - entity_id: binary_sensor.entry_room_motion
    platform: state
    to: 'on'
- id: '1774539842937'
  alias: Kitchen + Lounge — Motion Lighting
  description: '3-tier time-based motion lighting for open-concept kitchen/lounge.
    Day (06-21): full task lighting, all lights auto. Evening (21-23): ambient only
    — under-cabinet, lounge ceiling, lounge lamp auto; overhead kitchen lights (chandelier,
    ceiling, pendants) manual-only. Late night (23-06): under-cabinet only. Hue group
    lights get bare turn_on — AL owns brightness/color_temp. Dumb lights get explicit
    brightness. Suppresses off when TV playing. Respects manual override. Updated
    2026-04-06: trigger consolidated to first_floor_main_motion (kitchen P1 + west
    kitchen TR + entry P1). Added kitchen_manual_override gate alongside kitchen_lounge_manual_override.'
  triggers:
  - platform: state
    entity_id: binary_sensor.first_floor_main_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id: binary_sensor.first_floor_main_motion
    to: 'off'
    for:
      minutes: 12
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      - condition: state
        entity_id: input_boolean.kitchen_lounge_manual_override
        state: 'off'
      - condition: state
        entity_id: input_boolean.kitchen_manual_override
        state: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: 06:00:00
            before: '21:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_chandelier
            data:
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_above_sink_light
            data:
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_ceiling_inovelli_vzm31_sn
            data:
              brightness_pct: 100
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_bar_pendant_lights
            data:
              brightness_pct: 100
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.inovelli_vzm31_sn_4
            data:
              brightness_pct: 80
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_under_cabinet_aqara_t1_led_strip
            data:
              brightness_pct: 70
              color_temp_kelvin: 3000
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_govee_floor_lamp
            data:
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_lounge
            data:
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_lounge_lamp
            data:
              transition: 0
        - conditions:
          - condition: time
            after: '21:00:00'
            before: '23:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.inovelli_vzm31_sn_4
            data:
              brightness_pct: 40
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_under_cabinet_aqara_t1_led_strip
            data:
              brightness_pct: 50
              color_temp_kelvin: 2500
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_govee_floor_lamp
            data:
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_lounge
            data:
              transition: 0
          - action: light.turn_on
            target:
              entity_id: light.kitchen_lounge_lamp
            data:
              transition: 0
        default:
        - action: light.turn_on
          target:
            entity_id: light.kitchen_under_cabinet_aqara_t1_led_strip
          data:
            brightness_pct: 6
            color_temp_kelvin: 2100
            transition: 0
        - action: light.turn_on
          target:
            entity_id: light.inovelli_vzm31_sn_4
          data:
            brightness_pct: 12
            transition: 0
    - conditions:
      - condition: trigger
        id: motion_off
      - condition: state
        entity_id: binary_sensor.first_floor_main_motion
        state: 'off'
      - condition: state
        entity_id: input_boolean.kitchen_lounge_manual_override
        state: 'off'
      - condition: state
        entity_id: input_boolean.kitchen_manual_override
        state: 'off'
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.kitchen_lounge_tv
          state: playing
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.kitchen_chandelier
          - light.kitchen_above_sink_light
          - light.kitchen_ceiling_inovelli_vzm31_sn
          - light.kitchen_bar_pendant_lights
          - light.inovelli_vzm31_sn_4
          - light.kitchen_under_cabinet_aqara_t1_led_strip
          - light.kitchen_govee_floor_lamp
          - light.kitchen_lounge
          - light.kitchen_lounge_lamp
        data:
          transition: 0
  mode: restart
- id: '1774544318554'
  alias: Upstairs Bathroom — Motion Lighting
  description: '3-tier motion lighting for 2nd floor bathroom. Day (06-22): full bright/neutral
    via Hue room group. Evening (22-23): warm dim. Late night (23-06): very dim warm
    for overnight visits. 5min timeout. Physical Inovelli switches retain full override
    via separate blueprint automations.'
  triggers:
  - platform: state
    entity_id: binary_sensor.upstairs_bathroom_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id: binary_sensor.upstairs_bathroom_motion
    to: 'off'
    for:
      minutes: 5
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: 06:00:00
            before: '22:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.2nd_floor_bathroom
            data:
              brightness_pct: 100
              color_temp_kelvin: 4000
              transition: 1
        - conditions:
          - condition: time
            after: '22:00:00'
            before: '23:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.2nd_floor_bathroom
            data:
              brightness_pct: 50
              color_temp_kelvin: 2700
              transition: 2
        default:
        - action: light.turn_on
          target:
            entity_id: light.2nd_floor_bathroom
          data:
            brightness_pct: 15
            color_temp_kelvin: 2200
            transition: 3
    - conditions:
      - condition: trigger
        id: motion_off
      - condition: state
        entity_id: binary_sensor.upstairs_bathroom_motion
        state: 'off'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.2nd_floor_bathroom
        data:
          transition: 0
  mode: restart
- id: '1774557506471'
  alias: 1st Floor Hallway + Bathroom — Motion Lighting
  description: 'Hallway P1 (outside) + bathroom sensor (inside) both trigger on. Both
    must clear for 5min before lights off. mode:restart so re-entry resets timer.
    No time/sunset gate - hallway useful any time. Inovelli physical switch override
    preserved via separate blueprint automation. Replaces: 1st_floor_hallway_bathroom_ceiling_motion
    (mode:single + inline delay = ignored re-entry) and 1st_floor_hallway_vanity_motion
    (no off delay = flicker).'
  triggers:
  - platform: state
    entity_id:
    - binary_sensor.1st_floor_bathroom_hallway_motion
    - binary_sensor.1st_floor_bathroom_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id:
    - binary_sensor.1st_floor_bathroom_hallway_motion
    - binary_sensor.1st_floor_bathroom_motion
    to: 'off'
    for:
      minutes: 5
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      - condition: state
        entity_id: input_boolean.bathroom_1st_floor_manual_override
        state: 'off'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.1st_floor_bathroom
        data:
          brightness_pct: 80
          color_temp_kelvin: 3500
          transition: 0
      - action: light.turn_on
        target:
          entity_id: light.1st_floor_bathroom_vanity_lights_tp_link_smart_dimmer_switch
        data:
          brightness_pct: 80
          transition: 0
      - action: switch.turn_on
        target:
          entity_id: switch.basement_hallway_smart_switch
    - conditions:
      - condition: trigger
        id: motion_off
      - condition: state
        entity_id: binary_sensor.1st_floor_bathroom_hallway_motion
        state: 'off'
      - condition: state
        entity_id: binary_sensor.1st_floor_bathroom_motion
        state: 'off'
      - condition: state
        entity_id: input_boolean.bathroom_1st_floor_manual_override
        state: 'off'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.1st_floor_bathroom
        data:
          transition: 0
      - action: light.turn_off
        target:
          entity_id: light.1st_floor_bathroom_vanity_lights_tp_link_smart_dimmer_switch
        data:
          transition: 0
      - action: switch.turn_off
        target:
          entity_id: switch.basement_hallway_smart_switch
  mode: restart
- id: '1774572582641'
  alias: Basement Hallway — Motion Lighting
  description: Motion-activated hallway light. Hallway smart switch turns on when
    motion detected, off after 10min no motion. mode:restart so re-entry resets timer.
    No time tiers — basement is always dark. Fluorescent plug and workout Hue group
    excluded (utility/intentional use only).
  triggers:
  - platform: state
    entity_id: binary_sensor.basement_hallway_motion_sensor_occupancy
    to: 'on'
    id: motion_on
  - platform: state
    entity_id: binary_sensor.basement_hallway_motion_sensor_occupancy
    to: 'off'
    for:
      minutes: 10
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.basement_hallway_smart_switch
    - conditions:
      - condition: trigger
        id: motion_off
      - condition: state
        entity_id: binary_sensor.basement_hallway_motion_sensor_occupancy
        state: 'off'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.basement_hallway_smart_switch
  mode: restart
- id: '1774577899551'
  alias: Midnight — All Lights Off
  description: Hard off for all interior lights at midnight. Motion automations pick
    back up normally after this (late night tiers). Excludes outdoor lights and nightlights
    (those have their own schedules). Kids bedrooms excluded — they have their own
    midnight autos.
  triggers:
  - platform: time
    at: 00:00:00
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_chandelier
      - light.kitchen_above_sink_light
      - light.kitchen_ceiling_inovelli_vzm31_sn
      - light.kitchen_bar_pendant_lights
      - light.inovelli_vzm31_sn_4
      - light.kitchen_under_cabinet_aqara_t1_led_strip
      - light.kitchen_govee_floor_lamp
      - light.kitchen_lounge
      - light.kitchen_lounge_lamp
      - light.living_room_east_floor_lamp
      - light.living_room_west_floor_lamp
      - light.living_room_lounge_lamp
      - light.living_room_table_lamps
      - light.living_room_tv_led_strip
      - light.entry_room_hue_color_lamp
      - light.entry_room
      - light.upstairs_hallway
      - light.1st_floor_bathroom
      - light.1st_floor_bathroom_vanity_lights_tp_link_smart_dimmer_switch
      - light.2nd_floor_bathroom
      - light.master_bedroom
      - light.master_bedroom_led_light_strip
      - light.master_bedroom_wall_light
      - light.master_bedroom_behind_tv_aqara_t1_led_strip
      - light.living_room_lounge_ceiling_light
  - action: switch.turn_off
    target:
      entity_id: switch.basement_hallway_smart_switch
  mode: single
- id: '1774662096455'
  alias: Garage — Door Opened Arrival Notification
  description: 'When North or South garage door opens during arrival window, overwrite
    arrival_john tag instead of stacking a 3rd notification. 2026-04-04: tag changed
    from garage_door_open_north/south to arrival_john.'
  triggers:
  - entity_id: cover.ratgdo32disco_fd8d8c_door
    id: north_opened
    platform: state
    to: open
  - entity_id: cover.ratgdo32disco_5735e8_door
    id: south_opened
    platform: state
    to: open
  conditions:
  - condition: template
    value_template: '{{ (as_timestamp(now()) - as_timestamp(states.person.john_spencer.last_changed))
      < 180 }}'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: north_opened
      sequence:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          title: "\U0001F513 North Garage Open"
          message: Arrived home — North door is open
          data:
            tag: arrival_john
            group: garage
            channel: Garage
            importance: high
            ttl: 0
            priority: high
            sticky: true
            timeout: 300
            notification_icon: mdi:garage-open-variant
            clickAction: /lovelace/garage
            actions:
            - action: CLOSE_NORTH
              title: "\U0001F512 Close North"
            - action: OPEN_SOUTH
              title: "\U0001F6AA Open South"

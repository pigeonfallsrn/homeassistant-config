  max: 5
- id: garage_arrival_smart_popup
  alias: Garage - Smart Arrival Dashboard Popup
  description: 'Shows garage control notification when approaching home in the van.
    clickAction fixed to /lovelace/garage (was /arriving-home). 2026-04-04: fixed
    clickAction regression.'
  triggers:
  - entity_id: sensor.john_s_s26_ultra_bluetooth_connection
    id: hfl_connected
    platform: state
  - below: 1500
    entity_id: sensor.john_distance_to_home
    id: approaching
    platform: numeric_state
  - below: 800
    entity_id: sensor.john_distance_to_home
    id: proximity
    platform: numeric_state
  conditions:
  - condition: time
    after: 08:00:00
    before: '23:00:00'
  - condition: template
    value_template: '{{ states(''person.john_spencer'') != ''home'' }}'
  - condition: template
    value_template: '{{ state_attr(''sensor.john_s_s26_ultra_bluetooth_connection'',
      ''connected_paired_devices'') | select(''search'', ''00:0A:30:9A:20:F5'') |
      list | count > 0 }}'
  - condition: template
    value_template: "{% if trigger.id == 'hfl_connected' %}\n  {{ states('sensor.john_distance_to_home')
      | float(99999) < 8000 }}\n{% else %}\n  {{ states('sensor.john_distance_to_home')
      | float(99999) < 1600 and states('sensor.john_distance_to_home') | float(99999)
      > 100 }}\n{% endif %}"
  - condition: or
    conditions:
    - condition: state
      entity_id: cover.ratgdo32disco_fd8d8c_door
      state: closed
    - condition: state
      entity_id: cover.ratgdo32disco_5735e8_door
      state: closed
  actions:
  - data:
      data:
        actions:
        - action: GARAGE_OPEN_NORTH
          title: "\U0001F511 North"
        - action: GARAGE_OPEN_SOUTH
          title: "\U0001F511 South"
        - action: GARAGE_OPEN_BOTH
          title: "\U0001F511 Both"
        - action: GARAGE_DISMISS
          title: ❌ Dismiss
        channel: Garage Arrival
        clickAction: /lovelace/garage
        color: '#03A9F4'
        group: garage
        importance: high
        notification_icon: mdi:garage-variant
        persistent: true
        priority: high
        sticky: true
        tag: garage_arrival_dashboard
        timeout: 300
        ttl: 0
        visibility: public
      message: '{{ (states(''sensor.john_distance_to_home'') | float(0) / 1000) |
        round(1) }}km away — Open garage door?'
      title: "\U0001F697 Arriving Home"
    action: notify.mobile_app_john_s_s26_ultra
  max_exceeded: silent
  mode: restart
- id: kitchen_manual_override_inovelli_trigger
  alias: Kitchen Manual Override — Inovelli 2x Tap Set
  description: Double-tap UP on kitchen chandelier or above-sink Inovelli switch sets
    BOTH kitchen_manual_override and kitchen_lounge_manual_override ON and starts
    the 30-min override timer. Motion automation is suppressed until timer expires
    or 2x-tap DOWN clears it.
  triggers:
  - event_data:
      command: button_2_double
      device_id: 17a59d3c437c3475f22c29dd2b76777a
    event_type: zha_event
    id: chandelier_2x_up
    platform: event
  - event_data:
      command: button_2_double
      device_id: 89ca030d64760ad87512e97d13a2737d
    event_type: zha_event
    id: sink_2x_up
    platform: event
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id:
      - input_boolean.kitchen_manual_override
      - input_boolean.kitchen_lounge_manual_override
  - action: timer.start
    target:
      entity_id: timer.kitchen_override_timer
    data:
      duration: 0:30:00
  - action: notify.mobile_app_john_s_s26_ultra
    data:
      title: Kitchen Override ON
      message: Motion auto-off suppressed for 30 min. 2x-tap DOWN to cancel early.
      data:
        priority: high
        tag: kitchen_override
        ttl: 0
  mode: single
- id: '1775623389364'
  alias: Hot Tub Mode — Pause/Resume Kitchen Motion Automations
  description: When hot tub mode activates, disable all kitchen motion automations.
    Re-enable when hot tub mode turns off.
  triggers:
  - platform: state
    entity_id: input_boolean.hot_tub_mode
    to: 'on'
    id: hot_tub_on
  - platform: state
    entity_id: input_boolean.hot_tub_mode
    to: 'off'
    id: hot_tub_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: hot_tub_on
      sequence:
      - action: automation.turn_off
        target:
          entity_id:
          - automation.kitchen_lounge_motion_lighting
          - automation.kitchen_tier_2_dimmers_on_with_motion
          - automation.kitchen_tier_2_dimmers_off_no_motion
    - conditions:
      - condition: trigger
        id: hot_tub_off
      sequence:
      - action: automation.turn_on
        target:
          entity_id:
          - automation.kitchen_lounge_motion_lighting
          - automation.kitchen_tier_2_dimmers_on_with_motion
          - automation.kitchen_tier_2_dimmers_off_no_motion
  mode: single
- id: '1775698609244'
  alias: Kitchen Manual Override — Clear (Timer or 2x Tap DOWN)
  description: Clears kitchen_manual_override and kitchen_lounge_manual_override when
    the 30-min override timer expires OR the user double-taps DOWN on the chandelier
    or above-sink switch. Also cancels the timer if still running (so 2x DOWN cleans
    up immediately).
  triggers:
  - event_data:
      entity_id: timer.kitchen_override_timer
    event_type: timer.finished
    id: timer_done
    platform: event
  - event_data:
      command: button_1_double
      device_id: 17a59d3c437c3475f22c29dd2b76777a
    event_type: zha_event
    id: chandelier_2x_down
    platform: event
  - event_data:
      command: button_1_double
      device_id: 89ca030d64760ad87512e97d13a2737d
    event_type: zha_event
    id: sink_2x_down
    platform: event
  actions:
  - action: timer.cancel
    target:
      entity_id: timer.kitchen_override_timer
  - action: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.kitchen_manual_override
      - input_boolean.kitchen_lounge_manual_override
  - action: notify.mobile_app_john_s_s26_ultra
    data:
      data:
        priority: high
        tag: kitchen_override
        ttl: 0
      message: Motion auto-off restored.
      title: Kitchen Override OFF
  mode: single

- id: 2nd_floor_bathroom_humidity_fan_v3
  alias: 2nd Floor Bathroom — Humidity Fan Control v3
  description: Shower detection with safe runtime cap. Humidity triggers (derivative
    >2%/min or absolute >70%) always win over manual override — high humidity means
    the fan is needed regardless. Hot water flow trigger respects override (non-shower
    use case). Max 45min runtime prevents motor wear. Auto-off waits for humidity
    to normalize then coasts 5min. HA restart cleans up stale on-state.
  triggers:
  - platform: numeric_state
    entity_id: sensor.2nd_floor_bathroom_humidity_derivative
    above: 2
    id: derivative_rising
  - platform: numeric_state
    entity_id: sensor.upstairs_bathroom_temp_and_humidity_sensor_humidity
    above: 70
    id: high_humidity
  - platform: numeric_state
    entity_id: sensor.navien_water_flow
    above: 0.5
    for:
      minutes: 2
    id: hot_water
  - platform: homeassistant
    event: start
    id: ha_restart
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: ha_restart
      sequence:
      - if:
        - condition: state
          entity_id: fan.2nd_floor_bathroom_exhaust_fan
          state: 'on'
        - condition: numeric_state
          entity_id: sensor.upstairs_bathroom_temp_and_humidity_sensor_humidity
          below: 55
        then:
        - action: fan.turn_off
          target:
            entity_id: fan.2nd_floor_bathroom_exhaust_fan
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
    - conditions:
      - condition: trigger
        id: hot_water
      sequence:
      - condition: state
        entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
        state: 'off'
      - action: fan.turn_on
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan
      - continue_on_timeout: true
        timeout:
          minutes: 45
        wait_for_trigger:
        - platform: numeric_state
          entity_id: sensor.2nd_floor_bathroom_humidity_derivative
          below: -1
          for:
            minutes: 3
        - platform: numeric_state
          entity_id: sensor.upstairs_bathroom_temp_and_humidity_sensor_humidity
          below: 55
      - delay:
          minutes: 5
      - action: fan.turn_off
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan
    default:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.bathroom_2nd_floor_fan_manual_override
    - action: fan.turn_on
      target:
        entity_id: fan.2nd_floor_bathroom_exhaust_fan
    - continue_on_timeout: true
      timeout:
        minutes: 45
      wait_for_trigger:
      - platform: numeric_state
        entity_id: sensor.2nd_floor_bathroom_humidity_derivative
        below: -1
        for:
          minutes: 3
      - platform: numeric_state
        entity_id: sensor.upstairs_bathroom_temp_and_humidity_sensor_humidity
        below: 55
    - delay:
        minutes: 5
    - action: fan.turn_off
      target:
        entity_id: fan.2nd_floor_bathroom_exhaust_fan
  mode: restart

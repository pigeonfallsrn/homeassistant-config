- id: '1773152820854'
  alias: Doorbell Ring → Notification with Snapshot
  description: Sends a push notification with camera snapshot to John when either
    doorbell is pressed. Uses event entity trigger (not binary_sensor) for reliability.
    Snapshots saved to www/doorbell/ and included in notification.
  triggers:
  - platform: state
    entity_id: event.very_front_door_doorbell
    alias: Very Front Door ring
  - platform: state
    entity_id: event.front_driveway_door_doorbell
    alias: Front Driveway Door ring
  actions:
  - delay:
      seconds: 2
  - target:
      entity_id: '{{ camera_entity }}'
    data:
      filename: '{{ snapshot_path }}'
    action: camera.snapshot
  - data:
      title: "\U0001F514 Doorbell — {{ doorbell_label }}"
      message: Someone is at the {{ doorbell_label }}
      data:
        image: '{{ snapshot_path | replace(''/config/www'', ''/local'') }}'
        channel: Doorbell
        importance: high
        ttl: 0
        priority: high
        tag: doorbell_{{ doorbell_label | lower | replace(' ', '_') }}
    action: notify.mobile_app_john_s_s26_ultra
  mode: parallel
  max: 2
  variables:
    camera_entity: '{{ ''camera.very_front_door_high_resolution_channel'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''camera.front_driveway_door_high_resolution_channel''
      }}'
    doorbell_label: '{{ ''Front Door'' if trigger.entity_id == ''event.very_front_door_doorbell''
      else ''Driveway Door'' }}'
    snapshot_path: '{{ ''/config/www/doorbell/snapshot_front.jpg'' if trigger.entity_id
      == ''event.very_front_door_doorbell'' else ''/config/www/doorbell/snapshot_driveway.jpg''
      }}'
- id: '1773153864754'
  alias: Doorbell Package Detected → Notification
  description: Sends a push notification with package camera snapshot to John when
    a package is detected at either doorbell. Daytime only (7am–10pm). Uses dedicated
    package camera on G4 Doorbell Pro for reliable close-up snapshot.
  triggers:
  - platform: state
    entity_id: binary_sensor.very_front_door_package_detected
    to: 'on'
    alias: Very Front Door package detected
  - platform: state
    entity_id: binary_sensor.front_driveway_door_package_detected
    to: 'on'
    alias: Front Driveway Door package detected
  conditions:
  - condition: time
    after: 07:00:00
    before: '22:00:00'
  actions:
  - delay:
      seconds: 3
  - target:
      entity_id: '{{ package_camera }}'
    data:
      filename: '{{ snapshot_path }}'
    action: camera.snapshot
  - data:
      title: "\U0001F4E6 Package Delivered — {{ doorbell_label }}"
      message: A package was detected at the {{ doorbell_label }}
      data:
        image: '{{ snapshot_path | replace(''/config/www'', ''/local'') }}'
        channel: Doorbell
        importance: default
        tag: package_{{ doorbell_label | lower | replace(' ', '_') }}
    action: notify.mobile_app_john_s_s26_ultra
  mode: parallel
  max: 2
  variables:
    package_camera: '{{ ''camera.very_front_door_package_camera'' if trigger.entity_id
      == ''binary_sensor.very_front_door_package_detected'' else ''camera.front_driveway_door_package_camera''
      }}'
    doorbell_label: '{{ ''Front Door'' if trigger.entity_id == ''binary_sensor.very_front_door_package_detected''
      else ''Driveway Door'' }}'
    snapshot_path: '{{ ''/config/www/doorbell/package_front.jpg'' if trigger.entity_id
      == ''binary_sensor.very_front_door_package_detected'' else ''/config/www/doorbell/package_driveway.jpg''
      }}'
- id: '1773360880637'
  alias: Ella - Wake With Echo Alarm
  description: Mirrors alaina_wake_echo_alarm. Fires every minute, checks if Ella's
    Echo alarm is in the active/ringing window (within last 2 min). Runs ella_gentle_wake
    script to brighten lights at actual alarm time. Complements ella_gentle_wake_before_alarm
    which fires 15 min prior.
  triggers:
  - platform: time_pattern
    minutes: /1
  conditions:
  - condition: template
    value_template: '{{ state_attr(''sensor.ella_s_bedroom_echo_show_next_alarm_2'',
      ''status'') == ''ON'' or (as_timestamp(now()) - as_timestamp(state_attr(''sensor.ella_s_bedroom_echo_show_next_alarm_2'',
      ''dismissed'') | default(''2000-01-01'', true))) | float(9999) < 120 }}'
  - condition: state
    entity_id: input_boolean.ella_home
    state: 'on'
  - condition: state
    entity_id: input_boolean.ella_bedroom_override
    state: 'off'
  actions:
  - action: script.ella_gentle_wake
  mode: single
- id: '1773361493420'
  alias: Girls → Bedtime Winddown Lighting
  description: When either girl's phone goes on the charger after 8:30pm while home,
    dims their bedroom lights to a warm sleepy scene and schedules auto-off at 45min.
    Uses binary_sensor.ella_home / binary_sensor.alaina_home (Phase 9.1 template sensors,
    not legacy input_booleans).
  triggers:
  - platform: state
    entity_id: sensor.ellas_iphone_battery_state
    to: Charging
    id: ella_charging
  - platform: state
    entity_id: sensor.alainas_iphone_battery_state
    to: Charging
    id: alaina_charging
  conditions:
  - condition: time
    after: '20:30:00'
    before: '23:59:59'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: ella_charging
      - condition: state
        entity_id: binary_sensor.ella_home
        state: 'on'
      - condition: state
        entity_id: input_boolean.ella_bedroom_override
        state: 'off'
      - condition: state
        entity_id: light.ella_s_bedroom
        state: 'on'
      sequence:
      - target:
          entity_id: light.ella_s_bedroom
        data:
          brightness_pct: 15
          color_temp_kelvin: 2200
          transition: 30
        action: light.turn_on
      - delay:
          minutes: 45
      - condition: state
        entity_id: input_boolean.ella_bedroom_override
        state: 'off'
      - target:
          entity_id: light.ella_s_bedroom
        data:
          transition: 60
        action: light.turn_off
    - conditions:
      - condition: trigger
        id: alaina_charging
      - condition: state
        entity_id: binary_sensor.alaina_home
        state: 'on'
      - condition: state
        entity_id: input_boolean.alaina_bedroom_override
        state: 'off'
      - condition: state
        entity_id: light.alaina_s_bedroom
        state: 'on'
      sequence:
      - target:
          entity_id: light.alaina_s_bedroom
        data:
          brightness_pct: 15
          color_temp_kelvin: 2200
          transition: 30
        action: light.turn_on
      - delay:
          minutes: 45
      - condition: state
        entity_id: input_boolean.alaina_bedroom_override
        state: 'off'
      - target:
          entity_id: light.alaina_s_bedroom
        data:
          transition: 60
        action: light.turn_off
  mode: parallel
  max: 2
- id: garage_auto_close_departure
  alias: Garage - Auto Close North on Departure
  description: When John leaves home and North garage door is open, send actionable
    notification then auto-close after 60s unless cancelled.
  triggers:
  - platform: state
    entity_id: person.john_spencer
    to: not_home
    from: home
  conditions:
  - condition: state
    entity_id: cover.ratgdo32disco_fd8d8c_door
    state: open
  actions:
  - action: notify.mobile_app_john_s_s26_ultra
    data:
      title: "\U0001F6AA Garage Still Open"
      message: North door closing in 60s — tap to cancel
      data:
        tag: garage_auto_close
        ttl: 0
        priority: high
        actions:
        - action: CANCEL_AUTO_CLOSE
          title: KEEP OPEN
        - action: CLOSE_NOW_DEPART
          title: CLOSE NOW
  - wait_for_trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: CANCEL_AUTO_CLOSE
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: CLOSE_NOW_DEPART
    timeout:
      seconds: 60
    continue_on_timeout: true
  - if:
    - condition: template
      value_template: '{{ wait.trigger is not none and wait.trigger.event.data.action
        == ''CANCEL_AUTO_CLOSE'' }}'
    then:
    - action: notify.mobile_app_john_s_s26_ultra
      data:
        title: "\U0001F6AA Garage"
        message: North door left open
        data:
          tag: garage_auto_close
          timeout: 30
  - if:
    - condition: template
      value_template: '{{ wait.trigger is not none and wait.trigger.event.data.action
        == ''CLOSE_NOW_DEPART'' }}'
    then:
    - action: cover.close_cover
      target:
        entity_id: cover.ratgdo32disco_fd8d8c_door
    - action: notify.mobile_app_john_s_s26_ultra
      data:
        title: "\U0001F512 Garage"
        message: North door closed
        data:
          tag: garage_auto_close
          timeout: 30
  - if:
    - condition: template
      value_template: '{{ wait.trigger is none }}'
    then: []
  - condition: state
    entity_id: cover.ratgdo32disco_fd8d8c_door
    state: open
  - action: cover.close_cover
    target:
      entity_id: cover.ratgdo32disco_fd8d8c_door
  - action: notify.mobile_app_john_s_s26_ultra
    data:
      title: "\U0001F512 Garage"
      message: North door closed
      data:
        tag: garage_auto_close
        timeout: 30
  mode: single
- id: garage_door_notifications_autoclear
  alias: Garage - Auto-Clear Notifications on Close
  description: When North garage door closes, dismiss the auto-close notification

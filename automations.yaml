      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.ratgdo32disco_fd8d8c_door
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          message: clear_notification
          data:
            tag: garage_door_open_north
    - conditions:
      - condition: trigger
        id: open_south
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.ratgdo32disco_5735e8_door
    - conditions:
      - condition: trigger
        id: open_both
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.ratgdo32disco_5735e8_door
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          message: clear_notification
          data:
            tag: garage_door_open_north
    - conditions:
      - condition: trigger
        id: close_south
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.ratgdo32disco_5735e8_door
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          message: clear_notification
          data:
            tag: garage_door_open_south
    - conditions:
      - condition: trigger
        id: open_north
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.ratgdo32disco_fd8d8c_door
    - conditions:
      - condition: trigger
        id: open_both_from_south
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.ratgdo32disco_fd8d8c_door
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          message: clear_notification
          data:
            tag: garage_door_open_south
    - conditions:
      - condition: trigger
        id: dismiss_north
      sequence:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          message: clear_notification
          data:
            tag: garage_door_open_north
    - conditions:
      - condition: trigger
        id: dismiss_south
      sequence:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          message: clear_notification
          data:
            tag: garage_door_open_south

- id: '1775774068635'
  alias: Living Room — FOH Fan + Light Control
  description: LR FOH switch. Left=fan (up=cycle, down=off). Right=ceiling (up=on,
    down short=ceiling off, down long=ALL LR off).
  triggers:
  - platform: state
    entity_id: event.living_room_hue_switch_button_1
    id: b1
  - platform: state
    entity_id: event.living_room_hue_switch_button_2
    id: b2
  - platform: state
    entity_id: event.living_room_hue_switch_button_3
    id: b3
  - platform: state
    entity_id: event.living_room_hue_switch_button_4
    id: b4
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.attributes.event_type in [''short_release'',
      ''long_release''] }}'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: b1
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.living_room_fan
        data:
          percentage: '{% set pct = state_attr(''fan.living_room_fan'', ''percentage'')
            | int(0) %}

            {% if pct == 0 %}33

            {% elif pct <= 33 %}66

            {% elif pct <= 66 %}100

            {% else %}33{% endif %}'
    - conditions:
      - condition: trigger
        id: b1
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''long_release''
          }}'
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.living_room_fan
        data:
          percentage: 100
    - conditions:
      - condition: trigger
        id: b2
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.living_room_fan
    - conditions:
      - condition: trigger
        id: b3
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.living_room_ceiling
    - conditions:
      - condition: trigger
        id: b3
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''long_release''
          }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.living_room_ceiling
        data:
          brightness_pct: 50
    - conditions:
      - condition: trigger
        id: b4
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''short_release''
          }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.living_room_ceiling
    - conditions:
      - condition: trigger
        id: b4
      - condition: template
        value_template: '{{ trigger.to_state.attributes.event_type == ''long_release''
          }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.living_room_ceiling
          - light.living_room_table_lamps
          - light.living_room_floor_lamps
          - light.living_room_behind_tv_tp_link_smart_light_strip
      - action: fan.turn_off
        target:
          entity_id: fan.living_room_fan
  mode: queued
  max: 5

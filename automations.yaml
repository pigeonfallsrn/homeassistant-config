- id: '1776365074522'
  alias: Upstairs Hallway → Motion Lighting v2
  description: 'Time-aware motion lighting. Triggers: hallway Aqara P1 + bathroom
    motion. 06:00-21:30=Energize, 21:30-23:00=70%/3000K, 23:00-06:00=10%/2200K. 2026-03-24:
    fixed stale P1 entity in motion_aggregation.yaml (was _2 orphan).'
  triggers:
  - platform: state
    entity_id:
    - binary_sensor.upstairs_hallway_motion
    - binary_sensor.upstairs_bathroom_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id:
    - binary_sensor.upstairs_hallway_motion
    - binary_sensor.upstairs_bathroom_motion
    to: 'off'
    for:
      minutes: 3
    id: motion_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - choose:
        - conditions:
          - condition: time
            after: '23:00:00'
            before: 06:00:00
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.upstairs_hallway
            data:
              brightness_pct: 10
              color_temp_kelvin: 2200
              transition: 2
        - conditions:
          - condition: time
            after: '21:30:00'
            before: '23:00:00'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.upstairs_hallway
            data:
              brightness_pct: 70
              color_temp_kelvin: 3000
              transition: 2
        default:
        - action: scene.turn_on
          target:
            entity_id: scene.upstairs_hallway_energize
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.upstairs_hallway
        data:
          transition: 5
  mode: restart
- id: '1776366035204'
  alias: 2nd Floor Bathroom — Humidity Fan Control v4
  description: 'Smart humidity control: Auto-on >70% or motion+60%, auto-off <55%+no
    motion 5min. Config button pause 24hr.'
  triggers:
  - platform: numeric_state
    entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
    above: 70
    id: high_humidity
  - platform: state
    entity_id: binary_sensor.upstairs_bathroom_motion
    to: 'on'
    id: motion_detected
  - platform: numeric_state
    entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
    below: 55
    for:
      minutes: 2
    id: low_humidity
  - platform: state
    entity_id: binary_sensor.upstairs_bathroom_motion
    to: 'off'
    for:
      minutes: 5
    id: no_motion
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.humidity_fan_paused
        state: 'off'
      - condition: trigger
        id:
        - high_humidity
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan_inovelli_fan
        data:
          percentage: 100
    - conditions:
      - condition: state
        entity_id: input_boolean.humidity_fan_paused
        state: 'off'
      - condition: trigger
        id:
        - motion_detected
      - condition: numeric_state
        entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
        above: 60
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan_inovelli_fan
        data:
          percentage: 75
    - conditions:
      - condition: state
        entity_id: input_boolean.humidity_fan_paused
        state: 'off'
      - condition: or
        conditions:
        - condition: trigger
          id:
          - low_humidity
        - condition: trigger
          id:
          - no_motion
      - condition: numeric_state
        entity_id: sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity
        below: 55
      - condition: state
        entity_id: binary_sensor.upstairs_bathroom_motion
        state: 'off'
        for:
          minutes: 5
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.2nd_floor_bathroom_exhaust_fan_inovelli_fan
  mode: restart
- id: '1776366136920'
  alias: 2nd Floor Bathroom — Config Button Fan Pause
  description: Config button press → pause humidity fan 24hr + notification
  triggers:
  - event_data:
      device_ieee: b0:c7:de:ff:fe:61:6c:5e
    event_type: zha_event
    platform: event
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.command == ''config_1x'' }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.humidity_fan_paused
      - action: notify.mobile_app_galaxy_s26_ultra
        data:
          data:
            actions:
            - action: HUMIDITY_UNPAUSE
              title: Resume Now
            - action: HUMIDITY_EXTEND
              title: Extend 12hr
            priority: high
            tag: humidity_pause
            timeout: 300
          message: 'Bathroom humidity fan paused for 24 hours. Current humidity: {{
            states(''sensor.2nd_floor_bathroom_ceiling_lights_inovelli_smart_bulb_mode_humidity'')
            }}%'
          title: "\U0001F4A8 Fan Paused"
      - action: timer.start
        data:
          duration: '24:00:00'
        target:
          entity_id: timer.humidity_fan_pause_timer
  mode: restart
- id: '1776366148290'
  alias: 2nd Floor Bathroom — Humidity Notification Actions
  description: Handle pause/resume notification button actions
  triggers:
  - event_type: mobile_app_notification_action
    platform: event
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''HUMIDITY_UNPAUSE'' }}'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.humidity_fan_paused
      - action: timer.cancel
        target:
          entity_id: timer.humidity_fan_pause_timer
      - action: notify.mobile_app_galaxy_s26_ultra
        data:
          data:
            tag: humidity_pause
          message: clear_notification
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''HUMIDITY_EXTEND'' }}'
      sequence:
      - action: timer.start
        data:
          duration: '12:00:00'
        target:
          entity_id: timer.humidity_fan_pause_timer
      - action: notify.mobile_app_galaxy_s26_ultra
        data:
          data:
            tag: humidity_pause
          message: Humidity fan pause extended 12 hours
          title: "\U0001F4A8 Extended"
  mode: restart
- id: '1776366154798'
  alias: 2nd Floor Bathroom — Humidity Pause Timer Expiry
  description: Auto-resume fan when 24hr timer expires
  triggers:
  - entity_id: timer.humidity_fan_pause_timer
    platform: state
    to: idle
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.humidity_fan_paused
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      message: Humidity fan pause expired - automatic control resumed
      title: "\U0001F4A8 Resumed"
  mode: restart
- id: '1776535781702'
  alias: Entry Room — Lamp Motion Control
  description: 'Consolidated motion-based lamp control. Motion on: turn on lamp with
    AL at context-aware brightness (lux gated). Motion off 3min: dim to 20%. Motion
    off 10min: full off. Respects manual override, hot tub mode, and bedtime mode.
    Replaces 4 separate automations per HA best practice (single automation, dual
    triggers, choose).'
  triggers:
  - platform: state
    entity_id: binary_sensor.entry_room_motion
    to: 'on'
    id: motion_on
  - platform: state
    entity_id: binary_sensor.entry_room_motion
    to: 'off'
    for:
      minutes: 3
    id: motion_dim
  - platform: state
    entity_id: binary_sensor.entry_room_motion
    to: 'off'
    for:
      minutes: 10
    id: motion_off
  conditions:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.dad_bedtime_mode
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      sequence:
      - condition: numeric_state
        entity_id: sensor.entry_room_average_lux
        below: input_number.entry_room_lux_threshold
      - action: switch.turn_on
        target:
          entity_id: switch.adaptive_lighting_living_spaces
      - action: light.turn_on
        target:
          entity_id: light.entry_room_hue_color_lamp
        data:
          brightness_pct: '{{ states(''sensor.evening_lamp_max_brightness'') | int
            }}'
      - action: adaptive_lighting.apply
        data:
          entity_id: switch.adaptive_lighting_entry_room_lamp_adaptive
          lights:
          - light.entry_room_hue_color_lamp
          transition: 2
    - conditions:
      - condition: trigger
        id: motion_dim
      - condition: state
        entity_id: light.entry_room_hue_color_lamp
        state: 'on'
      - condition: numeric_state
        entity_id: light.entry_room_hue_color_lamp
        attribute: brightness
        above: 50
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.entry_room_hue_color_lamp
        data:
          brightness_pct: 20
          transition: 60
    - conditions:
      - condition: trigger
        id: motion_off
      - condition: state
        entity_id: light.entry_room_hue_color_lamp
        state: 'on'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.entry_room_hue_color_lamp
        data:
          transition: 60
  mode: restart
- id: '1776535795628'
  alias: Entry Room — Lamp Mode Overrides
  description: 'Handles hot tub mode and bedtime mode lamp behavior. Hot tub on: deep
    red 5%, disable AL. Hot tub off: restore AL and normal operation. Bedtime on:
    dim warm fade then off after 15min. Extracted from Lamp Adaptive Control per HA
    best practice (separate concerns).'
  triggers:
  - entity_id: input_boolean.hot_tub_mode
    id: hot_tub_on
    platform: state
    to: 'on'
  - entity_id: input_boolean.hot_tub_mode
    id: hot_tub_off
    platform: state
    to: 'off'
  - entity_id: input_boolean.dad_bedtime_mode
    id: bedtime_on
    platform: state
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: hot_tub_on
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 5
          rgb_color:
          - 255
          - 30
          - 0
          transition: 2
        target:
          entity_id: light.entry_room_hue_color_lamp
      - action: switch.turn_off
        target:
          entity_id:
          - switch.adaptive_lighting_entry_room_lamp_adaptive
          - switch.adaptive_lighting_entry_room_ceiling
          - switch.adaptive_lighting_living_spaces
    - conditions:
      - condition: trigger
        id: hot_tub_off
      sequence:
      - action: switch.turn_on
        target:
          entity_id:
          - switch.adaptive_lighting_living_spaces
          - switch.adaptive_lighting_entry_room_lamp_adaptive
          - switch.adaptive_lighting_entry_room_ceiling
      - action: adaptive_lighting.apply
        data:
          entity_id: switch.adaptive_lighting_living_spaces
          lights:
          - light.entry_room_hue_color_lamp
          transition: 5
    - conditions:
      - condition: trigger
        id: bedtime_on
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 10
          color_temp_kelvin: 2200
          transition: 60
        target:
          entity_id: light.entry_room_hue_color_lamp
      - delay:
          minutes: 15
      - action: light.turn_off
        data:
          transition: 60
        target:
          entity_id: light.entry_room_hue_color_lamp
  mode: restart
- id: '1776535826103'
  alias: Entry Room — AUX Switch Control
  description: 'Consolidated AUX switch handler. UP: set manual override + time-based
    scene (day=energize, evening=dim warm, night=arctic aurora). DOWN/OFF: turn off
    ceiling + clear override. Auto-clears override after 30min. Replaces 3 separate
    AUX automations + override reset. Fixed stale entity IDs.'
  triggers:
  - event_data:
      command: button_5_press
      device_ieee: 8c:8b:48:ff:fe:4d:18:9f
    event_type: zha_event
    id: aux_up
    platform: event
  - event_data:
      command: button_4_press
      device_ieee: 8c:8b:48:ff:fe:4d:18:9f
    event_type: zha_event
    id: aux_down
    platform: event
  - event_data:
      command: 'off'
      device_ieee: 8c:8b:48:ff:fe:4d:18:9f
    event_type: zha_event
    id: aux_off_cmd
    platform: event
  - entity_id: input_boolean.entry_room_manual_override
    for:
      minutes: 30
    id: override_timeout
    platform: state
    to: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: aux_up
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.entry_room_manual_override
      - choose:
        - conditions:
          - condition: time
            after: '23:00:00'
            before: 06:00:00
          sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.entry_room_arctic_aurora
        - conditions:
          - condition: time
            after: '20:00:00'
            before: '23:00:00'
          sequence:
          - action: light.turn_on
            data:
              brightness_pct: 60
              color_temp_kelvin: 2700
              transition: 1
            target:
              entity_id: light.entry_room_ceiling_light
        default:
        - action: scene.turn_on
          target:
            entity_id: scene.entry_room_energize
    - conditions:
      - condition: trigger
        id:
        - aux_down
        - aux_off_cmd
      sequence:
      - action: light.turn_off
        data:
          transition: 2
        target:
          entity_id: light.entry_room_ceiling_light
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.entry_room_manual_override
    - conditions:
      - condition: trigger
        id: override_timeout
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.entry_room_manual_override
  mode: restart

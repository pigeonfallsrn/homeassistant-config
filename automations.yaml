  - alias: Front Driveway Door package detected
    entity_id: binary_sensor.front_driveway_door_package_detected
    platform: state
    to: 'on'
  conditions:
  - after: 07:00:00
    before: '22:00:00'
    condition: time
  actions:
  - delay:
      seconds: 3
  - action: camera.snapshot
    data:
      filename: '{{ snapshot_path }}'
    target:
      entity_id: '{{ package_camera }}'
  - action: notify.mobile_app_galaxy_s26_ultra
    data:
      data:
        channel: Doorbell
        image: '{{ snapshot_path | replace(''/config/www'', ''/local'') }}'

        - conditions:
          - condition: template
            value_template: '{{ nxt == 4 }}'
          sequence:
          - action: light.turn_off
            target:
              entity_id: light.living_room_floor_lamps
    - conditions:
      - condition: trigger
        id: b3_long
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.living_room_floor_lamps
      - action: input_number.set_value
        target:

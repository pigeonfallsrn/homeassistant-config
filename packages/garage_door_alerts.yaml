# ============================================================================
# Garage Door Alerts - Native Alert Integration
# Created: 2026-01-22
# 
# Uses HA native alert: for reliable repeating notifications
# Uses input_datetime for snooze that survives restarts
# ============================================================================

template:
  - binary_sensor:
      - name: "Garage North Door Alert Active"
        unique_id: garage_north_door_alert_active
        state: >
          {% set snooze = states('input_datetime.garage_north_snooze_until') %}
          {% set snooze_ts = as_timestamp(snooze, 0) %}
          {{ is_state('cover.ratgdo32disco_fd8d8c_door', 'open') and
             not is_state('person.john_spencer', 'home') and
             now().timestamp() > snooze_ts }}
          
      - name: "Garage South Door Alert Active"
        unique_id: garage_south_door_alert_active
        state: >
          {% set snooze = states('input_datetime.garage_south_snooze_until') %}
          {% set snooze_ts = as_timestamp(snooze, 0) %}
          {{ is_state('cover.ratgdo32disco_5735e8_door', 'open') and
             not is_state('person.john_spencer', 'home') and
             now().timestamp() > snooze_ts }}

alert:
  garage_north_door_open:
    name: "Garage North Door Open"
    entity_id: binary_sensor.garage_north_door_alert_active
    state: "on"
    repeat:
      - 5
      - 15
      - 30
      - 60
    can_acknowledge: true
    skip_first: true
    title: "🚗 Garage North Door Open"
    message: "North garage door has been open for {{ relative_time(states.cover.ratgdo32disco_fd8d8c_door.last_changed) }}"
    done_message: "clear_notification"
    notifiers:
      - mobile_app_john_s_s26_ultra
    data:
      tag: "garage_door_north"
      ttl: 0
      priority: high
      persistent: true
      actions:
        - action: "GARAGE_CLOSE_NORTH"
          title: "Close"
        - action: "GARAGE_SNOOZE_15_NORTH"
          title: "15m"
        - action: "GARAGE_SNOOZE_60_NORTH"
          title: "1hr"

  garage_south_door_open:
    name: "Garage South Door Open"
    entity_id: binary_sensor.garage_south_door_alert_active
    state: "on"
    repeat:
      - 5
      - 15
      - 30
      - 60
    can_acknowledge: true
    skip_first: true
    title: "🚗 Garage South Door Open"
    message: "South garage door has been open for {{ relative_time(states.cover.ratgdo32disco_5735e8_door.last_changed) }}"
    done_message: "clear_notification"
    notifiers:
      - mobile_app_john_s_s26_ultra
    data:
      tag: "garage_door_south"
      ttl: 0
      priority: high
      persistent: true
      actions:
        - action: "GARAGE_CLOSE_SOUTH"
          title: "Close"
        - action: "GARAGE_SNOOZE_15_SOUTH"
          title: "15m"
        - action: "GARAGE_SNOOZE_60_SOUTH"
          title: "1hr"


automation:
- action:
  - action: input_select.select_option
    data:
      option: '{{ states(''sensor.occupancy_mode_auto'') }}'
    target:
      entity_id: input_select.occupancy_mode
  alias: Occupancy → Update Mode
  id: update_occupancy_mode
  max_exceeded: silent
  mode: single
  trigger:
  - entity_id:
    - binary_sensor.john_home
    - binary_sensor.alaina_home
    - binary_sensor.ella_home
    - binary_sensor.michelle_home
    for:
      seconds: 30
    platform: state
- action:
  - action: script.apply_lighting_context
  - action: script.apply_tablet_context
  alias: Context → Apply on Occupancy Change
  id: apply_context_on_occupancy_change
  max_exceeded: silent
  mode: single
  trigger:
  - entity_id: input_select.occupancy_mode
    platform: state
- action:
  - action: script.apply_lighting_context
  alias: Context → Apply on Time Change
  id: apply_context_on_time_change
  max_exceeded: silent
  mode: single
  trigger:
  - entity_id: sensor.time_context
    for:
      seconds: 5
    platform: state
- action:
  - action: script.apply_lighting_context
  alias: Context → Apply on Overlay Change
  id: apply_context_on_overlay_change
  max_exceeded: silent
  mode: single
  trigger:
  - entity_id:
    - input_boolean.preserve_night_vision
    - input_boolean.guest_present
    - input_boolean.kids_bedtime_override
    platform: state
- action:
  - action: calendar.get_events
    data:
      end_date_time: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d 23:59:59'')
        }}

        '
      start_date_time: '{{ (now() + timedelta(days=1)).strftime(''%Y-%m-%d 00:00:00'')
        }}

        '
    response_variable: tomorrow_events
    target:
      entity_id: calendar.master_calendar
  - variables:
      has_no_school: "{{ tomorrow_events['calendar.master_calendar'].events\n   |\
        \ selectattr('summary', 'search', '(?i)(no school|school closed|holiday|inservice|break)')\n\
        \   | list | length > 0 }}\n"
      is_weekend: '{{ (now() + timedelta(days=1)).weekday() >= 5 }}

        '
  - if:
      - condition: template
        value_template: "{{ has_no_school or is_weekend }}"
    then:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.school_tomorrow
    else:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.school_tomorrow
  alias: Calendar → Refresh School Tomorrow
  id: refresh_school_tomorrow
  max_exceeded: silent
  mode: single
  trigger:
  - at: '17:00:00'
    platform: time
  - event: start
    platform: homeassistant
- action:
  - action: calendar.get_events
    data:
      end_date_time: '{{ now().strftime(''%Y-%m-%d 23:59:59'') }}

        '
      start_date_time: '{{ now().strftime(''%Y-%m-%d 00:00:00'') }}

        '
    response_variable: today_events
    target:
      entity_id: calendar.master_calendar
  - variables:
      has_no_school: "{{ today_events['calendar.master_calendar'].events\n   | selectattr('summary',\
        \ 'search', '(?i)(no school|school closed|holiday|inservice|break)')\n   |\
        \ list | length > 0 }}\n"
      is_weekend: '{{ now().weekday() >= 5 }}

        '
  - if:
      - condition: template
        value_template: "{{ has_no_school or is_weekend }}"
    then:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.school_in_session_now
    else:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.school_in_session_now
  alias: Calendar → Refresh School In Session Now
  id: refresh_school_in_session_now
  max_exceeded: silent
  mode: single
  trigger:
  - hours: /1
    platform: time_pattern
input_select:
  occupancy_mode:
    icon: mdi:home-account
    name: Occupancy Mode
    options:
    - Empty
    - John Only
    - Kids Only
    - John + Kids
    - John + Michelle
    - Full House
    - Mixed
script:
  apply_lighting_context:
    alias: Apply Lighting Context
    icon: mdi:lightbulb-auto
    max_exceeded: silent
    mode: single
    sequence:
    - variables:
        bedtime: '{{ is_state(''sensor.bedtime_window_active'', ''on'') }}'
        guest: '{{ is_state(''input_boolean.guest_present'', ''on'') }}'
        night_vision: '{{ is_state(''input_boolean.preserve_night_vision'', ''on'')
          }}'
        occupancy: '{{ states(''input_select.occupancy_mode'') }}'
        time_ctx: '{{ states(''sensor.time_context'') }}'
    - if:
      - condition: template
        value_template: '{{ occupancy == ''Empty'' }}'
      then:
      - action: switch.turn_on
        target:
          entity_id:
          - switch.adaptive_lighting_sleep_mode_living_spaces
          - switch.adaptive_lighting_sleep_mode_kids_rooms
          - switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
          - switch.adaptive_lighting_sleep_mode_upstairs_hallway
          - switch.adaptive_lighting_sleep_mode_kitchen_table
      - action: light.turn_off
        target:
          entity_id:
          - light.living_room_tv_smart_light_strip
          - light.kitchen_lounge
          - light.kitchen_lounge_ceiling_2of2
    - if:
      - condition: template
        value_template: '{{ occupancy == ''John Only'' }}'
      then:
      - action: switch.turn_off
        target:
          entity_id: switch.adaptive_lighting_sleep_mode_living_spaces
      - action: switch.turn_on
        target:
          entity_id:
          - switch.adaptive_lighting_sleep_mode_kids_rooms
          - switch.adaptive_lighting_sleep_mode_upstairs_hallway
      - else:
        - action: switch.turn_off
          target:
            entity_id: switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
        if:
        - condition: template
          value_template: '{{ time_ctx in [''evening'', ''night''] }}'
        then:
        - action: switch.turn_on
          target:
            entity_id: switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
    - if:
      - condition: template
        value_template: '{{ occupancy == ''Kids Only'' }}'
      then:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.adaptive_lighting_sleep_mode_kids_rooms
          - switch.adaptive_lighting_sleep_mode_upstairs_hallway
      - action: switch.turn_on
        target:
          entity_id:
          - switch.adaptive_lighting_sleep_mode_living_spaces
      - if:
        - condition: template
          value_template: '{{ bedtime }}'
        then:
        - action: switch.turn_on
          target:
            entity_id:
            - switch.adaptive_lighting_sleep_mode_kids_rooms
            - switch.adaptive_lighting_sleep_mode_upstairs_hallway
    - if:
      - condition: template
        value_template: '{{ occupancy == ''John + Kids'' }}'
      then:
      - else:
        - action: switch.turn_off
          target:
            entity_id:
            - switch.adaptive_lighting_sleep_mode_living_spaces
            - switch.adaptive_lighting_sleep_mode_kids_rooms
            - switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
            - switch.adaptive_lighting_sleep_mode_upstairs_hallway
            - switch.adaptive_lighting_sleep_mode_kitchen_table
        if:
        - condition: template
          value_template: '{{ bedtime }}'
        then:
        - action: switch.turn_on
          target:
            entity_id:
            - switch.adaptive_lighting_sleep_mode_kids_rooms
            - switch.adaptive_lighting_sleep_mode_upstairs_hallway
        - action: switch.turn_off
          target:
            entity_id:
            - switch.adaptive_lighting_sleep_mode_living_spaces
            - switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
    - if:
      - condition: template
        value_template: '{{ occupancy == ''Full House'' }}'
      then:
      - else:
        - action: switch.turn_off
          target:
            entity_id:
            - switch.adaptive_lighting_sleep_mode_living_spaces
            - switch.adaptive_lighting_sleep_mode_kids_rooms
            - switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
            - switch.adaptive_lighting_sleep_mode_upstairs_hallway
            - switch.adaptive_lighting_sleep_mode_kitchen_table
        if:
        - condition: template
          value_template: '{{ time_ctx == ''night'' }}'
        then:
        - action: switch.turn_on
          target:
            entity_id:
            - switch.adaptive_lighting_sleep_mode_living_spaces
            - switch.adaptive_lighting_sleep_mode_kids_rooms
            - switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
            - switch.adaptive_lighting_sleep_mode_upstairs_hallway
            - switch.adaptive_lighting_sleep_mode_kitchen_table
    - if:
      - condition: template
        value_template: '{{ guest }}'
      then:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.adaptive_lighting_sleep_mode_living_spaces
          - switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
    - if:
      - condition: template
        value_template: '{{ night_vision }}'
      then:
      - action: switch.turn_on
        target:
          entity_id:
          - switch.adaptive_lighting_sleep_mode_living_spaces
          - switch.adaptive_lighting_sleep_mode_kids_rooms
          - switch.adaptive_lighting_sleep_mode_entry_room_ceiling_lights
          - switch.adaptive_lighting_sleep_mode_upstairs_hallway
          - switch.adaptive_lighting_sleep_mode_kitchen_table
  apply_tablet_context:
    alias: Apply Tablet Context
    icon: mdi:tablet-dashboard
    max_exceeded: silent
    mode: single
    sequence:
    - variables:
        base_url: http://192.168.1.3:8123
        guest: '{{ is_state(''input_boolean.guest_present'', ''on'') }}'
        kids_away: '{{ is_state(''binary_sensor.kids_expected_away'', ''on'') }}'
        occupancy: '{{ states(''input_select.occupancy_mode'') }}'
    - variables:
        dashboard_url: "{% if guest %}\n  {{ base_url }}/lovelace/kitchen-guest\n\
          {% elif occupancy == 'Empty' %}\n  {{ base_url }}/lovelace/kitchen-away\n\
          {% elif occupancy == 'John Only' %}\n  {{ base_url }}/lovelace/kitchen-john\n\
          {% elif occupancy == 'Kids Only' %}\n  {{ base_url }}/lovelace/kitchen-kids\n\
          {% else %}\n  {{ base_url }}/lovelace/kitchen-family\n{% endif %}\n"
    - action: fully_kiosk.load_url
      data:
        url: '{{ dashboard_url }}'
      target:
        entity_id: media_player.kitchen_wall_a9_tablet
template:
- sensor:
  - icon: mdi:home-analytics
    name: Occupancy Mode Auto
    state: "{% set john = is_state('binary_sensor.john_home', 'on') %} {% set alaina\
      \ = is_state('binary_sensor.alaina_home', 'on') %} {% set ella = is_state('binary_sensor.ella_home',\
      \ 'on') %} {% set michelle = is_state('binary_sensor.michelle_home', 'on') %}\
      \ {% set kids = alaina or ella %} {% set both_kids = alaina and ella %}\n{%\
      \ if john and both_kids and michelle %}\n  Full House\n{% elif john and both_kids\
      \ %}\n  John + Kids\n{% elif john and michelle %}\n  John + Michelle\n{% elif\
      \ john and kids %}\n  John + Kids\n{% elif kids %}\n  Kids Only\n{% elif john\
      \ %}\n  John Only\n{% else %}\n  Empty\n{% endif %}\n"
    unique_id: occupancy_mode_auto
  - icon: "{% set hour = now().hour %} {% if hour >= 22 or hour < 6 %}\n  mdi:weather-night\n\
      {% elif hour >= 18 %}\n  mdi:weather-sunset\n{% else %}\n  mdi:weather-sunny\n\
      {% endif %}\n"
    name: Time Context
    state: "{% set hour = now().hour %} {% if hour >= 22 or hour < 6 %}\n  night\n\
      {% elif hour >= 18 %}\n  evening\n{% elif hour >= 12 %}\n  afternoon\n{% else\
      \ %}\n  morning\n{% endif %}\n"
    unique_id: time_context
  - icon: mdi:bed-clock
    name: Bedtime Window Active
    state: "{% set hour = now().hour %} {% set school_tomorrow = is_state('input_boolean.school_tomorrow',\
      \ 'on') %} {% set override = is_state('input_boolean.kids_bedtime_override',\
      \ 'on') %}\n{% if override %}\n  off\n{% elif school_tomorrow and hour >= 20\
      \ and hour < 22 %}\n  on\n{% elif not school_tomorrow and hour >= 21 and hour\
      \ < 23 %}\n  on\n{% else %}\n  off\n{% endif %}\n"
    unique_id: bedtime_window_active
- binary_sensor:
  - device_class: occupancy
    name: School In Session Now
    state: '{% set weekday = now().weekday() < 5 %} {% set hour = now().hour %} {%
      set school_hours = hour >= 8 and hour < 15 %} {{ weekday and school_hours and
      is_state(''input_boolean.school_in_session_now'', ''on'') }}

      '
    unique_id: school_in_session_now
  - device_class: occupancy
    name: Kids Expected Away
    state: '{{ is_state(''binary_sensor.school_in_session_now'', ''on'') }}

      '
    unique_id: kids_expected_away

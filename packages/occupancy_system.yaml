template:
- sensor:
  - icon: mdi:home-analytics
    name: Occupancy Mode Auto
    state: "{% set john = is_state('binary_sensor.john_home', 'on') %} {% set alaina\
      \ = is_state('binary_sensor.alaina_home', 'on') %} {% set ella = is_state('binary_sensor.ella_home',\
      \ 'on') %} {% set michelle = is_state('binary_sensor.michelle_home', 'on') %}\
      \ {% set kids = alaina or ella %} {% set both_kids = alaina and ella %}\n{%\
      \ if john and both_kids and michelle %}\n  Full House\n{% elif john and both_kids\
      \ %}\n  John + Kids\n{% elif john and michelle %}\n  John + Michelle\n{% elif\
      \ john and kids %}\n  John + Kids\n{% elif kids %}\n  Kids Only\n{% elif john\
      \ %}\n  John Only\n{% else %}\n  Empty\n{% endif %}\n"
    unique_id: occupancy_mode_auto
  - icon: "{% set hour = now().hour %} {% if hour >= 22 or hour < 6 %}\n  mdi:weather-night\n\
      {% elif hour >= 18 %}\n  mdi:weather-sunset\n{% else %}\n  mdi:weather-sunny\n\
      {% endif %}\n"
    name: Time Context
    state: "{% set hour = now().hour %} {% if hour >= 22 or hour < 6 %}\n  night\n\
      {% elif hour >= 18 %}\n  evening\n{% elif hour >= 12 %}\n  afternoon\n{% else\
      \ %}\n  morning\n{% endif %}\n"
    unique_id: time_context
  - icon: mdi:bed-clock
    name: Bedtime Window Active
    state: "{% set hour = now().hour %} {% set school_tomorrow = is_state('input_boolean.school_tomorrow',\
      \ 'on') %} {% set override = is_state('input_boolean.kids_bedtime_override',\
      \ 'on') %}\n{% if override %}\n  off\n{% elif school_tomorrow and hour >= 20\
      \ and hour < 22 %}\n  on\n{% elif not school_tomorrow and hour >= 21 and hour\
      \ < 23 %}\n  on\n{% else %}\n  off\n{% endif %}\n"
    unique_id: bedtime_window_active
- binary_sensor:
  - device_class: occupancy
    name: School In Session Now
    state: '{% set weekday = now().weekday() < 5 %} {% set hour = now().hour %} {%
      set school_hours = hour >= 8 and hour < 15 %} {{ weekday and school_hours and
      is_state(''input_boolean.school_in_session_now'', ''on'') }}

      '
    unique_id: school_in_session_now
  - device_class: occupancy
    name: Kids Expected Away
    state: '{{ is_state(''binary_sensor.school_in_session_now'', ''on'') }}

      '
    unique_id: kids_expected_away

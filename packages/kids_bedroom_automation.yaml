automation:
- action:
  - action: script.ella_gentle_wake
  alias: Ella - Gentle Wake Before Alarm
  condition:
  - condition: state
    entity_id: input_boolean.kids_wake_lights_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.ella_bedroom_override
    state: 'off'
  - condition: state
    entity_id: binary_sensor.ella_home
    state: 'on'
  - after: 05:00:00
    before: 09:00:00
    condition: time
  description: Start gentle wake lights 15 minutes before Echo alarm
  id: ella_gentle_wake_automation
  mode: single
  trigger:
  - above: 14
    below: 16
    entity_id: sensor.ella_minutes_until_wake
    platform: numeric_state
- action:
  - action: script.alaina_gentle_wake
  alias: Alaina - Gentle Wake Before Alarm
  condition:
  - condition: state
    entity_id: input_boolean.kids_wake_lights_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.alaina_bedroom_override
    state: 'off'
  - condition: state
    entity_id: binary_sensor.alaina_home
    state: 'on'
  - after: 05:00:00
    before: 09:00:00
    condition: time
  description: Start gentle wake lights 15 minutes before Echo alarm
  id: alaina_gentle_wake_automation
  mode: single
  trigger:
  - above: 14
    below: 16
    entity_id: sensor.alaina_minutes_until_wake
    platform: numeric_state
- action:
  - action: script.ella_school_night
  alias: Ella - School Night Bedtime
  condition:
  - condition: state
    entity_id: input_boolean.school_tomorrow
    state: 'on'
  - condition: state
    entity_id: binary_sensor.ella_home
    state: 'on'
  - condition: state
    entity_id: input_boolean.ella_bedroom_override
    state: 'off'
  - condition: or
    conditions:
    - condition: state
      entity_id: light.ella_s_bedroom
      state: 'on'
    - condition: state
      entity_id: light.ella_s_ceiling_light_1_of_3
      state: 'on'
    - condition: state
      entity_id: light.ella_s_led_lights
      state: 'on'
  description: Dim lights on school nights at 9:30 PM
  id: ella_school_night_bedtime
  mode: single
  trigger:
  - at: '21:30:00'
    platform: time
- action:
  - action: script.alaina_school_night
  alias: Alaina - School Night Bedtime
  condition:
  - condition: state
    entity_id: input_boolean.school_tomorrow
    state: 'on'
  - condition: state
    entity_id: binary_sensor.alaina_home
    state: 'on'
  - condition: state
    entity_id: input_boolean.alaina_bedroom_override
    state: 'off'
  - condition: or
    conditions:
    - condition: state
      entity_id: light.alaina_s_bedroom
      state: 'on'
    - condition: state
      entity_id: light.alaina_s_ceiling_lights
      state: 'on'
  description: Dim lights on school nights at 9:30 PM
  id: alaina_school_night_bedtime
  mode: single
  trigger:
  - at: '21:30:00'
    platform: time
- action:
  - action: script.ella_lights_off
  alias: Ella - Lights Off 10:30 PM School Nights
  condition:
  - condition: state
    entity_id: input_boolean.school_tomorrow
    state: 'on'
  - condition: state
    entity_id: input_boolean.ella_bedroom_override
    state: 'off'
  id: ella_lights_hard_off_school
  mode: single
  trigger:
  - at: '22:30:00'
    platform: time
- action:
  - action: script.alaina_lights_off
  alias: Alaina - Lights Off 10:30 PM School Nights
  condition:
  - condition: state
    entity_id: input_boolean.school_tomorrow
    state: 'on'
  - condition: state
    entity_id: input_boolean.alaina_bedroom_override
    state: 'off'
  id: alaina_lights_hard_off_school
  mode: single
  trigger:
  - at: '22:30:00'
    platform: time
- action:
  - action: script.ella_lights_off
  alias: Ella - Lights Off When Leaving
  condition:
  - condition: state
    entity_id: input_boolean.ella_bedroom_override
    state: 'off'
  id: ella_lights_off_when_leaving
  mode: single
  trigger:
  - entity_id: binary_sensor.ella_home
    for:
      minutes: 5
    platform: state
    to: 'off'
- action:
  - action: script.alaina_lights_off
  alias: Alaina - Lights Off When Leaving
  condition:
  - condition: state
    entity_id: input_boolean.alaina_bedroom_override
    state: 'off'
  id: alaina_lights_off_when_leaving
  mode: single
  trigger:
  - entity_id: binary_sensor.alaina_home
    for:
      minutes: 5
    platform: state
    to: 'off'
- action:
  - action: script.ella_lights_off
  - action: script.alaina_lights_off
  alias: Kids - Lights Off When Everyone Away
  id: kids_lights_off_everyone_away
  mode: single
  trigger:
  - entity_id: binary_sensor.someone_home
    platform: state
    to: 'off'
- action:
  - action: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.ella_bedroom_override
      - input_boolean.alaina_bedroom_override
  alias: Kids - Bedroom Override Reset
  id: kids_bedroom_override_reset
  mode: single
  trigger:
  - at: 04:00:00
    platform: time
- action:
  - action: script.alaina_lights_off
  alias: Alaina - Lights Auto Off Midnight (Fri/Sat)
  condition:
  - condition: time
    weekday:
    - sat
    - sun
  - condition: state
    entity_id: input_boolean.alaina_bedroom_override
    state: 'off'
  - condition: or
    conditions:
    - condition: state
      entity_id: light.alaina_s_led_light_strip_1
      state: 'on'
    - condition: state
      entity_id: light.alaina_s_bedside_lamp
      state: 'on'
    - condition: state
      entity_id: light.alaina_s_floor_govee_lamp
      state: 'on'
  id: alaina_lights_auto_off_midnight_weekend
  mode: single
  trigger:
  - at: 00:00:00
    platform: time
- action:
  - action: script.ella_lights_off
  alias: Ella - Lights Auto Off Midnight (Fri/Sat)
  condition:
  - condition: time
    weekday:
    - sat
    - sun
  - condition: state
    entity_id: input_boolean.ella_bedroom_override
    state: 'off'
  - condition: or
    conditions:
    - condition: state
      entity_id: light.ella_s_led_lights
      state: 'on'
    - condition: state
      entity_id: light.ella_s_bedside_lamp
      state: 'on'
    - condition: state
      entity_id: light.ella_s_govee_floor_lamp
      state: 'on'
    - condition: state
      entity_id: light.ella_s_wall_light
      state: 'on'
  id: ella_lights_auto_off_midnight_weekend
  mode: single
  trigger:
  - at: 00:00:00
    platform: time
input_datetime:
  alaina_wake_time_override:
    has_date: false
    has_time: true
    name: Alaina Wake Override
  ella_wake_time_override:
    has_date: false
    has_time: true
    name: Ella Wake Override
script:
  alaina_gentle_wake:
    alias: Alaina Gentle Wake
    icon: mdi:weather-sunset-up
    sequence:
    - action: light.turn_on
      data:
        brightness_pct: 5
        color_temp_kelvin: 2200
      target:
        entity_id: light.alaina_s_bedroom
    - action: light.turn_on
      data:
        brightness_pct: 10
        rgb_color:
        - 255
        - 150
        - 50
      target:
        entity_id: light.alaina_s_bedroom_echo_glow
    - delay:
        seconds: 30
    - action: light.turn_on
      data:
        brightness_pct: 30
        color_temp_kelvin: 3500
        transition: 60
      target:
        entity_id: light.alaina_s_bedroom
    - delay:
        seconds: 90
    - action: light.turn_on
      data:
        brightness_pct: 80
        color_temp_kelvin: 5000
        transition: 90
      target:
        entity_id: light.alaina_s_bedroom
  alaina_lights_off:
    alias: Alaina Lights Off
    icon: mdi:lightbulb-off
    sequence:
    - action: light.turn_off
      target:
        entity_id:
        - light.alaina_s_bedroom
        - light.alaina_s_bedside_lamp
        - light.alaina_s_ceiling_lights
        - light.alaina_s_floor_govee_lamp
        - light.alaina_s_led_light_strip_1
        - light.alaina_s_bedroom_echo_glow
  alaina_school_night:
    alias: Alaina School Night
    icon: mdi:bed-clock
    sequence:
    - action: light.turn_off
      target:
        entity_id:
        - light.alaina_s_ceiling_lights
        - light.alaina_s_led_light_strip_1
    - action: light.turn_on
      data:
        brightness_pct: 5
        color_temp_kelvin: 2000
      target:
        entity_id: light.alaina_s_bedside_lamp
    - action: light.turn_on
      data:
        brightness_pct: 3
        rgb_color:
        - 255
        - 100
        - 50
      target:
        entity_id: light.alaina_s_bedroom_echo_glow
    - delay:
        minutes: 30
    - action: light.turn_off
      target:
        entity_id:
        - light.alaina_s_bedside_lamp
        - light.alaina_s_bedroom_echo_glow
template:
- sensor:
  - attributes:
      source: '{% set echo_alarm = states(''sensor.ella_s_bedroom_echo_show_next_alarm_2'')
        %} {% if echo_alarm not in [''unknown'', ''unavailable'', ''None'', '''']
        %}echo {% else %}override{% endif %}

        '
    icon: mdi:alarm
    name: Ella Next Wake Time
    state: "{% set echo_alarm = states('sensor.ella_s_bedroom_echo_show_next_alarm_2')\
      \ %} {% set override = states('input_datetime.ella_wake_time_override') %} {%\
      \ if echo_alarm not in ['unknown', 'unavailable', 'None', ''] %}\n  {{ echo_alarm\
      \ }}\n{% elif override not in ['unknown', 'unavailable', 'None', ''] %}\n  {{\
      \ override }}\n{% else %}\n  unknown\n{% endif %}\n"
    unique_id: ella_next_wake_time
  - attributes:
      source: '{% set echo_alarm = states(''sensor.alaina_s_bedroom_echo_show_next_alarm_2'')
        %} {% if echo_alarm not in [''unknown'', ''unavailable'', ''None'', '''']
        %}echo {% else %}override{% endif %}

        '
    icon: mdi:alarm
    name: Alaina Next Wake Time
    state: "{% set echo_alarm = states('sensor.alaina_s_bedroom_echo_show_next_alarm_2')\
      \ %} {% set override = states('input_datetime.alaina_wake_time_override') %}\
      \ {% if echo_alarm not in ['unknown', 'unavailable', 'None', ''] %}\n  {{ echo_alarm\
      \ }}\n{% elif override not in ['unknown', 'unavailable', 'None', ''] %}\n  {{\
      \ override }}\n{% else %}\n  unknown\n{% endif %}\n"
    unique_id: alaina_next_wake_time
  - name: Ella Minutes Until Wake
    state: "{% set wake = states('sensor.ella_next_wake_time') %} {% if wake in ['unknown',\
      \ 'unavailable', 'None', ''] %}\n  -1\n{% else %}\n  {% set wake_dt = wake |\
      \ as_datetime %}\n  {% if wake_dt %}\n    {% set diff = (wake_dt - now()).total_seconds()\
      \ / 60 %}\n    {{ diff | round(0) }}\n  {% else %}\n    -1\n  {% endif %}\n\
      {% endif %}\n"
    unique_id: ella_minutes_until_wake
    unit_of_measurement: min
  - name: Alaina Minutes Until Wake
    state: "{% set wake = states('sensor.alaina_next_wake_time') %} {% if wake in\
      \ ['unknown', 'unavailable', 'None', ''] %}\n  -1\n{% else %}\n  {% set wake_dt\
      \ = wake | as_datetime %}\n  {% if wake_dt %}\n    {% set diff = (wake_dt -\
      \ now()).total_seconds() / 60 %}\n    {{ diff | round(0) }}\n  {% else %}\n\
      \    -1\n  {% endif %}\n{% endif %}\n"
    unique_id: alaina_minutes_until_wake
    unit_of_measurement: min

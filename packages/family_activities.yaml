template:
- sensor:
  - icon: mdi:school
    name: Ella School Level
    state: '{% set grade = states(''input_number.ella_grade'') | int(0) %} {% if grade
      <= 5 %}elementary {% elif grade <= 8 %}middle {% else %}high{% endif %}

      '
    unique_id: ella_school_level
  - icon: mdi:school
    name: Alaina School Level
    state: '{% set grade = states(''input_number.alaina_grade'') | int(0) %} {% if
      grade <= 5 %}elementary {% elif grade <= 8 %}middle {% else %}high{% endif %}

      '
    unique_id: alaina_school_level
  - icon: mdi:baseball
    name: Ella Softball Age Division
    state: '{% set grade = states(''input_number.ella_grade'') | int(0) %} {% if grade
      <= 6 %}12U {% elif grade <= 8 %}14U {% else %}HS{% endif %}

      '
    unique_id: ella_softball_age_division
  - icon: mdi:baseball
    name: Alaina Softball Age Division
    state: '{% set grade = states(''input_number.alaina_grade'') | int(0) %} {% if
      grade <= 6 %}12U {% elif grade <= 8 %}14U {% else %}HS{% endif %}

      '
    unique_id: alaina_softball_age_division
  - icon: mdi:clock-outline
    name: Ella Minutes Since Home
    state: "{% set arrived = states('input_datetime.ella_last_arrived_home') %} {%\
      \ if arrived in ['unknown', 'unavailable', ''] %}\n  0\n{% else %}\n  {% set\
      \ arrived_dt = strptime(arrived, '%Y-%m-%d %H:%M:%S') %}\n  {% set diff = (now().replace(tzinfo=None)\
      \ - arrived_dt).total_seconds() / 60 %}\n  {{ diff | int if diff > 0 else 0\
      \ }}\n{% endif %}\n"
    unique_id: ella_minutes_since_home
    unit_of_measurement: min
  - icon: mdi:clock-outline
    name: Alaina Minutes Since Home
    state: "{% set arrived = states('input_datetime.alaina_last_arrived_home') %}\
      \ {% if arrived in ['unknown', 'unavailable', ''] %}\n  0\n{% else %}\n  {%\
      \ set arrived_dt = strptime(arrived, '%Y-%m-%d %H:%M:%S') %}\n  {% set diff\
      \ = (now().replace(tzinfo=None) - arrived_dt).total_seconds() / 60 %}\n  {{\
      \ diff | int if diff > 0 else 0 }}\n{% endif %}\n"
    unique_id: alaina_minutes_since_home
    unit_of_measurement: min
- binary_sensor:
  - device_class: presence
    icon: mdi:calendar-star
    name: Ella at Activity
    state: '{% set at_home = is_state(''binary_sensor.ella_home'', ''on'') %} {% set
      at_school = is_state(''binary_sensor.ella_at_school'', ''on'') %} {% set tenacity_active
      = is_state(''calendar.12s_1'', ''on'') %} {% set school_vball = is_state(''calendar.whitehall_6th_grade_volleyball'',
      ''on'') %} {% set school_bball = is_state(''calendar.6th_grade_girls_basketball'',
      ''on'') %} {% set any_calendar_active = tenacity_active or school_vball or school_bball
      %} {{ not at_home and not at_school and any_calendar_active }}

      '
    unique_id: ella_at_activity
  - device_class: presence
    icon: mdi:calendar-star
    name: Alaina at Activity
    state: '{% set at_home = is_state(''binary_sensor.alaina_home'', ''on'') %} {%
      set at_school = is_state(''binary_sensor.alaina_at_school'', ''on'') %} {% set
      at_bagc = is_state(''person.alaina_spencer'', ''BAGC Gymnastics'') %} {% set
      tenacity_active = is_state(''calendar.14s_2'', ''on'') %} {% set school_vball
      = is_state(''calendar.whitehall_middle_school_volleyball_calendar'', ''on'')
      %} {% set gymnastics = is_state(''calendar.bagc_maga_team_1_2_calendar'', ''on'')
      %} {% set any_calendar_active = tenacity_active or school_vball or gymnastics
      %} {{ at_bagc or (not at_home and not at_school and any_calendar_active) }}

      '
    unique_id: alaina_at_activity
  - icon: mdi:clock-alert
    name: Ella Had Late Activity
    state: "{% set had_activity = is_state('input_boolean.ella_had_activity_today',\
      \ 'on') %} {% set arrived = states('input_datetime.ella_last_arrived_home')\
      \ %} {% if arrived in ['unknown', 'unavailable', ''] %}\n  false\n{% else %}\n\
      \  {% set arrived_dt = strptime(arrived, '%Y-%m-%d %H:%M:%S') %}\n  {% set arrived_hour\
      \ = arrived_dt.hour %}\n  {% set today = now().date() == arrived_dt.date() %}\n\
      \  {{ had_activity and today and arrived_hour >= 19 }}\n{% endif %}\n"
    unique_id: ella_had_late_activity
  - icon: mdi:clock-alert
    name: Alaina Had Late Activity
    state: "{% set had_activity = is_state('input_boolean.alaina_had_activity_today',\
      \ 'on') %} {% set arrived = states('input_datetime.alaina_last_arrived_home')\
      \ %} {% if arrived in ['unknown', 'unavailable', ''] %}\n  false\n{% else %}\n\
      \  {% set arrived_dt = strptime(arrived, '%Y-%m-%d %H:%M:%S') %}\n  {% set arrived_hour\
      \ = arrived_dt.hour %}\n  {% set today = now().date() == arrived_dt.date() %}\n\
      \  {{ had_activity and today and arrived_hour >= 19 }}\n{% endif %}\n"
    unique_id: alaina_had_late_activity
  - icon: mdi:weather-night
    name: Ella Winddown Active
    state: "{% set school_tomorrow = is_state('input_boolean.school_tomorrow', 'on')\
      \ %} {% set override = is_state('input_boolean.ella_winddown_override', 'on')\
      \ %} {% set at_home = is_state('binary_sensor.ella_home', 'on') %} {% set late_activity\
      \ = is_state('binary_sensor.ella_had_late_activity', 'on') %} {% set minutes_home\
      \ = states('sensor.ella_minutes_since_home') | int(0) %} {% set current_hour\
      \ = now().hour %} {% if not school_tomorrow or override or not at_home %}\n\
      \  false\n{% elif late_activity %}\n  {{ minutes_home >= 90 }}\n{% else %}\n\
      \  {{ current_hour >= 21 }}\n{% endif %}\n"
    unique_id: ella_winddown_active
  - icon: mdi:weather-night
    name: Alaina Winddown Active
    state: "{% set school_tomorrow = is_state('input_boolean.school_tomorrow', 'on')\
      \ %} {% set override = is_state('input_boolean.alaina_winddown_override', 'on')\
      \ %} {% set at_home = is_state('binary_sensor.alaina_home', 'on') %} {% set\
      \ late_activity = is_state('binary_sensor.alaina_had_late_activity', 'on') %}\
      \ {% set minutes_home = states('sensor.alaina_minutes_since_home') | int(0)\
      \ %} {% set current_hour = now().hour %} {% if not school_tomorrow or override\
      \ or not at_home %}\n  false\n{% elif late_activity %}\n  {{ minutes_home >=\
      \ 90 }}\n{% else %}\n  {{ current_hour >= 21 }}\n{% endif %}\n"
    unique_id: alaina_winddown_active
zone:
- icon: mdi:gymnastics
  latitude: 43.9761
  longitude: -91.3587
  name: BAGC Gymnastics
  radius: 150

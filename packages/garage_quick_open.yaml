# =============================================================================
# GARAGE QUICK OPEN - STREAMLINED
# Walk-in door + Auto-close on departure + Shared handlers
# Arrival/approach automations moved to garage_arrival_optimized.yaml
# =============================================================================

automation:
  # ===========================================================================
  # WALK-IN DOOR TRIGGER (when home, manual open option)
  # ===========================================================================
  - id: garage_auto_close_departure
    alias: "Garage - Auto Close North on Departure"
    unique_id: auto_49de33af96ac43b6
    trigger:
      - platform: state
        entity_id: person.john_spencer
        from: "home"
        id: left_zone
    condition:
      - condition: state
        entity_id: cover.ratgdo32disco_fd8d8c_door
        state: "open"
    action:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          title: "🚪 Garage Still Open"
          message: "North door closing in 60s — tap to cancel"
          data:
            tag: "garage_auto_close"
            ttl: 0
            priority: high
            clickAction: "/lovelace/garage"
            actions:
              - action: "CANCEL_AUTO_CLOSE"
                title: "KEEP OPEN"
              - action: "CLOSE_NOW_DEPART"
                title: "CLOSE NOW"
      - wait_for_trigger:
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CANCEL_AUTO_CLOSE"
            id: cancelled
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CLOSE_NOW_DEPART"
            id: close_now
          - platform: state
            entity_id: person.john_spencer
            to: "home"
            id: returned
        timeout:
          seconds: 60
        continue_on_timeout: true
      - if:
          - condition: template
            value_template: "{{ wait.trigger and wait.trigger.id == 'cancelled' }}"
        then:
          - action: notify.mobile_app_john_s_s26_ultra
            data:
              message: "clear_notification"
              data:
                tag: "garage_auto_close"
          - stop: "User cancelled"
      - if:
          - condition: template
            value_template: "{{ wait.trigger and wait.trigger.id == 'returned' }}"
        then:
          - action: notify.mobile_app_john_s_s26_ultra
            data:
              title: "🏠 Welcome Back"
              message: "Auto-close cancelled"
              data:
                tag: "garage_auto_close"
                timeout: 15
          - stop: "Returned home"
      - if:
          - condition: template
            value_template: "{{ wait.trigger and wait.trigger.id == 'close_now' }}"
        then:
          - action: cover.close_cover
            target:
              entity_id: cover.ratgdo32disco_fd8d8c_door
          - action: notify.mobile_app_john_s_s26_ultra
            data:
              message: "clear_notification"
              data:
                tag: "garage_auto_close"
          - stop: "Close now"
      - condition: state
        entity_id: cover.ratgdo32disco_fd8d8c_door
        state: "open"
      - action: cover.close_cover
        target:
          entity_id: cover.ratgdo32disco_fd8d8c_door
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          title: "🔒 Garage"
          message: "North door closed"
          data:
            tag: "garage_auto_close"
            timeout: 30
    mode: single

  # ===========================================================================
  # QUICK OPEN ACTION HANDLER
  # ===========================================================================
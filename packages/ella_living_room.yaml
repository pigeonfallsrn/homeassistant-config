# Ella Living Room Package
# Created: 2026-03-23
# Ella is living in the living room for ~3 months

input_select:
  ella_sleep_timer:
    name: "Ella Sleep Timer"
    icon: mdi:sleep
    initial: "Off"
    options:
      - "Off"
      - "15 min"
      - "30 min"
      - "45 min"
      - "60 min"

automation:
  - id: ella_sleep_timer_set
    alias: "Ella - Sleep Timer Set"
    unique_id: auto_722a452875864089
    description: "When Ella sets a sleep timer, wait then turn off TV and dim lights"
    mode: restart
    trigger:
      - platform: state
        entity_id: input_select.ella_sleep_timer
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state != 'Off' }}"
    action:
      - variables:
          minutes: >
            {% set s = trigger.to_state.state %}
            {% if s == '15 min' %}15
            {% elif s == '30 min' %}30
            {% elif s == '45 min' %}45
            {% elif s == '60 min' %}60
            {% else %}0{% endif %}
      - delay:
          minutes: "{{ minutes }}"
      - action: media_player.turn_off
        target:
          entity_id: media_player.living_room_tv
      - action: light.turn_on
        target:
          entity_id:
            - light.living_room_lounge_lamp
            - light.living_room_table_lamps
            - light.living_room_floor_lamps
        data:
          brightness_pct: 1
          transition: 60
      - delay:
          seconds: 65
      - action: light.turn_off
        target:
          entity_id:
            - light.living_room_lounge
            - light.living_room_floor_lamps
            - light.living_room_table_lamps
      - action: input_select.select_option
        target:
          entity_id: input_select.ella_sleep_timer
        data:
          option: "Off"

  - id: ella_sleep_timer_cancel
    alias: "Ella - Sleep Timer Cancel"
    unique_id: auto_e7c4293871904479
    description: "Cancel sleep timer when set back to Off"
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.ella_sleep_timer
        to: "Off"
    action:
      - action: automation.turn_off
        target:
          entity_id: automation.ella_sleep_timer_set
      - action: automation.turn_on
        target:
          entity_id: automation.ella_sleep_timer_set

  - id: ella_night_path_on
    alias: "Ella - Night Path Lights On"
    unique_id: auto_c8f4425093004103
    description: "Dim safety lighting: living room lounge lamp + 1st floor bathroom when motion detected at night"
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.living_room_motion
          - binary_sensor.1st_floor_bathroom_hallway_motion
        to: "on"
    condition:
      - condition: time
        after: "21:00:00"
        before: "06:00:00"
      - condition: state
        entity_id: binary_sensor.someone_home
        state: "on"
    action:
      - action: light.turn_on
        target:
          entity_id: light.living_room_lounge_lamp
        data:
          brightness_pct: 5
          color_temp_kelvin: 2200
          transition: 2
      - action: light.turn_on
        target:
          entity_id: light.1st_floor_bathroom
        data:
          brightness_pct: 10
          color_temp_kelvin: 2200
          transition: 2

  - id: ella_night_path_off
    alias: "Ella - Night Path Lights Off"
    unique_id: auto_de251b2cc2bb48a9
    description: "Turn off night path lights 3 min after motion clears"
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.living_room_motion
          - binary_sensor.1st_floor_bathroom_hallway_motion
        to: "off"
        for:
          minutes: 3
    condition:
      - condition: time
        after: "21:00:00"
        before: "06:00:00"
    action:
      - action: light.turn_off
        target:
          entity_id:
            - light.living_room_lounge_lamp
            - light.1st_floor_bathroom
        data:
          transition: 5

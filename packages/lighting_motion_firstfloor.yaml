# First Floor Motion Lighting — Zone Consolidation
# Created: 2026-04-04
# Zone A: first_floor_main_motion — kitchen P1 + west kitchen TR + entry P1 (12min)
# Zone B: first_floor_hallway_motion — basement hall P1 + very front hall P1 (5min)
# Uses template: syntax (same as motion_aggregation.yaml — confirmed working)
# REQUIRES: ha core restart (package YAML)

template:
  - binary_sensor:
      - name: "First Floor Main Motion"
        unique_id: first_floor_main_motion
        device_class: motion
        state: >
          {{ is_state('binary_sensor.kitchen_aqara_motion_sensor_p1_occupancy', 'on')
             or is_state('binary_sensor.west_kitchen_sensor_motion_sensor_occupancy', 'on')
             or is_state('binary_sensor.entry_room_aqara_motion_sensor_occupancy', 'on') }}
        delay_off:
          minutes: 10

      - name: "First Floor Hallway Motion"
        unique_id: first_floor_hallway_motion
        device_class: motion
        state: >
          {{ is_state('binary_sensor.basement_hallway_motion_sensor_occupancy', 'on')
             or is_state('binary_sensor.very_front_door_motion_sensor_occupancy', 'on') }}

automation:
  - id: kitchen_manual_override_auto_clear
    alias: "Kitchen Manual Override — Auto-Clear on No Motion"
    description: >
      Clears kitchen_manual_override after 12min of no motion.
      Ensures kitchen resets to motion-control after person leaves.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.first_floor_main_motion
        to: "off"
        for:
          minutes: 12
    condition:
      - condition: state
        entity_id: input_boolean.kitchen_manual_override
        state: "on"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.kitchen_manual_override
            - input_boolean.kitchen_lounge_manual_override

  # ─────────────────────────────────────────────────────────
  # KITCHEN CORE ZONE — Motion Lighting (Tier 1: Hue only)
  # Lounge ceiling (Hue fan bulbs) + lounge lamp
  # Shared fate with kitchen — open concept, one zone
  # Lux-gated: only fires below 200 lux (TR nightlight sensor)
  # AL manages color/temp — no brightness/color params here
  # Added: 2026-04-06
  # ─────────────────────────────────────────────────────────
  - id: kitchen_lounge_motion_on
    alias: "Kitchen Lounge — On with Motion"
    description: >
      Turns on kitchen lounge Hue lights when first_floor_main_motion
      detects activity and lux is below 200. No color/brightness params
      set — AL takes over immediately after turn_on.
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.first_floor_main_motion
        to: "on"
    condition:
      - condition: numeric_state
        entity_id: sensor.kitchen_counter_night_light_illuminance
        below: 200
      - condition: state
        entity_id: input_boolean.kitchen_lounge_manual_override
        state: "off"
    action:
      - action: light.turn_on
        target:
          entity_id:
            - light.kitchen_lounge
            - light.kitchen_lounge
            - light.kitchen_lounge_lamp

  - id: kitchen_lounge_motion_off
    alias: "Kitchen Lounge — Off No Motion"
    description: >
      Turns off kitchen lounge Hue lights after 12min of no motion.
      mode: restart resets the clock on any motion re-entry.
      Matches the 12min timeout of kitchen_manual_override_auto_clear.
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.first_floor_main_motion
        to: "off"
        for:
          minutes: 12
    condition:
      - condition: state
        entity_id: input_boolean.kitchen_lounge_manual_override
        state: "off"
    action:
      - action: light.turn_off
        target:
          entity_id:
            - light.kitchen_lounge
            - light.kitchen_lounge
            - light.kitchen_lounge_lamp

  # ─────────────────────────────────────────────────────────
  # KITCHEN TIER 2 — Inovelli Dimmers (ceiling cans + bar pendants)
  # Explicit brightness_pct ONLY — AL not involved (dumb loads)
  # Day (lux 50-200): 80% | Night (lux ≤50): 40%
  # Same trigger/zone as Tier 1 — shared fate, open concept
  # Added: 2026-04-07
  # ─────────────────────────────────────────────────────────
  - id: kitchen_tier2_motion_on
    alias: "Kitchen Tier 2 — Dimmers On with Motion"
    description: >
      Turns on kitchen Inovelli ceiling cans and bar pendants on motion.
      Explicit brightness_pct only — Tier 2, no AL involvement.
        Time-aware: Day 06-19=80%, Evening 19-22=30%, Late 22-06=OFF (nightlight scene).
      Gate: lux < 200. Respects kitchen_manual_override.
      Updated: 2026-04-08
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.first_floor_main_motion
        to: "on"
    condition:
      - condition: numeric_state
        entity_id: sensor.kitchen_counter_night_light_illuminance
        below: 200
      - condition: state
        entity_id: input_boolean.kitchen_manual_override
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: time
                after: "06:00:00"
                before: "19:00:00"
            sequence:
              - action: light.turn_on
                target:
                  entity_id:
                    - light.kitchen_ceiling_inovelli_vzm31_sn
                    - light.kitchen_bar_pendant_lights
                data:
                  brightness_pct: 80
                  transition: 0
          - conditions:
              - condition: time
                after: "19:00:00"
                before: "22:00:00"
            sequence:
              - action: light.turn_on
                target:
                  entity_id:
                    - light.kitchen_ceiling_inovelli_vzm31_sn
                    - light.kitchen_bar_pendant_lights
                data:
                  brightness_pct: 30
                  transition: 0
        default:
            - action: light.turn_off
              target:
                entity_id:
                  - light.kitchen_ceiling_inovelli_vzm31_sn
                  - light.kitchen_bar_pendant_lights
            - action: scene.turn_on
              target:
                entity_id: scene.kitchen_nightlight

  - id: kitchen_tier2_motion_off
    alias: "Kitchen Tier 2 — Dimmers Off No Motion"
    description: >
      Turns off kitchen Inovelli ceiling cans and bar pendants after
      12min no motion. Matches Tier 1 timeout for shared fate zone.
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.first_floor_main_motion
        to: "off"
        for:
          minutes: 12
    action:
      - action: light.turn_off
        target:
          entity_id:
            - light.kitchen_ceiling_inovelli_vzm31_sn
            - light.kitchen_bar_pendant_lights

# First Floor Motion Lighting — Zone Consolidation
# Created: 2026-04-04
# Zone A: first_floor_main_motion — kitchen P1 + west kitchen TR + entry P1 (12min)
# Zone B: first_floor_hallway_motion — basement hall P1 + very front hall P1 (5min)
# Uses template: syntax (same as motion_aggregation.yaml — confirmed working)
# REQUIRES: ha core restart (package YAML)

template:
  - binary_sensor:
      - name: "First Floor Main Motion"
        unique_id: first_floor_main_motion
        device_class: motion
        state: >
          {{ is_state('binary_sensor.kitchen_aqara_motion_sensor_p1_occupancy', 'on')
             or is_state('binary_sensor.west_kitchen_sensor_motion_sensor_occupancy', 'on')
             or is_state('binary_sensor.entry_room_aqara_motion_sensor_occupancy', 'on')
             or is_state('binary_sensor.apollo_r_pro_1_748020_ld2450_presence', 'on') }}
        delay_off:
          minutes: 10

      - name: "First Floor Hallway Motion"
        unique_id: first_floor_hallway_motion
        device_class: motion
        state: >
          {{ is_state('binary_sensor.basement_hallway_motion_sensor_occupancy', 'on')
             or is_state('binary_sensor.very_front_door_motion_sensor_occupancy', 'on') }}
          delay_off:
            minutes: 5


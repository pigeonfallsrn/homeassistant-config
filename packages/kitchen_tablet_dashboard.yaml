automation:
- action:
  - choose:
    - conditions:
      - after: 07:00:00
        before: '20:00:00'
        condition: time
      sequence:
      - action: number.set_value
        data:
          value: 80
        target:
          entity_id: number.kitchen_wall_a9_tablet_screen_brightness
    - conditions:
      - after: '20:00:00'
        before: '22:00:00'
        condition: time
      sequence:
      - action: number.set_value
        data:
          value: 50
        target:
          entity_id: number.kitchen_wall_a9_tablet_screen_brightness
    default:
    - action: number.set_value
      data:
        value: 20
      target:
        entity_id: number.kitchen_wall_a9_tablet_screen_brightness
  alias: Kitchen Tablet - Brightness Schedule
  id: kitchen_tablet_brightness_schedule
  mode: single
  trigger:
  - at: 07:00:00
    platform: time
  - at: '20:00:00'
    platform: time
  - at: '22:00:00'
    platform: time
  - event: start
    platform: homeassistant
- action:
  - action: switch.turn_on
    target:
      entity_id: switch.kitchen_wall_a9_tablet_screen
  - action: number.set_value
    data:
      value: 100
    target:
      entity_id: number.kitchen_wall_a9_tablet_screen_brightness
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.kitchen_tablet_doorbell_popup
  - delay:
      seconds: 60
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.kitchen_tablet_doorbell_popup
  alias: Kitchen Tablet - Doorbell Camera Popup
  condition:
  - condition: state
    entity_id: binary_sensor.house_occupied
    state: 'on'
  id: kitchen_tablet_doorbell_popup
  trigger:
  - entity_id: binary_sensor.very_front_door_doorbell
    id: front_door
    platform: state
    to: 'on'
  - entity_id: binary_sensor.front_driveway_door_doorbell
    id: driveway
    platform: state
    to: 'on'
- action:
  - action: switch.turn_on
    target:
      entity_id: switch.kitchen_wall_a9_tablet_screen
  alias: Kitchen Tablet - Wake on Kitchen Motion
  condition:
  - condition: state
    entity_id: switch.kitchen_wall_a9_tablet_screen
    state: 'off'
  - condition: state
    entity_id: binary_sensor.house_occupied
    state: 'on'
  id: kitchen_tablet_motion_wake
  trigger:
  - entity_id:
    - binary_sensor.kitchen_counter_night_light_motion
    - binary_sensor.kitchen_counter_nightlight_motion
    - binary_sensor.kitchen_west_wall_nightlight_motion
    platform: state
    to: 'on'
- action:
  - action: switch.turn_off
    target:
      entity_id: switch.kitchen_wall_a9_tablet_screen
  alias: Kitchen Tablet - Sleep After Inactivity
  condition:
  - condition: state
    entity_id: switch.kitchen_wall_a9_tablet_screen
    state: 'on'
  - condition: state
    entity_id: input_boolean.kitchen_tablet_doorbell_popup
    state: 'off'
  id: kitchen_tablet_sleep_inactivity
  trigger:
  - entity_id: sensor.kitchen_wall_a9_tablet
    for:
      minutes: 5
    platform: state
    to: Idle
- action:
  - action: notify.mobile_app_kitchen_samsung_tablet_wall_mount
    data:
      message: command_screen_on
  alias: Kitchen Tablet - Wake on Presence
  condition:
  - condition: state
    entity_id: input_boolean.kitchen_tablet_screen_control
    state: 'on'
  description: Wake tablet when someone is home
  id: kitchen_tablet_wake_on_presence
  mode: single
  trigger:
  - entity_id:
    - person.john_spencer
    - person.alaina_spencer
    - person.ella_spencer
    platform: state
    to: home
  - entity_id: binary_sensor.kitchen_ai_theta_motion
    platform: state
    to: 'on'
- action:
  - action: notify.mobile_app_kitchen_samsung_tablet_wall_mount
    data:
      message: command_screen_off
  alias: Kitchen Tablet - Sleep When Away
  condition:
  - condition: state
    entity_id: person.john_spencer
    state: not_home
  - condition: state
    entity_id: person.alaina_spencer
    state: not_home
  - condition: state
    entity_id: person.ella_spencer
    state: not_home
  description: Turn off tablet screen when no one home
  id: kitchen_tablet_sleep_when_away
  mode: single
  trigger:
  - entity_id:
    - person.john_spencer
    - person.alaina_spencer
    - person.ella_spencer
    for:
      minutes: 10
    platform: state
    to: not_home
input_select:
  kitchen_lighting_scene:
    icon: mdi:lightbulb-group
    initial: 'Off'
    name: Kitchen Lighting Scene
    options:
    - 'Off'
    - Bright
    - Dim
    - Nightlight
script:
  kitchen_scene_all_off:
    alias: Kitchen Scene - All Off
    description: All lights off. SBM switches stay powered for Hue connectivity.
    icon: mdi:lightbulb-off
    mode: single
    sequence:
    - action: light.turn_off
      target:
        entity_id:
        - light.kitchen_ceiling_inovelli_vzm31_sn
        - light.kitchen_bar_pendant_lights
        - light.kitchen_under_cabinet_lights_inovelli
        - light.kitchen_chandelier
        - light.kitchen_above_sink_light
        - light.kitchen_under_cabinet_aqara_t1_led_strip
        - light.kitchen_lounge_light_fan_inovelli_vzm36_light
        - light.kitchen_lounge
        - light.kitchen_govee_floor_lamp
    - action: input_select.select_option
      data:
        option: 'Off'
      target:
        entity_id: input_select.kitchen_lighting_scene
  kitchen_scene_bright:
    alias: Kitchen Scene - Bright
    description: Full task lighting. All work surfaces bright. Good for cooking, cleaning,
      morning.
    icon: mdi:brightness-7
    mode: single
    sequence:
    - action: light.turn_on
      data:
        brightness_pct: 100
      target:
        entity_id:
        - light.kitchen_ceiling_inovelli_vzm31_sn
        - light.kitchen_bar_pendant_lights
        - light.kitchen_under_cabinet_lights_inovelli
    - action: light.turn_on
      data:
        brightness_pct: 100
        color_temp_kelvin: 3500
      target:
        entity_id:
        - light.kitchen_chandelier
        - light.kitchen_above_sink_light
    - action: light.turn_on
      data:
        brightness_pct: 100
        color_temp_kelvin: 4000
      target:
        entity_id: light.kitchen_under_cabinet_aqara_t1_led_strip
    - action: light.turn_on
      data:
        brightness_pct: 60
      target:
        entity_id: light.kitchen_lounge_light_fan_inovelli_vzm36_light
    - action: light.turn_on
      data:
        brightness_pct: 70
        color_temp_kelvin: 3000
      target:
        entity_id: light.kitchen_lounge
    - action: light.turn_off
      target:
        entity_id: light.kitchen_govee_floor_lamp
    - action: input_select.select_option
      data:
        option: Bright
      target:
        entity_id: input_select.kitchen_lighting_scene
  kitchen_scene_dim:
    alias: Kitchen Scene - Dim
    description: Evening ambiance. Chandelier focal point, warm lounge, Govee + under-cab
      accent.
    icon: mdi:brightness-3
    mode: single
    sequence:
    - action: light.turn_off
      target:
        entity_id:
        - light.kitchen_ceiling_inovelli_vzm31_sn
        - light.kitchen_bar_pendant_lights
    - action: light.turn_on
      data:
        brightness_pct: 12
      target:
        entity_id: light.kitchen_under_cabinet_lights_inovelli
    - action: light.turn_on
      data:
        brightness_pct: 40
        color_temp_kelvin: 2700
      target:
        entity_id: light.kitchen_chandelier
    - action: light.turn_on
      data:
        brightness_pct: 20
        color_temp_kelvin: 2700
      target:
        entity_id: light.kitchen_above_sink_light
    - action: light.turn_on
      data:
        brightness_pct: 18
        color_temp_kelvin: 2700
      target:
        entity_id: light.kitchen_under_cabinet_aqara_t1_led_strip
    - action: light.turn_on
      data:
        brightness_pct: 25
      target:
        entity_id: light.kitchen_lounge_light_fan_inovelli_vzm36_light
    - action: light.turn_on
      data:
        brightness_pct: 35
        color_temp_kelvin: 2200
      target:
        entity_id: light.kitchen_lounge
    - action: light.turn_on
      data:
        brightness_pct: 40
        hs_color:
        - 28
        - 85
      target:
        entity_id: light.kitchen_govee_floor_lamp
    - action: input_select.select_option
      data:
        option: Dim
      target:
        entity_id: input_select.kitchen_lighting_scene
  kitchen_scene_nightlight:
    alias: Kitchen Scene - Nightlight
    description: Navigation only. Warm minimum glow. Under-cab and Govee very low.
    icon: mdi:weather-night
    mode: single
    sequence:
    - action: light.turn_off
      target:
        entity_id:
        - light.kitchen_ceiling_inovelli_vzm31_sn
        - light.kitchen_bar_pendant_lights
        - light.kitchen_lounge_light_fan_inovelli_vzm36_light
    - action: light.turn_on
      data:
        brightness_pct: 3
      target:
        entity_id: light.kitchen_under_cabinet_lights_inovelli
    - action: light.turn_on
      data:
        brightness_pct: 5
        color_temp_kelvin: 2200
      target:
        entity_id: light.kitchen_chandelier
    - action: light.turn_on
      data:
        brightness_pct: 8
        color_temp_kelvin: 2200
      target:
        entity_id: light.kitchen_above_sink_light
    - action: light.turn_on
      data:
        brightness_pct: 5
        color_temp_kelvin: 2200
      target:
        entity_id: light.kitchen_lounge_lamp
    - action: light.turn_on
      data:
        brightness_pct: 4
        color_temp_kelvin: 2200
      target:
        entity_id: light.kitchen_under_cabinet_aqara_t1_led_strip
    - action: light.turn_on
      data:
        brightness_pct: 10
        hs_color:
        - 28
        - 60
      target:
        entity_id: light.kitchen_govee_floor_lamp
    - action: input_select.select_option
      data:
        option: Nightlight
      target:
        entity_id: input_select.kitchen_lighting_scene
  kitchen_scene_select:
    alias: Kitchen Scene Select
    description: Toggle kitchen scene via tablet buttons.
    fields:
      scene:
        name: Scene
        required: true
        selector:
          select:
            options:
            - Bright
            - Dim
            - Nightlight
    icon: mdi:lightbulb-group
    mode: single
    sequence:
    - variables:
        scene_script_map:
          Bright: script.kitchen_scene_bright
          Dim: script.kitchen_scene_dim
          Nightlight: script.kitchen_scene_nightlight
    - else:
      - action: script.turn_on
        target:
          entity_id: '{{ scene_script_map[scene] }}'
      if:
      - condition: template
        value_template: '{{ states(''input_select.kitchen_lighting_scene'') == scene
          }}'
      then:
      - action: script.turn_on
        target:
          entity_id: script.kitchen_scene_all_off
template:
- binary_sensor:
  - icon: mdi:account
    name: John Home Alone
    state: "{{ is_state('person.john_spencer', 'home') and\n   is_state('person.michelle',\
      \ 'not_home') and\n   is_state('person.alaina_spencer', 'not_home') and\n  \
      \ is_state('person.ella_spencer', 'not_home') and\n   is_state('person.jarrett_goetting',\
      \ 'not_home') and\n   is_state('person.owen_goetting', 'not_home') }}\n"
    unique_id: john_home_alone
  - icon: mdi:account-multiple
    name: Adults Only Home
    state: "{{ (is_state('person.john_spencer', 'home') or is_state('person.michelle',\
      \ 'home')) and\n   is_state('person.alaina_spencer', 'not_home') and\n   is_state('person.ella_spencer',\
      \ 'not_home') and\n   is_state('person.jarrett_goetting', 'not_home') and\n\
      \   is_state('person.owen_goetting', 'not_home') }}\n"
    unique_id: adults_only_home
  - device_class: occupancy
    icon: mdi:home-account
    name: House Occupied
    state: "{{ is_state('person.john_spencer', 'home') or\n   is_state('person.michelle',\
      \ 'home') or\n   is_state('person.alaina_spencer', 'home') or\n   is_state('person.ella_spencer',\
      \ 'home') or\n   is_state('person.jarrett_goetting', 'home') or\n   is_state('person.owen_goetting',\
      \ 'home') }}\n"
    unique_id: house_occupied
  - icon: mdi:human-child
    name: Kids Home
    state: "{{ is_state('person.alaina_spencer', 'home') or\n   is_state('person.ella_spencer',\
      \ 'home') or\n   is_state('person.jarrett_goetting', 'home') or\n   is_state('person.owen_goetting',\
      \ 'home') }}\n"
    unique_id: kids_home
- sensor:
  - icon: mdi:account-group
    name: People Home List
    state: "{% set people = [\n  ('John', is_state('person.john_spencer', 'home')),\n\
      \  ('Michelle', is_state('person.michelle', 'home')),\n  ('Alaina', is_state('person.alaina_spencer',\
      \ 'home')),\n  ('Ella', is_state('person.ella_spencer', 'home')),\n  ('Jarrett',\
      \ is_state('person.jarrett_goetting', 'home')),\n  ('Owen', is_state('person.owen_goetting',\
      \ 'home'))\n] %} {% set home = people | selectattr(1) | map(attribute=0) | list\
      \ %} {{ home | join(', ') if home else 'Nobody' }}\n"
    unique_id: people_home_list
  - icon: mdi:counter
    name: People Home Count
    state: "{{ [\n  is_state('person.john_spencer', 'home'),\n  is_state('person.michelle',\
      \ 'home'),\n  is_state('person.alaina_spencer', 'home'),\n  is_state('person.ella_spencer',\
      \ 'home'),\n  is_state('person.jarrett_goetting', 'home'),\n  is_state('person.owen_goetting',\
      \ 'home')\n] | select | list | count }}\n"
    unique_id: people_home_count

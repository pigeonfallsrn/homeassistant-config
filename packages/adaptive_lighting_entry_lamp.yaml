automation:
- action:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.extended_evening
  alias: Extended Evening - Auto Set for Weekends/Holidays
  condition:
  - condition: or
    conditions:
    - condition: time
      weekday:
      - fri
      - sat
    - condition: state
      entity_id: calendar.holidays_in_united_states
      state: 'on'
    - condition: state
      entity_id: input_boolean.guest_present
      state: 'on'
  id: extended_evening_auto_set
  mode: single
  trigger:
  - at: '18:00:00'
    platform: time
- action:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.extended_evening
  alias: Extended Evening - Auto Clear at 4am
  id: extended_evening_auto_clear
  mode: single
  trigger:
  - at: 04:00:00
    platform: time
- action:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.hot_tub_mode
  alias: Hot Tub Mode - Auto Reset at 3am
  condition:
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'on'
  id: hot_tub_mode_auto_reset
  mode: single
  trigger:
  - at: 03:00:00
    platform: time
- action:
  - choose:
    - conditions:
      - condition: trigger
        id: nobody_home
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.hot_tub_mode
    - conditions:
      - condition: state
        entity_id: binary_sensor.aqara_door_and_window_sensor_door
        for:
          minutes: 10
        state: 'off'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.hot_tub_mode
  alias: Hot Tub Mode - Auto Off When Back Inside
  condition:
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'on'
  description: Turn off hot tub mode when back door closed 10 min OR nobody home
  id: hot_tub_mode_auto_off_when_done
  mode: single
  trigger:
  - entity_id: binary_sensor.aqara_door_and_window_sensor_door
    for:
      minutes: 6
    id: door_closed
    platform: state
    to: 'off'
  - id: periodic_check
    minutes: /5
    platform: time_pattern
  - entity_id: binary_sensor.someone_home
    id: nobody_home
    platform: state
    to: 'off'
- action:
  - action: light.turn_off
    target:
      entity_id: light.living_room_lounge
  alias: Hot Tub Mode - Turn Off Living Room Lamp
  description: Living room lounge lamp is visible from patio - turn off when in hot
    tub
  id: hot_tub_mode_living_room_lamp
  mode: single
  trigger:
  - entity_id: input_boolean.hot_tub_mode
    platform: state
    to: 'on'
- action:
  - action: switch.turn_on
    target:
      entity_id: switch.adaptive_lighting_living_spaces
  - action: light.turn_on
    data:
      brightness_pct: '{{ states(''sensor.evening_lamp_max_brightness'') | int }}'
    target:
      entity_id: light.entry_room_hue_color_lamp
  alias: Arrival - Adaptive Lighting Welcome
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - below: 50
    condition: numeric_state
    entity_id: sensor.entry_room_average_lux
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.dad_bedtime_mode
    state: 'off'
  description: Turn on entry lamp when someone arrives after dark
  id: arrival_adaptive_lighting_on
  mode: single
  trigger:
  - entity_id:
    - person.john_spencer
    - person.alaina_spencer
    - person.ella_spencer
    id: person_arrived
    platform: state
    to: home
  - entity_id:
    - cover.ratgdo32disco_5735e8_door
    - cover.ratgdo32disco_fd8d8c_door
    id: garage_opened
    platform: state
    to: open
  - entity_id:
    - binary_sensor.aqara_door_and_window_sensor_door_2
    - binary_sensor.aqara_door_and_window_sensor_door_4
    id: front_door_opened
    platform: state
    to: 'on'
- action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.hot_tub_mode
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 5
          rgb_color:
          - 255
          - 30
          - 0
          transition: 2
        target:
          entity_id: light.entry_room_hue_color_lamp
      - action: automation.turn_off
        target:
          entity_id:
          - automation.entry_room_lamp_off_after_no_motion
          - automation.entry_room_ceiling_motion_lighting
          - automation.entry_room_lamp_activity_boost
          - automation.entry_room_lamp_dim_after_15min_no_motion
      - action: switch.turn_off
        target:
          entity_id:
          - switch.adaptive_lighting_entry_room_lamp_adaptive
          - switch.adaptive_lighting_entry_room_ceiling
      - action: switch.turn_off
        target:
          entity_id: switch.adaptive_lighting_living_spaces
    - conditions:
      - condition: trigger
        id: bedtime_on
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 10
          color_temp_kelvin: 2200
          transition: 60
        target:
          entity_id: light.entry_room_hue_color_lamp
      - delay:
          minutes: 15
      - action: light.turn_off
        data:
          transition: 60
        target:
          entity_id: light.entry_room_hue_color_lamp
    - conditions:
      - condition: trigger
        id: motion
      - condition: state
        entity_id: input_boolean.hot_tub_mode
        state: 'off'
      - condition: state
        entity_id: input_boolean.dad_bedtime_mode
        state: 'off'
      - below: input_number.entry_room_lux_threshold
        condition: numeric_state
        entity_id: sensor.entry_room_average_lux
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.adaptive_lighting_living_spaces
      - action: light.turn_on
        data:
          brightness_pct: '{{ states(''sensor.evening_lamp_max_brightness'') | int
            }}'
        target:
          entity_id: light.entry_room_hue_color_lamp
    - conditions:
      - condition: trigger
        id: hot_tub_toggle
      - condition: state
        entity_id: input_boolean.hot_tub_mode
        state: 'off'
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.adaptive_lighting_living_spaces
      - action: adaptive_lighting.apply
        data:
          entity_id: switch.adaptive_lighting_living_spaces
          lights:
          - light.entry_room_hue_color_lamp
          transition: 5
      - action: automation.turn_on
        target:
          entity_id:
          - automation.entry_room_lamp_off_after_no_motion
          - automation.entry_room_ceiling_motion_lighting
          - automation.entry_room_lamp_activity_boost
          - automation.entry_room_lamp_dim_after_15min_no_motion
      - action: switch.turn_on
        target:
          entity_id:
          - switch.adaptive_lighting_entry_room_lamp_adaptive
          - switch.adaptive_lighting_entry_room_ceiling
  alias: Entry Room Lamp - Adaptive Control
  condition:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  description: Manages lamp based on motion, lux, presence, time, and modes
  id: entry_room_lamp_adaptive_control
  mode: restart
  trigger:
  - entity_id: binary_sensor.entry_room_motion
    id: motion
    platform: state
    to: 'on'
  - entity_id: input_boolean.hot_tub_mode
    id: hot_tub_toggle
    platform: state
  - entity_id: input_boolean.dad_bedtime_mode
    id: bedtime_on
    platform: state
    to: 'on'
- action:
  - action: adaptive_lighting.apply
    data:
      entity_id: switch.adaptive_lighting_entry_room_lamp_adaptive
      lights:
      - light.entry_room_hue_color_lamp
      transition: 2
  alias: Entry Room Lamp - Activity Boost
  condition:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.dad_bedtime_mode
    state: 'off'
  - condition: state
    entity_id: light.entry_room_hue_color_lamp
    state: 'on'
  - attribute: brightness
    below: 100
    condition: numeric_state
    entity_id: light.entry_room_hue_color_lamp
  description: Restore full brightness when motion detected while dimmed
  id: entry_room_lamp_activity_boost
  mode: single
  trigger:
  - entity_id: binary_sensor.entry_room_motion
    platform: state
    to: 'on'
- action:
  - action: light.turn_on
    data:
      brightness_pct: 20
      transition: 60
    target:
      entity_id: light.entry_room_hue_color_lamp
  alias: Entry Room Lamp - Dim After 5min No Motion
  condition:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  - condition: state
    entity_id: light.entry_room_hue_color_lamp
    state: 'on'
  - above: 50
    attribute: brightness
    condition: numeric_state
    entity_id: light.entry_room_hue_color_lamp
  id: entry_room_lamp_no_motion_dim
  mode: single
  trigger:
  - entity_id: binary_sensor.entry_room_motion
    for:
      minutes: 3
    platform: state
    to: 'off'
- action:
  - action: light.turn_off
    data:
      transition: 60
    target:
      entity_id: light.entry_room_hue_color_lamp
  alias: Entry Room Lamp - Off After 10min No Motion
  condition:
  - condition: state
    entity_id: input_boolean.entry_room_manual_override
    state: 'off'
  - condition: state
    entity_id: light.entry_room_hue_color_lamp
    state: 'on'
  id: entry_room_lamp_no_motion_off
  mode: single
  trigger:
  - entity_id: binary_sensor.entry_room_motion
    for:
      minutes: 10
    platform: state
    to: 'off'
- action:
  - action: light.turn_off
    data:
      transition: 120
    target:
      entity_id: light.entry_room_hue_color_lamp
  alias: Entry Room Lamp - Hard Off at Evening End
  condition:
  - condition: state
    entity_id: light.entry_room_hue_color_lamp
    state: 'on'
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  id: entry_room_lamp_hard_off
  mode: single
  trigger:
  - at: sensor.evening_lamp_off_time
    platform: time
- action:
  - action: switch.turn_off
    target:
      entity_id: switch.adaptive_lighting_living_spaces
  alias: Adaptive Lighting - Off When Nobody Home or Late Night
  condition:
  - condition: state
    entity_id: input_boolean.hot_tub_mode
    state: 'off'
  id: adaptive_lighting_global_off
  mode: single
  trigger:
  - entity_id: binary_sensor.someone_home
    id: nobody_home
    platform: state
    to: 'off'
  - at: sensor.evening_lamp_off_time
    id: hard_off_time
    platform: time
- action:
  - action: notify.mobile_app_john_s_s26_ultra
    data:
      data:
        actions:
        - action: HOT_TUB_OFF
          title: Turn Off
        - action: HOT_TUB_SNOOZE_30
          title: Snooze 30m
        - action: HOT_TUB_SNOOZE_60
          title: Snooze 1hr
        persistent: true
        tag: hot_tub_mode
      message: Adaptive lighting paused. Entry lamp set to red.
      title: Hot Tub Mode Active
  alias: Hot Tub Mode - Reminder Notification
  id: hot_tub_mode_notification
  mode: single
  trigger:
  - entity_id: input_boolean.hot_tub_mode
    platform: state
    to: 'on'
- action:
  - choose:
    - conditions:
      - condition: trigger
        id: turn_off
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.hot_tub_mode
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          data:
            tag: hot_tub_mode
          message: clear_notification
    - conditions:
      - condition: trigger
        id: snooze_30
      sequence:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          data:
            tag: hot_tub_mode
          message: clear_notification
      - delay:
          minutes: 30
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          data:
            actions:
            - action: HOT_TUB_OFF
              title: Turn Off
            - action: HOT_TUB_SNOOZE_30
              title: Snooze 30m
            - action: HOT_TUB_SNOOZE_60
              title: Snooze 1hr
            persistent: true
            tag: hot_tub_mode
          message: 30 minute snooze ended.
          title: Hot Tub Mode Still Active
    - conditions:
      - condition: trigger
        id: snooze_60
      sequence:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          data:
            tag: hot_tub_mode
          message: clear_notification
      - delay:
          minutes: 60
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          data:
            actions:
            - action: HOT_TUB_OFF
              title: Turn Off
            - action: HOT_TUB_SNOOZE_30
              title: Snooze 30m
            - action: HOT_TUB_SNOOZE_60
              title: Snooze 1hr
            persistent: true
            tag: hot_tub_mode
          message: 1 hour snooze ended.
          title: Hot Tub Mode Still Active
  alias: Hot Tub Mode - Handle Notification Actions
  id: hot_tub_mode_notification_actions
  mode: single
  trigger:
  - event_data:
      action: HOT_TUB_OFF
    event_type: mobile_app_notification_action
    id: turn_off
    platform: event
  - event_data:
      action: HOT_TUB_SNOOZE_30
    event_type: mobile_app_notification_action
    id: snooze_30
    platform: event
  - event_data:
      action: HOT_TUB_SNOOZE_60
    event_type: mobile_app_notification_action
    id: snooze_60
    platform: event
template:
- sensor:
  - device_class: illuminance
    name: Entry Room Average Lux
    state: '{% set east = states(''sensor.entry_room_east_wall_nightlight_illuminance'')
      | float(0) %} {% set west = states(''sensor.entry_room_west_wall_nightlight_illuminance'')
      | float(0) %} {{ ((east + west) / 2) | round(1, default=0) }}

      '
    unique_id: entry_room_average_lux
    unit_of_measurement: lx
  - icon: mdi:clock-outline
    name: Evening Lamp Off Time
    state: "{% set kids_home = is_state('binary_sensor.alaina_home', 'on') or is_state('binary_sensor.ella_home',\
      \ 'on') %} {% set school = is_state('input_boolean.school_tomorrow', 'on') %}\
      \ {% if is_state('input_boolean.hot_tub_mode', 'on') %}\n  01:00\n{% elif is_state('input_boolean.extended_evening',\
      \ 'on') %}\n  00:30\n{% elif is_state('input_boolean.guest_present', 'on') %}\n\
      \  00:30\n{% elif kids_home and school %}\n  22:30\n{% else %}\n  23:30\n{%\
      \ endif %}\n"
    unique_id: evening_lamp_off_time
  - name: Evening Lamp Max Brightness
    state: "{% set hour = now().hour %} {% set minute = now().minute %} {% set time_val\
      \ = hour + minute/60 %} {% set kids_home = is_state('binary_sensor.alaina_home',\
      \ 'on') or is_state('binary_sensor.ella_home', 'on') %} {% set school = is_state('input_boolean.school_tomorrow',\
      \ 'on') %} {% set extended = is_state('input_boolean.extended_evening', 'on')\
      \ or is_state('input_boolean.guest_present', 'on') %} {% set hot_tub = is_state('input_boolean.hot_tub_mode',\
      \ 'on') %} {% if hot_tub %}\n  5\n{% elif extended %}\n  100\n{% elif kids_home\
      \ and school %}\n  {% if time_val >= 21.5 %}30{% else %}100{% endif %}\n{% else\
      \ %}\n  {% if time_val >= 22.5 %}30{% else %}100{% endif %}\n{% endif %}\n"
    unique_id: evening_lamp_max_brightness
    unit_of_measurement: '%'

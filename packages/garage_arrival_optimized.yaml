# ============================================================================
# GARAGE ARRIVAL - OPTIMIZED v2.0
# HandsFreeLink Bluetooth detection + Dashboard popup + Smart timing
#
# NOTE: garage_arrival_smart_popup and garage_door_opened_arrival_notification
# moved to UI config store (MCP) 2026-03-30 with arrival reliability fixes.
# Remaining here: action_handler, autoclear
# ============================================================================

automation:
  - id: garage_arrival_autoclear
    alias: "Garage - Clear Arrival Dashboard on Arrival"
    description: "Automatically dismisses garage dashboard when you arrive home"
    trigger:
      - platform: state
        entity_id: person.john_spencer
        to: "home"
    action:
      - action: notify.mobile_app_john_s_s26_ultra
        data:
          message: "clear_notification"
          data:
            tag: "garage_arrival_dashboard"
    mode: single

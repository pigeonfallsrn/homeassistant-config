# ===========================================================================
# UPSTAIRS LIGHTING PACKAGE
# Upstairs Hallway - Motion-activated, time-aware
# Triggers: upstairs_hallway Aqara + upstairs_bathroom motion
# Time logic:
#   06:00-21:30  → Energize (100%, cool) - daytime/active evening
#   21:30-23:00  → 70% / 3000K warm - winding down, still active
#   23:00-06:00  → 10% / 2200K - sleeping hours nightlight
# ===========================================================================

automation:
  - id: upstairs_hallway_motion_lighting_v2
    alias: "Upstairs Hallway → Motion Lighting v2"
    description: "Time-aware motion lighting. Triggers: hallway Aqara P1 + bathroom motion. 06:00-21:30=Energize, 21:30-23:00=70%/3000K, 23:00-06:00=10%/2200K. 2026-03-24: fixed stale P1 entity in motion_aggregation.yaml (was _2 orphan)."
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.upstairs_hallway_aqara_motion_sensor_occupancy
          - binary_sensor.upstairs_bathroom_motion
        to: "on"
        id: motion_on
      - platform: state
        entity_id:
          - binary_sensor.upstairs_hallway_aqara_motion_sensor_occupancy
          - binary_sensor.upstairs_bathroom_motion
        to: "off"
        for:
          minutes: 3
        id: motion_off
    action:
      - choose:
          # ── MOTION ON ──
          - conditions:
              - condition: trigger
                id: motion_on
            sequence:
              - choose:
                  # 23:00-06:00 → nightlight only
                  - conditions:
                      - condition: time
                        after: "23:00:00"
                        before: "06:00:00"
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: light.upstairs_hallway
                        data:
                          brightness_pct: 10
                          color_temp_kelvin: 2200
                          transition: 2
                  # 21:30-23:00 → warm dim active evening
                  - conditions:
                      - condition: time
                        after: "21:30:00"
                        before: "23:00:00"
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: light.upstairs_hallway
                        data:
                          brightness_pct: 70
                          color_temp_kelvin: 3000
                          transition: 2
                default:
                  # 06:00-21:30 → full energize
                  - action: scene.turn_on
                    target:
                      entity_id: scene.upstairs_hallway_energize
          # ── MOTION OFF ──
          - conditions:
              - condition: trigger
                id: motion_off
            sequence:
              - action: light.turn_off
                target:
                  entity_id: light.upstairs_hallway
                data:
                  transition: 5

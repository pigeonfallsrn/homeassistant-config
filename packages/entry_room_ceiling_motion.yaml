# =============================================================================
# ENTRY ROOM CEILING - MOTION LIGHTING
# =============================================================================
# Controls: light.entry_room_ceiling_light (Hue zone, 2x color bulbs)
# Motion: binary_sensor.entry_room_motion (P1 + TR nightlights, 30s delay_off)
# Override: input_boolean.entry_room_manual_override
# Hot tub: FULL BYPASS when input_boolean.hot_tub_mode = on
# Pattern: passthrough/hallway → mode: restart, 3-min off timeout
# Tiers: 06:00-21:30 Energize | 21:30-23:00 70%/3000K | 23:00-06:00 15%/2200K
# =============================================================================

automation:
  - id: entry_room_ceiling_motion_lighting
    alias: "Entry Room - Ceiling Motion Lighting"
    description: >
      3-tier time-aware motion lighting for 3-door transition space.
      Energize daytime, warm dim evening, nightlight late night.
      Full bypass when hot_tub_mode active. Manual override respected.
      3-min off timeout appropriate for pass-through coat/shoe room.
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.entry_room_motion
        to: "on"
        id: motion_on
      - platform: state
        entity_id: binary_sensor.entry_room_motion
        to: "off"
        for:
          minutes: 3
        id: motion_off
    condition:
      - condition: state
        entity_id: input_boolean.entry_room_manual_override
        state: "off"
      - condition: state
        entity_id: input_boolean.hot_tub_mode
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: motion_on
            sequence:
              - choose:
                  - conditions:
                      - condition: time
                        after: "06:00:00"
                        before: "21:30:00"
                    sequence:
                      - action: scene.turn_on
                        target:
                          entity_id: scene.entry_room_energize
                        data:
                          transition: 1
                  - conditions:
                      - condition: time
                        after: "21:30:00"
                        before: "23:00:00"
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: light.entry_room_ceiling_light
                        data:
                          brightness_pct: 70
                          color_temp_kelvin: 3000
                          transition: 2
                default:
                  - action: light.turn_on
                    target:
                      entity_id: light.entry_room_ceiling_light
                    data:
                      brightness_pct: 15
                      color_temp_kelvin: 2200
                      transition: 2
          - conditions:
              - condition: trigger
                id: motion_off
            sequence:
              - action: light.turn_off
                target:
                  entity_id: light.entry_room_ceiling_light
                data:
                  transition: 5

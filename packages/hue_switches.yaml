  # ─── Ella's Bedroom — Dimmer Switch (RWL022) ───────────────────────────────
  # Standard scenes used as default. To customize:
  #   B1 → scene.ella_s_bedroom_volleyball_hype (Volleyball Hype)
  #   B2 → scene.ella_s_bedroom_chill_purple    (Chill Purple)
  - id: hue_dimmer_ella_bedroom
    alias: "Ella's Bedroom — Dimmer Switch"
    description: "B1=Energize B2=Relax B3=Dimmed B4=Off. Customize with her custom scenes."
    mode: single
    trigger:
      - platform: state
        entity_id: event.hue_dimmer_switch_2_button_1
        id: b1
      - platform: state
        entity_id: event.hue_dimmer_switch_2_button_2
        id: b2
      - platform: state
        entity_id: event.hue_dimmer_switch_2_button_3
        id: b3
      - platform: state
        entity_id: event.hue_dimmer_switch_2_button_4
        id: b4
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.attributes.event_type == 'short_release' }}"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: b1
            sequence:
              - if:
                  - condition: state
                    entity_id: light.ella_s_bedroom
                    state: "on"
                then:
                  - action: light.turn_off
                    target:
                      entity_id: light.ella_s_bedroom
                else:
                  - action: scene.turn_on
                    target:
                      entity_id: scene.ella_s_bedroom_energize
          - conditions:
              - condition: trigger
                id: b2
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.ella_s_bedroom_relax
          - conditions:
              - condition: trigger
                id: b3
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.ella_s_bedroom_dimmed
          - conditions:
              - condition: trigger
                id: b4
            sequence:
              - action: light.turn_off
                target:
                  entity_id: light.ella_s_bedroom


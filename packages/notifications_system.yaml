  # ---------------------------------------------------------------------------
  # Departure - Garage Open Alert (Added 2026-02-20)
  # ---------------------------------------------------------------------------
  - id: departure_garage_open_alert
    alias: "Departure - Garage Open Alert"
    description: >
      Alerts when leaving home with garage door(s) open.
      Offers close or snooze options.
    trigger:
      - platform: state
        entity_id: person.john_spencer
        from: "home"
        to: "not_home"
        for:
          seconds: 30
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: cover.ratgdo32disco_fd8d8c_door
            state: "open"
          - condition: state
            entity_id: cover.ratgdo32disco_5735e8_door
            state: "open"
    action:
      - service: notify.mobile_app_sm_s928u
        data:
          title: "🚨 Garage Door Open"
          message: >
            {% set north = states('cover.ratgdo32disco_fd8d8c_door') %}
            {% set south = states('cover.ratgdo32disco_5735e8_door') %}
            {% if north == 'open' and south == 'open' %}Both doors open!
            {% elif north == 'open' %}North door open!
            {% else %}South door open!
            {% endif %}
          data:
            tag: "departure_garage_open"
            group: "garage"
            channel: "Garage Alerts"
            importance: high
            ttl: 0
            priority: high
            sticky: true
            persistent: true
            notification_icon: "mdi:garage-alert"
            color: "#F44336"
            actions:
              - action: "DEPARTURE_CLOSE_ALL"
                title: "🔒 Close All"
              - action: "DEPARTURE_SNOOZE_30"
                title: "⏰ 30min"
              - action: "DEPARTURE_IGNORE"
                title: "✓ Leave Open"
    mode: single

  - id: departure_garage_action_handler
    alias: "Departure - Handle Garage Actions"
    description: "Handles departure garage alert actions"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "DEPARTURE_CLOSE_ALL"
        id: close_all
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "DEPARTURE_SNOOZE_30"
        id: snooze_30
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "DEPARTURE_IGNORE"
        id: ignore
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: close_all
            sequence:
              - service: cover.close_cover
                target:
                  entity_id:
                    - cover.ratgdo32disco_fd8d8c_door
                    - cover.ratgdo32disco_5735e8_door
              - service: notify.mobile_app_sm_s928u
                data:
                  message: "clear_notification"
                  data:
                    tag: "departure_garage_open"
              - service: notify.mobile_app_sm_s928u
                data:
                  title: "✅ Garage Closing"
                  message: "All doors closing..."
                  data:
                    tag: "garage_action_confirm"
                    timeout: 10
          - conditions:
              - condition: trigger
                id: snooze_30
            sequence:
              - service: notify.mobile_app_sm_s928u
                data:
                  message: "clear_notification"
                  data:
                    tag: "departure_garage_open"
              - delay:
                  minutes: 30
              - condition: state
                entity_id: person.john_spencer
                state: "not_home"
              - condition: or
                conditions:
                  - condition: state
                    entity_id: cover.ratgdo32disco_fd8d8c_door
                    state: "open"
                  - condition: state
                    entity_id: cover.ratgdo32disco_5735e8_door
                    state: "open"
              - service: notify.mobile_app_sm_s928u
                data:
                  title: "🚨 Reminder: Garage Still Open"
                  message: >
                    {% set north = states('cover.ratgdo32disco_fd8d8c_door') %}
                    {% set south = states('cover.ratgdo32disco_5735e8_door') %}
                    {% if north == 'open' and south == 'open' %}Both doors still open
                    {% elif north == 'open' %}North still open
                    {% else %}South still open
                    {% endif %}
                  data:
                    tag: "departure_garage_open"
                    group: "garage"
                    channel: "Garage Alerts"
                    importance: high
                    sticky: true
                    persistent: true
                    actions:
                      - action: "DEPARTURE_CLOSE_ALL"
                        title: "🔒 Close All"
                      - action: "DEPARTURE_SNOOZE_30"
                        title: "⏰ 30min"
                      - action: "DEPARTURE_IGNORE"
                        title: "✓ Leave Open"
          - conditions:
              - condition: trigger
                id: ignore
            sequence:
              - service: notify.mobile_app_sm_s928u
                data:
                  message: "clear_notification"
                  data:
                    tag: "departure_garage_open"
    mode: restart

  - id: departure_garage_autoclear
    alias: "Departure - Clear Alert on Return"
    trigger:
      - platform: state
        entity_id: person.john_spencer
        to: "home"
    action:
      - service: notify.mobile_app_sm_s928u
        data:
          message: "clear_notification"
          data:
            tag: "departure_garage_open"
    mode: single

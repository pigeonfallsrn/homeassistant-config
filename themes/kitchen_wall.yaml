kitchen_wall:
  # Column sizing
  ha-view-sections-column-max-width: 800px
  ha-view-sections-column-min-width: 300px
  ha-view-sections-column-gap: 8px
  # Eliminate side gutters — target the actual HA 2026.x shadow DOM wrapper
  ha-view-sections-max-width: "none"
  # Force full width via card-mod on the sections container
  card-mod-root-yaml: |
    ha-panel-lovelace$:
      hui-root$:
        div.header-wrapper + div:
          margin: 0 !important;
          max-width: 100% !important;
          width: 100% !important;
        hui-view$:
          hui-sections-view$:
            div.sections-container:
              max-width: 100% !important;
              padding: 0 4px !important;

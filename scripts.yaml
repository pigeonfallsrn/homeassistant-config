kitchen_scene_select:
  alias: Kitchen Scene Select
  description: Toggle kitchen scene via tablet buttons.
  icon: mdi:lightbulb-group
  mode: single
  fields:
    scene:
      name: Scene
      required: true
      selector:
        select:
          options:
          - Bright
          - Dim
          - Nightlight
  sequence:
  - variables:
      scene_script_map:
        Bright: script.kitchen_scene_bright
        Dim: script.kitchen_scene_dim
        Nightlight: script.kitchen_scene_nightlight
  - if:
    - condition: template
      value_template: '{{ states(''input_select.kitchen_lighting_scene'') == scene
        }}'
    then:
    - action: script.turn_on
      target:
        entity_id: script.kitchen_scene_all_off
    else:
    - action: script.turn_on
      target:
        entity_id: '{{ scene_script_map[scene] }}'

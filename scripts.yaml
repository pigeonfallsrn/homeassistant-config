kitchen_scene_cooking_bright:
  alias: Kitchen - Cooking
  icon: mdi:stove
  description: All work lights bright warm-cool, lounge ambient on
  sequence:
  - target:
      entity_id:
      - light.kitchen_ceiling_inovelli_vzm31_sn
      - light.kitchen_bar_pendant_lights
    data:
      brightness_pct: 100
    action: light.turn_on
  - target:
      entity_id:
      - light.kitchen_chandelier
      - light.kitchen_above_sink_light
    data:
      brightness_pct: 100
      kelvin: 3500
    action: light.turn_on
  - target:
      entity_id: light.kitchen_under_cabinet_aqara_t1_led_strip
    data:
      brightness_pct: 100
      kelvin: 4000
    action: light.turn_on
  - target:
      entity_id: light.kitchen_lounge
    data:
      brightness_pct: 70
      kelvin: 3500
    action: light.turn_on
kitchen_scene_dinner_dim:
  alias: Kitchen - Dinner
  icon: mdi:candle
  description: Chandelier soft warm, lounge lamp accent, all task lights off
  sequence:
  - target:
      entity_id:
      - light.kitchen_ceiling_inovelli_vzm31_sn
      - light.kitchen_bar_pendant_lights
      - light.kitchen_above_sink_light
      - light.kitchen_under_cabinet_aqara_t1_led_strip
    action: light.turn_off
  - target:
      entity_id: light.kitchen_chandelier
    data:
      brightness_pct: 35
      kelvin: 2700
    action: light.turn_on
  - target:
      entity_id:
      - light.kitchen_lounge_ceiling_1of2
      - light.kitchen_lounge_ceiling_2of2
    data:
      brightness_pct: 30
      kelvin: 2700
    action: light.turn_on
  - target:
      entity_id: light.kitchen_lounge_lamp
    data:
      brightness_pct: 40
      kelvin: 2200
    action: light.turn_on
kitchen_scene_movie_night:
  alias: Kitchen Scene - Movie Night
  sequence:
  - target:
      entity_id:
      - light.kitchen_ceiling_inovelli_vzm31_sn
      - light.above_kitchen_sink_inovelli_switch
      - light.kitchen_above_table_chandelier_inovelli
    action: light.turn_off
  - target:
      entity_id:
      - light.kitchen_counter_night_light
      - light.kitchen_west_wall_nightlight
    data:
      brightness_pct: 15
    action: light.turn_on
  - target:
      entity_id: light.kitchen_lounge_light_fan_inovelli_vzm36_light
    data:
      brightness_pct: 10
    action: light.turn_on
  - target:
      entity_id: input_select.kitchen_lighting_scene
    data:
      option: Movie Night
    action: input_select.select_option

blueprint:
  name: VZM30-SN Bathroom Scene Cycling
  description: >
    Config button press on Inovelli VZM30-SN cycles bathroom lighting
    combos: ceiling only, vanity only, both, dim+bright, off.
    Uses ZHA zha_event button_2_press trigger.
  domain: automation
  author: S13B Migration
  input:
    switch_ieee:
      name: VZM30-SN IEEE Address
      selector:
        text:
    ceiling_light:
      name: Ceiling Light Entity
      selector:
        entity:
          domain: light
    vanity_light:
      name: Vanity Light Entity
      selector:
        entity:
          domain: light
    scene_index_helper:
      name: Scene Index Helper
      selector:
        entity:
          domain: input_number
    scene_count:
      name: Number of Scenes
      default: 5
      selector:
        number:
          min: 2
          max: 10
mode: restart
trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_ieee: !input switch_ieee
      command: button_2_press
variables:
  max_scenes: !input scene_count
  current_index: "{{ states(scene_idx) | int(0) }}"
  scene_idx: !input scene_index_helper
  new_index: "{{ ((current_index + 1) % max_scenes) }}"
action:
  - service: input_number.set_value
    target:
      entity_id: !input scene_index_helper
    data:
      value: "{{ new_index }}"
  - choose:
      - conditions: "{{ new_index == 0 }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input ceiling_light
            data:
              brightness: 255
          - service: light.turn_off
            target:
              entity_id: !input vanity_light
      - conditions: "{{ new_index == 1 }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input ceiling_light
          - service: light.turn_on
            target:
              entity_id: !input vanity_light
            data:
              brightness: 255
      - conditions: "{{ new_index == 2 }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input ceiling_light
            data:
              brightness: 255
          - service: light.turn_on
            target:
              entity_id: !input vanity_light
            data:
              brightness: 255
      - conditions: "{{ new_index == 3 }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input ceiling_light
            data:
              brightness: 64
          - service: light.turn_on
            target:
              entity_id: !input vanity_light
            data:
              brightness: 200
      - conditions: "{{ new_index == 4 }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input ceiling_light
          - service: light.turn_off
            target:
              entity_id: !input vanity_light
